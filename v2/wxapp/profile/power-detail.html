<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>算力明细 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button:focus-visible, a:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
        html, body { font-family: var(--font-family); font-size: 14px; line-height: 1.5; color: var(--color-text); background: var(--color-bg); -webkit-font-smoothing: antialiased; }
        body { min-height: 100vh; }
        .header { background: white; padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md); display: flex; align-items: center; border-bottom: 1px solid var(--color-border); }
        .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--color-bg); border: none; border-radius: 50%; cursor: pointer; color: var(--color-text); text-decoration: none; }
        .header-title { flex: 1; font-size: 17px; font-weight: 600; color: var(--color-title); text-align: center; margin: 0 36px; }
        .page-content { min-height: calc(100vh - 60px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--spacing-xl); text-align: center; }
        .placeholder-icon { width: 120px; height: 120px; background: var(--brand-primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: var(--spacing-lg); }
        .placeholder-icon i { font-size: 56px; color: var(--brand-primary); }
        .placeholder-title { font-size: 18px; font-weight: 600; color: var(--color-title); margin-bottom: var(--spacing-sm); }
        .placeholder-desc { font-size: 14px; color: var(--color-sub); max-width: 280px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:history.back()" class="back-btn" aria-label="返回">
            <i class="fa fa-angle-left" style="font-size: 22px"></i>
        </a>
        <span class="header-title">算力明细</span>
    </div>
    <div class="page-content">
        <div class="placeholder-icon">
            <i class="fa fa-bolt"></i>
        </div>
        <div class="placeholder-title">算力明细</div>
        <div class="placeholder-desc">AI算力使用明细和充值记录</div>
    </div>
</body>
</html>
