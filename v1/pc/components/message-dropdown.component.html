<!-- 消息下拉组件 -->
<div id="messageDropdown" class="relative">
    <button id="messageBell" onclick="toggleMessageDropdown()" class="text-gray-600 hover:text-primary relative p-2">
        <i class="fa fa-bell-o text-lg"></i>
        <span id="messageBadge" class="absolute -top-1 -right-1 bg-danger text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
    </button>
    
    <!-- 下拉面板 -->
    <div id="messagePanel" class="hidden absolute right-0 top-full mt-2 w-96 bg-white rounded-xl shadow-2xl border border-gray-100 z-50">
        <!-- 头部 -->
        <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="font-bold text-dark">消息通知</span>
                <span id="unreadCount" class="bg-danger text-white text-xs px-2 py-0.5 rounded-full">0</span>
            </div>
            <button onclick="markAllRead()" class="text-xs text-primary hover:underline">全部标为已读</button>
        </div>
        
        <!-- 消息列表 -->
        <div id="messageList" class="max-h-96 overflow-y-auto">
            <!-- 消息项会动态插入 -->
        </div>
        
        <!-- 底部 -->
        <div class="px-4 py-3 border-t border-gray-100 text-center">
            <a href="message/message-list.html" class="text-sm text-primary hover:underline">查看全部消息</a>
        </div>
    </div>
</div>

<style>
.message-item {
    display: flex;
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.2s;
}
.message-item:hover {
    background: #f8f9fa;
}
.message-item.unread {
    background: #F5F7FA;
}
.message-item .priority-bar {
    width: 4px;
    border-radius: 2px;
    margin-right: 12px;
    flex-shrink: 0;
}
.message-item .priority-bar.p0 { background: #F53F3F; }
.message-item .priority-bar.p1 { background: #FF7D00; }
.message-item .priority-bar.p2 { background: #165DFF; }
.message-item .icon-wrap {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
    flex-shrink: 0;
}
.message-item .icon-wrap.task { background: #FFF7E6; color: #FF7D00; }
.message-item .icon-wrap.content { background: #E8F3FF; color: #165DFF; }
.message-item .icon-wrap.customer { background: #F0FFF0; color: #00B42A; }
.message-item .icon-wrap.system { background: #F5F5F5; color: #86909C; }
.message-item .content { flex: 1; min-width: 0; }
.message-item .title { font-size: 14px; font-weight: 500; color: #1D2129; margin-bottom: 4px; }
.message-item .desc { font-size: 12px; color: #86909C; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.message-item .time { font-size: 11px; color: #86909C; flex-shrink: 0; margin-left: 8px; }
.message-item .unread-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #165DFF;
    flex-shrink: 0;
    margin-left: 8px;
}
.message-item.read .unread-dot { display: none; }
.message-item.read { opacity: 0.7; }
</style>

<script>
// 消息数据
const MESSAGES_KEY = 'reai_messages';
let messages = [];

// 初始化
function initMessages() {
    const stored = localStorage.getItem(MESSAGES_KEY);
    if (stored) {
        messages = JSON.parse(stored);
    } else {
        // 示例数据
        messages = [
            { id: 1, type: 'task', priority: 'P0', title: '新任务分配', desc: '您有一个新探盘任务：中海汇德里', time: '10分钟前', read: false },
            { id: 2, type: 'content', priority: 'P1', title: '文案生成完成', desc: '3篇文案已生成完毕', time: '30分钟前', read: false },
            { id: 3, type: 'customer', priority: 'P0', title: '客户状态变更', desc: '客户李小姐意向升级为高意向', time: '1小时前', read: false },
            { id: 4, type: 'system', priority: 'P2', title: '系统公告', desc: '平台将于本周六进行功能升级', time: '2小时前', read: true },
            { id: 5, type: 'task', priority: 'P0', title: '任务截止提醒', desc: '任务即将截止，请尽快完成', time: '3小时前', read: true },
        ];
        saveMessages();
    }
    updateBadge();
    renderDropdown();
}

// 保存
function saveMessages() {
    localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));
}

// 更新角标
function updateBadge() {
    const unread = messages.filter(m => !m.read).length;
    const badge = document.getElementById('messageBadge');
    const count = document.getElementById('unreadCount');
    if (badge) {
        if (unread > 0) {
            badge.textContent = unread > 99 ? '99+' : unread;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }
    if (count) {
        count.textContent = unread;
    }
}

// 渲染下拉列表
function renderDropdown() {
    const list = document.getElementById('messageList');
    if (!list) return;
    
    const recent = messages.slice(0, 5);
    list.innerHTML = recent.map(m => `
        <div class="message-item ${m.read ? 'read' : 'unread'}" onclick="viewMessage(${m.id})">
            <div class="priority-bar ${m.priority.toLowerCase()}"></div>
            <div class="icon-wrap ${getTypeIcon(m.type).cls}">
                <i class="fa ${getTypeIcon(m.type).icon}"></i>
            </div>
            <div class="content">
                <div class="title">${m.title}</div>
                <div class="desc">${m.desc}</div>
            </div>
            <div class="time">${m.time}</div>
            <div class="unread-dot"></div>
        </div>
    `).join('');
    
    if (recent.length === 0) {
        list.innerHTML = '<div class="p-8 text-center text-gray-400">暂无消息</div>';
    }
}

// 获取类型图标
function getTypeIcon(type) {
    const icons = {
        task: { icon: 'fa-tasks', cls: 'task' },
        content: { icon: 'fa-file-text', cls: 'content' },
        customer: { icon: 'fa-user', cls: 'customer' },
        system: { icon: 'fa-cog', cls: 'system' }
    };
    return icons[type] || icons.system;
}

// 切换下拉
function toggleMessageDropdown() {
    const panel = document.getElementById('messagePanel');
    panel.classList.toggle('hidden');
    renderDropdown();
}

// 点击外部关闭
document.addEventListener('click', function(e) {
    const dropdown = document.getElementById('messageDropdown');
    const panel = document.getElementById('messagePanel');
    if (dropdown && !dropdown.contains(e.target)) {
        panel.classList.add('hidden');
    }
});

// 全部标为已读
function markAllRead() {
    messages.forEach(m => m.read = true);
    saveMessages();
    updateBadge();
    renderDropdown();
}

// 查看消息
function viewMessage(id) {
    const msg = messages.find(m => m.id === id);
    if (msg) {
        msg.read = true;
        saveMessages();
        updateBadge();
        // 跳转到消息详情或对应页面
        window.location.href = 'message/message-list.html';
    }
}

// 初始化
initMessages();
</script>
