<!-- 侧边栏公共JS -->
<script>
// 计算相对路径
function getRelativePath(from, to) {
    // 移除开头的 /
    from = from.replace(/^\//, '').replace(/\/$/, '');
    to = to.replace(/^\//, '').replace(/\/$/, '');
    
    // 如果是绝对路径（如 pages/task），直接返回
    if (to.startsWith('pages/') || to.startsWith('index')) {
        return to;
    }
    
    // 从from目录计算到to的相对路径
    const fromParts = from.split('/');
    const toParts = to.split('/');
    
    // 找到共同的祖先目录
    let commonLength = 0;
    for (let i = 0; i < Math.min(fromParts.length, toParts.length); i++) {
        if (fromParts[i] === toParts[i]) {
            commonLength++;
        } else {
            break;
        }
    }
    
    // 从from往回走到共同祖先
    const upCount = fromParts.length - commonLength;
    let relative = '';
    for (let i = 0; i < upCount; i++) {
        relative += '../';
    }
    
    // 然后走向to
    relative += toParts.slice(commonLength).join('/');
    
    return relative || './';
}

// 修正侧边栏链接路径
function fixSidebarLinks() {
    const pathname = window.location.pathname;
    // 获取当前页面的目录部分（去掉文件名）
    const currentPage = pathname.split('/').pop();
    const currentDir = pathname.replace(new RegExp(currentPage + '$'), '').replace(/\/$/, '');
    
    const links = document.querySelectorAll('aside a[data-path]');
    
    links.forEach(link => {
        const dataPath = link.getAttribute('data-path');
        // 计算相对路径
        const relativePath = getRelativePath(currentDir, dataPath);
        link.setAttribute('href', relativePath);
    });
}

// 高亮当前页面
function initSidebar() {
    const pathname = window.location.pathname;
    const links = document.querySelectorAll('aside a[data-path]');
    
    links.forEach(link => {
        const dataPath = link.getAttribute('data-path');
        // 检查当前路径是否包含data-path
        if (pathname.includes('/' + dataPath)) {
            link.classList.add('active');
        }
        // 首页特殊处理
        if ((pathname.endsWith('/pc/') || pathname.endsWith('/pc/index.html') || pathname.endsWith('/real-estate-ai/pc/') || pathname.endsWith('/real-estate-ai/pc/index.html') || pathname.endsWith('/')) && link.getAttribute('href').includes('index.html')) {
            link.classList.add('active');
        }
    });
}

// 全局暴露函数
window.initSidebar = initSidebar;
window.fixSidebarLinks = fixSidebarLinks;
</script>
