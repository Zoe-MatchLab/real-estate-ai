<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新盘管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-56 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-200">
                <h1 class="text-lg font-bold text-gray-800">
                    <i class="fas fa-building text-primary mr-2"></i>房产AI作业平台
                </h1>
            </div>
            <nav class="flex-1 py-4">
                <div class="px-4 py-2">
                    <span class="text-xs text-gray-400 uppercase tracking-wider">工作台</span>
                </div>
                <a href="#" class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-home w-5 mr-3"></i>工作台
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-sm bg-blue-50 text-primary border-r-2 border-primary">
                    <i class="fas fa-city w-5 mr-3"></i>新盘管理
                </a>
                <a href="../generation/material-generation.html" class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-magic w-5 mr-3"></i>物料生成管理
                </a>
                <a href="../task/task-manage.html" class="flex items-center px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-clipboard-list w-5 mr-3"></i>探盘任务
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 px-6 py-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-semibold text-gray-800">新盘管理</h2>
                    <div class="flex items-center space-x-3">
                        <button class="px-4 py-2 bg-primary text-white text-sm rounded-lg hover:bg-blue-600 transition">
                            <i class="fas fa-plus mr-2"></i>新建楼盘
                        </button>
                        <button class="px-4 py-2 bg-white border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition">
                            <i class="fas fa-upload mr-2"></i>批量导入
                        </button>
                        <button class="px-4 py-2 bg-white border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50 transition">
                            <i class="fas fa-trash-alt mr-2"></i>回收站
                        </button>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <div class="p-6">
                <!-- Status Tabs -->
                <div class="bg-white rounded-lg mb-6">
                    <div class="border-b border-gray-200">
                        <nav class="flex -mb-px">
                            <button class="status-tab px-5 py-3 text-sm border-b-2 border-primary text-primary font-medium" data-status="all">全部</button>
                            <button class="status-tab px-5 py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-status="pending">待审核</button>
                            <button class="status-tab px-5 py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-status="approved">审核通过</button>
                            <button class="status-tab px-5 py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-status="rejected">已驳回</button>
                            <button class="status-tab px-5 py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-status="online">已上线</button>
                            <button class="status-tab px-5 py-3 text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-status="offline">已下线</button>
                        </nav>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="grid grid-cols-6 gap-4 mb-6">
                    <div class="bg-white rounded-lg p-4 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-500">全部楼盘</p>
                                <p class="text-2xl font-bold text-gray-800">156</p>
                            </div>
                            <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                                <i class="fas fa-city text-primary"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-500">待审核</p>
                                <p class="text-2xl font-bold text-warning">12</p>
                            </div>
                            <div class="w-10 h-10 bg-orange-50 rounded-lg flex items-center justify-center">
                                <i class="fas fa-clock text-warning"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-500">审核通过</p>
                                <p class="text-2xl font-bold text-blue-400">28</p>
                            </div>
                            <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                                <i class="fas fa-check text-blue-400"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-500">已驳回</p>
                                <p class="text-2xl font-bold text-danger">8</p>
                            </div>
                            <div class="w-10 h-10 bg-red-50 rounded-lg flex items-center justify-center">
                                <i class="fas fa-times text-danger"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-500">已上线</p>
                                <p class="text-2xl font-bold text-success">95</p>
                            </div>
                            <div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center">
                                <i class="fas fa-globe text-success"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-4 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-500">已下线</p>
                                <p class="text-2xl font-bold text-gray-400">13</p>
                            </div>
                            <div class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center">
                                <i class="fas fa-power-off text-gray-400"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="bg-white rounded-lg shadow-sm">
                    <div class="p-4 border-b border-gray-200">
                        <div class="flex items-center justify-between">
                            <div class="relative">
                                <input type="text" id="searchInput" placeholder="搜索楼盘名称..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm w-64 focus:outline-none focus:border-primary">
                                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            </div>
                            <div class="flex items-center space-x-2">
                                <select class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                                    <option>全部区域</option>
                                    <option>朝阳区</option>
                                    <option>海淀区</option>
                                    <option>丰台区</option>
                                </select>
                                <select class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                                    <option>全部类型</option>
                                    <option>住宅</option>
                                    <option>商业</option>
                                    <option>写字楼</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">楼盘名称</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">区域</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">均价</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">创建时间</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200" id="tableBody">
                                <!-- Data will be rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination -->
                    <div class="p-4 border-t border-gray-200 flex items-center justify-between">
                        <p class="text-sm text-gray-500">共 <span id="totalCount">0</span> 条记录</p>
                        <div class="flex items-center space-x-2">
                            <button class="px-3 py-1 border border-gray-300 rounded text-sm hover:bg-gray-50 disabled:opacity-50" id="prevBtn" disabled>上一页</button>
                            <span class="px-3 py-1 text-sm">第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页</span>
                            <button class="px-3 py-1 border border-gray-300 rounded text-sm hover:bg-gray-50" id="nextBtn">下一页</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Mock Data
        const mockData = [
            { id: 1, name: '龙湖天街', area: '朝阳区', type: '住宅', price: '68000', status: 'online', createTime: '2026-03-15', statusText: '已上线' },
            { id: 2, name: '万科城市之光', area: '海淀区', type: '住宅', price: '85000', status: 'online', createTime: '2026-03-12', statusText: '已上线' },
            { id: 3, name: '华润大厦', area: '朝阳区', type: '写字楼', price: '120000', status: 'pending', createTime: '2026-04-10', statusText: '待审核' },
            { id: 4, name: '中海寰宇天下', area: '丰台区', type: '住宅', price: '75000', status: 'approved', createTime: '2026-04-08', statusText: '审核通过' },
            { id: 5, name: '保利中央公园', area: '朝阳区', type: '商业', price: '95000', status: 'rejected', createTime: '2026-04-05', statusText: '已驳回' },
            { id: 6, name: '金地格林小镇', area: '海淀区', type: '住宅', price: '62000', status: 'offline', createTime: '2026-03-20', statusText: '已下线' },
            { id: 7, name: '远洋lavie', area: '朝阳区', type: '住宅', price: '180000', status: 'draft', createTime: '2026-04-11', statusText: '草稿' },
            { id: 8, name: '融创壹号院', area: '丰台区', type: '住宅', price: '88000', status: 'online', createTime: '2026-03-18', statusText: '已上线' },
            { id: 9, name: '绿地中心', area: '海淀区', type: '写字楼', price: '110000', status: 'pending', createTime: '2026-04-09', statusText: '待审核' },
            { id: 10, name: '招商蛇口', area: '朝阳区', type: '住宅', price: '72000', status: 'approved', createTime: '2026-04-07', statusText: '审核通过' },
        ];

        let currentStatus = 'all';
        let currentPage = 1;
        const pageSize = 10;

        function getStatusClass(status) {
            const classes = {
                draft: 'bg-gray-100 text-gray-600',
                pending: 'bg-orange-100 text-warning',
                approved: 'bg-blue-100 text-blue-600',
                rejected: 'bg-red-100 text-danger',
                online: 'bg-green-100 text-success',
                offline: 'bg-gray-100 text-gray-500'
            };
            return classes[status] || classes.draft;
        }

        function getActions(status) {
            const allActions = {
                draft: ['edit', 'view', 'delete'],
                pending: ['approve', 'view'],
                approved: ['online', 'view', 'delete'],
                rejected: ['edit', 'view', 'delete'],
                online: ['offline', 'view'],
                offline: ['online', 'view', 'delete']
            };
            return allActions[status] || [];
        }

        function getActionBtn(action, id) {
            const actions = {
                edit: '<button class="text-primary hover:text-blue-700 mr-3" onclick="handleAction(\'edit\', ' + id + ')"><i class="fas fa-edit"></i> 编辑</button>',
                view: '<button class="text-gray-500 hover:text-gray-700 mr-3" onclick="handleAction(\'view\', ' + id + ')"><i class="fas fa-eye"></i> 查看</button>',
                delete: '<button class="text-danger hover:text-red-700" onclick="handleAction(\'delete\', ' + id + ')"><i class="fas fa-trash-alt"></i> 删除</button>',
                approve: '<button class="text-success hover:text-green-700 mr-3" onclick="handleAction(\'approve\', ' + id + ')"><i class="fas fa-check"></i> 审核</button>',
                online: '<button class="text-success hover:text-green-700 mr-3" onclick="handleAction(\'online\', ' + id + ')"><i class="fas fa-globe"></i> 上线</button>',
                offline: '<button class="text-gray-500 hover:text-gray-700 mr-3" onclick="handleAction(\'offline\', ' + id + ')"><i class="fas fa-power-off"></i> 下线</button>'
            };
            return actions[action] || '';
        }

        function renderTable() {
            let filtered = mockData;
            if (currentStatus !== 'all') {
                filtered = mockData.filter(item => item.status === currentStatus);
            }

            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            if (searchValue) {
                filtered = filtered.filter(item => item.name.toLowerCase().includes(searchValue));
            }

            document.getElementById('totalCount').textContent = filtered.length;
            document.getElementById('totalPages').textContent = Math.ceil(filtered.length / pageSize) || 1;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filtered.map(item => {
                const actions = getActions(item.status);
                const actionBtns = actions.map(a => getActionBtn(a, item.id)).join('');
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm font-medium text-gray-800">${item.name}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${item.area}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${item.type}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">¥${item.price}/㎡</td>
                        <td class="px-4 py-3 text-sm">
                            <span class="px-2 py-1 rounded-full text-xs ${getStatusClass(item.status)}">${item.statusText}</span>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-600">${item.createTime}</td>
                        <td class="px-4 py-3 text-sm">${actionBtns}</td>
                    </tr>
                `;
            }).join('');
        }

        function handleAction(action, id) {
            const item = mockData.find(d => d.id === id);
            alert(`${action}: ${item ? item.name : id}`);
        }

        // Status Tab Click
        document.querySelectorAll('.status-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.status-tab').forEach(t => {
                    t.classList.remove('border-primary', 'text-primary');
                    t.classList.add('border-transparent', 'text-gray-500');
                });
                this.classList.remove('border-transparent', 'text-gray-500');
                this.classList.add('border-primary', 'text-primary');
                currentStatus = this.dataset.status;
                renderTable();
            });
        });

        // Search Input
        document.getElementById('searchInput').addEventListener('input', renderTable);

        // Pagination
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                document.getElementById('currentPage').textContent = currentPage;
                renderTable();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            const totalPages = Math.ceil(mockData.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                document.getElementById('currentPage').textContent = currentPage;
                renderTable();
            }
        });

        // Initial render
        renderTable();
    </script>
</body>
</html>
