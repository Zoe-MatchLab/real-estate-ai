<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑楼盘 - 房产AI作业平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        purple: '#9B5DE5',
                        dark: '#1D2129',
                        'gray-light': '#F2F3F5',
                    }
                }
            }
        }
    </script>
    <style>
        .section-card { border-left: 3px solid #165DFF; }
        .required-field::after { content: ' *'; color: #F53F3F; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm fixed top-0 left-0 right-0 z-50">
        <div class="flex justify-between items-center px-6 py-3">
            <div class="flex items-center space-x-2">
                <i class="fa fa-home text-primary text-2xl"></i>
                <span class="text-xl font-bold text-dark">房产AI作业平台</span>
                <span class="text-sm text-gray-500 ml-2">管理后台</span>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-gray-600 hover:text-primary">
                    <i class="fa fa-bell-o text-lg"></i>
                    <span class="absolute top-2 right-16 bg-danger text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">3</span>
                </button>
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center">管</div>
                    <span class="text-sm font-medium">区域经理</span>
                    <i class="fa fa-angle-down text-gray-400"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex pt-14">
                <aside class="w-64 bg-white h-[calc(100vh-56px)] fixed left-0 shadow-sm">
            <nav class="py-4">
                <div class="px-4 py-2 text-xs text-gray-400 uppercase font-medium">功能菜单</div>
                <a href="../material/new-house-list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-building-o w-5 text-center"></i>
                    <span class="ml-3">新盘管理</span>
                </a>
                <a href="../task/task-manage.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-tasks w-5 text-center"></i>
                    <span class="ml-3">探盘任务</span>
                </a>
                <a href="../generation/material-generation.html" class="flex items-center px-4 py-3 text-primary bg-blue-50 border-r-4 border-primary">
                    <i class="fa fa-cubes w-5 text-center"></i>
                    <span class="ml-3">物料管理</span>
                </a>
                <a href="../record/record-list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-microphone w-5 text-center"></i>
                    <span class="ml-3">录音分析</span>
                </a>
                <a href="../customer/customer-list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-users w-5 text-center"></i>
                    <span class="ml-3">客户管理</span>
                </a>
                <a href="board/data-dashboard.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-line-chart w-5 text-center"></i>
                    <span class="ml-3">数据看板</span>
                </a>
            </nav>
        </aside>


        <main class="ml-64 flex-1 p-6">
            <!-- 面包屑 -->
            <div class="mb-4 text-sm">
                <a href="material-manage.html" class="text-primary hover:underline">新盘管理</a>
                <span class="mx-2 text-gray-400">/</span>
                <span class="text-gray-500">编辑楼盘</span>
            </div>

            <!-- 页面标题 -->
            <div class="mb-6 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-dark">编辑楼盘</h1>
                    <p class="text-gray-500 mt-1">完善楼盘信息，提交审核后即可上线</p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="saveDraft()" class="px-4 py-2 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-50 flex items-center">
                        <i class="fa fa-save mr-2"></i> 保存草稿
                    </button>
                    <button onclick="submitAudit()" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 flex items-center">
                        <i class="fa fa-paper-plane mr-2"></i> 提交审核
                    </button>
                </div>
            </div>

            <!-- 表单区域 -->
            <div class="space-y-6">
                <!-- 基本信息 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-info-circle text-primary mr-2"></i>
                        基本信息
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1 required-field">楼盘名称</label>
                            <input type="text" value="中海汇德里" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">楼盘别名</label>
                            <input type="text" placeholder="选填" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1 required-field">开发商</label>
                            <input type="text" value="中海地产" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">物业公司</label>
                            <input type="text" placeholder="选填" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">物业费</label>
                            <div class="flex">
                                <input type="number" placeholder="5.8" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm rounded-r-none">
                                <span class="px-3 py-2 border border-l-0 border-gray-200 rounded-r-lg bg-gray-50 text-sm text-gray-500">元/㎡/月</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1 required-field">开盘时间</label>
                            <input type="date" value="2025-12-15" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1 required-field">交房时间</label>
                            <input type="date" value="2027-06-30" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">产权年限</label>
                            <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                                <option value="70" selected>70年</option>
                                <option value="50">50年</option>
                                <option value="40">40年</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">总户数</label>
                            <input type="number" placeholder="1200" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">总楼栋数</label>
                            <input type="number" placeholder="15" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">车位数量</label>
                            <input type="number" placeholder="1500" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">装修情况</label>
                            <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                                <option value="精装" selected>精装交付</option>
                                <option value="毛坯">毛坯交付</option>
                                <option value="简装">简装交付</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 位置信息 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-map-marker text-success mr-2"></i>
                        位置信息
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1 required-field">所属区域</label>
                            <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                                <option value="hd" selected>海淀区</option>
                                <option value="cy">朝阳区</option>
                                <option value="xc">西城区</option>
                                <option value="dc">东城区</option>
                                <option value="cp">昌平区</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">所属板块</label>
                            <input type="text" placeholder="中关村" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-1 required-field">详细地址</label>
                            <input type="text" value="北京市海淀区中关村大街1号院" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">纬度</label>
                            <input type="text" placeholder="39.984" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">经度</label>
                            <input type="text" placeholder="116.312" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">距离地铁</label>
                            <div class="flex">
                                <input type="number" placeholder="300" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm rounded-r-none">
                                <span class="px-3 py-2 border border-l-0 border-gray-200 rounded-r-lg bg-gray-50 text-sm text-gray-500">米</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">最近地铁站</label>
                            <input type="text" placeholder="中关村站" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                    </div>
                </div>

                <!-- 销售信息 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-yen text-warning mr-2"></i>
                        销售信息
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1 required-field">销售状态</label>
                            <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                                <option value="pre">待开盘</option>
                                <option value="onsale" selected>在售</option>
                                <option value="last">尾盘</option>
                                <option value="soldout">售罄</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1 required-field">参考均价</label>
                            <div class="flex">
                                <input type="number" placeholder="83000" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm rounded-r-none">
                                <span class="px-3 py-2 border border-l-0 border-gray-200 rounded-r-lg bg-gray-50 text-sm text-gray-500">元/㎡</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">总价范围</label>
                            <input type="text" placeholder="680-1200万" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">定金金额</label>
                            <div class="flex">
                                <input type="number" placeholder="5" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm rounded-r-none">
                                <span class="px-3 py-2 border border-l-0 border-gray-200 rounded-r-lg bg-gray-50 text-sm text-gray-500">万</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">认购签约</label>
                            <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                                <option value="online" selected>需线上签约</option>
                                <option value="offline">线下签约</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">折扣方案</label>
                            <input type="text" placeholder="限时98折" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">付款方式</label>
                            <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                                <option value="all" selected>一次性/商贷/公积金</option>
                                <option value="loan">仅商贷</option>
                                <option value="fund">仅公积金</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">贷款银行</label>
                            <input type="text" placeholder="中国银行、工商银行" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                    </div>
                </div>

                <!-- 建筑信息 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-building text-purple mr-2"></i>
                        建筑信息
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">建筑面积</label>
                            <div class="flex">
                                <input type="number" placeholder="150000" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm rounded-r-none">
                                <span class="px-3 py-2 border border-l-0 border-gray-200 rounded-r-lg bg-gray-50 text-sm text-gray-500">㎡</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">占地面积</label>
                            <div class="flex">
                                <input type="number" placeholder="60000" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm rounded-r-none">
                                <span class="px-3 py-2 border border-l-0 border-gray-200 rounded-r-lg bg-gray-50 text-sm text-gray-500">㎡</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">绿化率</label>
                            <div class="flex">
                                <input type="number" placeholder="35" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm rounded-r-none">
                                <span class="px-3 py-2 border border-l-0 border-gray-200 rounded-r-lg bg-gray-50 text-sm text-gray-500">%</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">容积率</label>
                            <input type="number" step="0.1" placeholder="2.5" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">建筑类型</label>
                            <input type="text" placeholder="高层、板楼" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">建筑结构</label>
                            <input type="text" placeholder="钢筋混凝土" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">楼层高度</label>
                            <input type="text" placeholder="地上28层/地下2层" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">梯户比例</label>
                            <input type="text" placeholder="2梯4户" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                    </div>
                </div>

                <!-- 户型信息 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-th-large text-cyan mr-2"></i>
                        户型信息
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">户型一</label>
                            <input type="text" placeholder="77㎡ 两室一厅" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">户型二</label>
                            <input type="text" placeholder="99㎡ 三室两厅" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">户型三</label>
                            <input type="text" placeholder="120㎡ 三室两厅" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">户型四</label>
                            <input type="text" placeholder="140㎡ 四室两厅" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">户型五</label>
                            <input type="text" placeholder="180㎡ 四室三厅" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">得房率</label>
                            <input type="text" placeholder="78-82%" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">朝向</label>
                            <input type="text" placeholder="南北通透" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">层高</label>
                            <div class="flex">
                                <input type="number" placeholder="2.9" step="0.1" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm rounded-r-none">
                                <span class="px-3 py-2 border border-l-0 border-gray-200 rounded-r-lg bg-gray-50 text-sm text-gray-500">米</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 周边配套 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-hospital-o text-orange mr-2"></i>
                        周边配套
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">教育配套</label>
                            <input type="text" placeholder="人大附中、北大附小" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">医疗配套</label>
                            <input type="text" placeholder="北京大学第三医院" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">商业配套</label>
                            <input type="text" placeholder="中关村购物中心" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">公园配套</label>
                            <input type="text" placeholder="中关村公园、海淀公园" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div class="col-span-4">
                            <label class="block text-sm text-gray-600 mb-1">其他配套</label>
                            <textarea rows="2" placeholder="请输入其他配套信息" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"></textarea>
                        </div>
                    </div>
                </div>

                <!-- 销售道具 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-file-text-o text-pink mr-2"></i>
                        销售道具
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">沙盘模型</label>
                            <div class="flex items-center mt-2">
                                <label class="flex items-center mr-4">
                                    <input type="radio" name="model" value="1" checked class="mr-1"> 有
                                </label>
                                <label class="flex items-center">
                                    <input type="radio" name="model" value="0" class="mr-1"> 无
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">样板间</label>
                            <div class="flex items-center mt-2">
                                <label class="flex items-center mr-4">
                                    <input type="radio" name="showroom" value="1" checked class="mr-1"> 有
                                </label>
                                <label class="flex items-center">
                                    <input type="radio" name="showroom" value="0" class="mr-1"> 无
                                </label>
                            </div>
                        </div>
                        <div>

                <!-- 经纪人信息 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-user text-red mr-2"></i>
                        经纪人信息
                    </h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">驻场销售</label>
                            <input type="text" placeholder="姓名 电话" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">外联人员</label>
                            <input type="text" placeholder="姓名 电话" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">渠道对接</label>
                            <input type="text" placeholder="姓名 电话" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>

                            <input type="text" placeholder="010-82345678" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">

                <!-- 图片库 -->
                <div class="bg-white rounded-lg shadow-sm p-6 section-card">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-images text-primary mr-2"></i>
                        图片库
                    </h3>
                    
                    <!-- 图片分类Tab -->
                    <div class="flex flex-wrap gap-2 mb-4 border-b pb-3">
                        <button onclick="switchImageCategory('location')" class="image-tab px-3 py-1.5 text-sm rounded-lg bg-primary text-white" data-category="location">
                            区位图
                        </button>
                        <button onclick="switchImageCategory('sandtable')" class="image-tab px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200" data-category="sandtable">
                            沙盘图
                        </button>
                        <button onclick="switchImageCategory('floorplan')" class="image-tab px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200" data-category="floorplan">
                            户型图
                        </button>
                        <button onclick="switchImageCategory('sample')" class="image-tab px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200" data-category="sample">
                            样板间图
                        </button>
                        <button onclick="switchImageCategory('garden')" class="image-tab px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200" data-category="garden">
                            园林效果图/实景图
                        </button>
                        <button onclick="switchImageCategory('facade')" class="image-tab px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200" data-category="facade">
                            建筑立面效果图/实景图
                        </button>
                        <button onclick="switchImageCategory('surrounding')" class="image-tab px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200" data-category="surrounding">
                            周边配套图
                        </button>
                        <button onclick="switchImageCategory('team')" class="image-tab px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200" data-category="team">
                            物业团队图片
                        </button>
                    </div>
                    
                    <!-- 当前分类图片 -->
                    <div id="imageCategoryContent">
                        <!-- 区位图 -->
                        <div id="category-location" class="image-category-content">
                            <div class="flex justify-between items-center mb-3">
                                <p class="text-sm text-gray-500">支持 JPG、PNG，每张不超过 5MB</p>
                                <span class="text-xs text-gray-400">已上传 <span id="count-location">0</span> 张</span>
                            </div>
                            <div class="grid grid-cols-4 gap-4" id="imageGrid-location">
                                <!-- 示例图片占位 -->
                            </div>
                            <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-primary transition-colors cursor-pointer mt-4" onclick="openImageUpload('location')">
                                <i class="fa fa-cloud-upload text-3xl text-gray-400 mb-2"></i>
                                <p class="text-sm text-gray-500">点击或拖拽上传区位图</p>
                            </div>
                        </div>
                    </div>
                </div>

                <style>
                    .image-tab.active {
                        background-color: #165DFF !important;
                        color: white !important;
                    }
                </style>

                <script>
                    // 图片库数据
                    const imageLibrary = {
                        location: [],
                        sandtable: [],
                        floorplan: [],
                        sample: [],
                        garden: [],
                        facade: [],
                        surrounding: [],
                        team: []
                    };

                    let currentImageCategory = 'location';

                    // 切换图片分类
                    function switchImageCategory(category) {
                        currentImageCategory = category;
                        
                        // 更新Tab样式
                        document.querySelectorAll('.image-tab').forEach(tab => {
                            tab.classList.remove('active');
                            tab.classList.remove('bg-primary');
                            tab.classList.remove('text-white');
                            tab.classList.add('bg-gray-100');
                            tab.classList.add('text-gray-600');
                        });
                        const activeTab = document.querySelector(`[data-category="${category}"]`);
                        if (activeTab) {
                            activeTab.classList.add('active');
                        }
                        
                        // 隐藏所有分类内容
                        document.querySelectorAll('.image-category-content').forEach(content => {
                            content.style.display = 'none';
                        });
                        
                        // 显示当前分类内容
                        const categoryContent = document.getElementById(`category-${category}`);
                        if (categoryContent) {
                            categoryContent.style.display = 'block';
                        }
                        
                        // 更新计数
                        const count = imageLibrary[category] ? imageLibrary[category].length : 0;
                        const countEl = document.getElementById(`count-${category}`);
                        if (countEl) {
                            countEl.textContent = count;
                        }
                        
                        // 渲染图片网格
                        renderImageGrid(category);
                    }

                    // 渲染图片网格
                    function renderImageGrid(category) {
                        const grid = document.getElementById(`imageGrid-${category}`);
                        if (!grid) return;
                        
                        const images = imageLibrary[category] || [];
                        if (images.length === 0) {
                            grid.innerHTML = '<div class="col-span-4 text-center text-gray-400 py-8">暂无图片，请上传</div>';
                            return;
                        }
                        
                        grid.innerHTML = images.map((img, index) => `
                            <div class="relative group">
                                <div class="aspect-[4/3] bg-gray-100 rounded-lg overflow-hidden border border-gray-200">
                                    <img src="${img.url || img}" alt="" class="w-full h-full object-cover">
                                </div>
                                <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 rounded-lg">
                                    <button onclick="previewImage('${category}', ${index})" class="w-8 h-8 bg-white rounded-full flex items-center justify-center hover:bg-gray-100">
                                        <i class="fa fa-eye text-gray-600"></i>
                                    </button>
                                    <button onclick="deleteImage('${category}', ${index})" class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center hover:bg-red-600">
                                        <i class="fa fa-trash text-white"></i>
                                    </button>
                                </div>
                            </div>
                        `).join('');
                    }

                    // 打开图片上传
                    function openImageUpload(category) {
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.accept = 'image/*';
                        input.multiple = true;
                        input.onchange = (e) => {
                            const files = e.target.files;
                            for (let file of files) {
                                if (file.size > 5 * 1024 * 1024) {
                                    alert('图片大小不能超过 5MB');
                                    continue;
                                }
                                const reader = new FileReader();
                                reader.onload = (e) => {
                                    imageLibrary[category].push(e.target.result);
                                    renderImageGrid(category);
                                    updateImageCount(category);
                                };
                                reader.readAsDataURL(file);
                            }
                        };
                        input.click();
                    }

                    // 删除图片
                    function deleteImage(category, index) {
                        if (confirm('确定要删除这张图片吗？')) {
                            imageLibrary[category].splice(index, 1);
                            renderImageGrid(category);
                            updateImageCount(category);
                        }
                    }

                    // 预览图片
                    function previewImage(category, index) {
                        const img = imageLibrary[category][index];
                        window.open(img.url || img, '_blank');
                    }

                    // 更新图片计数
                    function updateImageCount(category) {
                        const count = imageLibrary[category] ? imageLibrary[category].length : 0;
                        const countEl = document.getElementById(`count-${category}`);
                        if (countEl) {
                            countEl.textContent = count;
                        }
                    }

                    // 初始化
                    document.addEventListener('DOMContentLoaded', function() {
                        switchImageCategory('location');
                    });
                </script>

                <!-- 底部操作 -->
                <div class="bg-white rounded-lg shadow-sm p-6 flex justify-end gap-3">
                    <button onclick="window.location.href='material-manage.html'" class="px-6 py-2 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-50">
                        取消
                    </button>
                    <button onclick="saveDraft()" class="px-6 py-2 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-50">
                        保存草稿
                    </button>
                    <button onclick="submitAudit()" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">
                        提交审核
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 提交审核确认弹窗 -->
    <div id="submitModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg w-[450px] p-6">
            <div class="text-center">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa fa-paper-plane text-blue-500 text-xl"></i>
                </div>
                <h3 class="text-lg font-bold mb-2">确认提交审核</h3>
                <p class="text-gray-500 mb-6">提交后将由审核人员进行检查，通过后即可上线</p>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-2 text-left">提交备注（选填）</label>
                    <textarea rows="3" placeholder="请输入提交备注" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"></textarea>
                </div>
                <div class="flex justify-center gap-3">
                    <button onclick="closeSubmitModal()" class="px-4 py-2 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50">取消</button>
                    <button onclick="confirmSubmit()" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">确认提交</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 保存草稿
        function saveDraft() {
            alert('草稿保存成功');
        }

        // 提交审核
        function submitAudit() {
            document.getElementById('submitModal').classList.remove('hidden');
            document.getElementById('submitModal').classList.add('flex');
        }

        function closeSubmitModal() {
            document.getElementById('submitModal').classList.add('hidden');
            document.getElementById('submitModal').classList.remove('flex');
        }

        function confirmSubmit() {
            window.location.href = 'material-manage.html';
        }
    </script>
</body>
