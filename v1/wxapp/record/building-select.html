<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>选择楼盘 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-dark: #E67A0E;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-warning: #FF7D00;
            --color-danger: #FA5151;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100vh;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* 顶部导航 */
        .nav-bar {
            height: 44px;
            background: white;
            padding: 0 var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            border-bottom: 1px solid #F0F0F0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-back {
            color: var(--brand-primary);
            font-size: 16px;
            padding: var(--spacing-xs);
            text-decoration: none;
        }

        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-title);
            margin-right: 32px;
        }

        /* 搜索框 */
        .search-section {
            padding: var(--spacing-md);
            background: white;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: var(--color-bg);
            border-radius: var(--radius-xl);
            padding: var(--spacing-sm) var(--spacing-md);
        }

        .search-wrap i {
            color: var(--color-sub);
            font-size: 14px;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--color-title);
            outline: none;
        }

        .search-input::placeholder {
            color: var(--color-sub);
        }

        /* 列表 */
        .list-section {
            padding: 0 var(--spacing-md);
        }

        .select-item {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            user-select: none;
        }

        .select-item:active {
            transform: scale(0.99);
        }

        .select-item.selected {
            background: var(--brand-primary-light);
            box-shadow: 0 0 0 2px var(--brand-primary);
        }

        /* 圆形单选框 */
        .radio-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .radio-circle i {
            font-size: 12px;
            color: white;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .select-item.selected .radio-circle {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
        }

        .select-item.selected .radio-circle i {
            opacity: 1;
        }

        /* 楼盘信息 */
        .building-info {
            flex: 1;
            min-width: 0;
        }

        .building-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
        }

        .building-meta {
            font-size: 12px;
            color: var(--color-sub);
            margin-top: 2px;
        }

        /* 底部确认栏 */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: var(--spacing-md);
            padding-bottom: calc(var(--spacing-md) + env(safe-area-inset-bottom));
            box-shadow: 0 -1px 8px rgba(0,0,0,0.06);
            z-index: 200;
        }

        .confirm-btn {
            width: 100%;
            height: 48px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-xl);
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .confirm-btn:disabled {
            background: var(--color-border);
            color: var(--color-sub);
            cursor: not-allowed;
        }

        .confirm-btn:not(:disabled):active {
            opacity: 0.85;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeInUp 0.3s ease forwards; }
    </style>
</head>
<body>
    <div class="page">
        <!-- 顶部导航 -->
        <div class="nav-bar">
            <a href="javascript:history.back();" class="nav-back"><i class="fa fa-chevron-left"></i></a>
            <div class="nav-title">选择楼盘</div>
        </div>

        <!-- 搜索框 -->
        <div class="search-section">
            <div class="search-wrap">
                <i class="fa fa-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索楼盘名称" />
            </div>
        </div>

        <!-- 楼盘列表 -->
        <div class="list-section" id="buildingList"></div>
    </div>

    <!-- 底部确认按钮 -->
    <div class="bottom-bar">
        <button class="confirm-btn" id="confirmBtn" disabled onclick="doConfirm()">
            确定
        </button>
    </div>

    <script>
        // 楼盘数据
        const buildingData = [
            { id: 'B001', name: '中海汇德里', area: '浦东新区', decoration: '精装交付' },
            { id: 'B002', name: '万科翡翠公园', area: '浦西', decoration: '毛坯交付' },
            { id: 'B003', name: '龙湖天街', area: '徐汇区', decoration: '部分装修' }
        ];

        let selectedId = null;

        function renderList(keyword) {
            const list = document.getElementById('buildingList');
            const filtered = keyword
                ? buildingData.filter(b => b.name.includes(keyword))
                : buildingData;

            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--color-sub);font-size:14px;">未找到相关楼盘</div>';
                return;
            }

            list.innerHTML = filtered.map((b, idx) => {
                const selected = b.id === selectedId;
                return '<div class="select-item animate-in ' + (selected ? 'selected' : '') + '" ' +
                    'style="animation-delay:' + (idx * 0.05) + 's" ' +
                    'onclick="selectItem(\'' + b.id + '\')">' +
                    '<div class="radio-circle">' +
                    '<i class="fa fa-check"></i>' +
                    '</div>' +
                    '<div class="building-info">' +
                    '<div class="building-name">' + b.name + '</div>' +
                    '<div class="building-meta">' + b.area + ' · ' + b.decoration + '</div>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        function selectItem(id) {
            selectedId = id;
            renderList(document.getElementById('searchInput').value);
            document.getElementById('confirmBtn').disabled = false;
        }

        function doConfirm() {
            if (!selectedId) return;
            const building = buildingData.find(b => b.id === selectedId);
            if (building) {
                // 将选中数据存到会话存储，返回时由详情页读取
                sessionStorage.setItem('selectedBuilding', JSON.stringify(building));
                showToast('已选择: ' + building.name);
            }
            history.back();
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 200);
            }, 1500);
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderList(e.target.value);
        });

        document.addEventListener('DOMContentLoaded', function() {
            renderList('');
        });
    </script>
</body>
</html>
