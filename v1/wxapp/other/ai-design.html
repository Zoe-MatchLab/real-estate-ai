<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI设计工具 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --brand-primary-dark: #E67A0E;
            --color-success: #00B42A;
            --color-success-light: #F6FFED;
            --color-warning: #FF7D00;
            --color-warning-light: #FFF7E6;
            --color-info: #165DFF;
            --color-info-light: #E8F3FF;
            --color-danger: #FA5151;
            --color-purple: #722ED1;
            --color-purple-light: #F7F0FF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        button:focus-visible, a:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* ========== 顶部导航栏 ========== */
        .nav-bar {
            background: linear-gradient(135deg, var(--brand-primary) 0%, #FF9500 100%);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            display: flex;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-back {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: var(--radius-lg);
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .nav-back:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }

        .nav-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            margin: 0 var(--spacing-md);
        }

        .nav-placeholder {
            width: 36px;
        }

        /* ========== 页面内容 ========== */
        .page-content {
            padding: var(--spacing-md);
            padding-bottom: calc(var(--spacing-xl) + env(safe-area-inset-bottom));
        }

        /* ========== 功能入口网格 ========== */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-md);
            padding-left: var(--spacing-xs);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .feature-card {
            background: var(--color-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition-normal);
            border: none;
            width: 100%;
            text-align: left;
        }

        .feature-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-md);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: var(--spacing-md);
        }

        .feature-icon.orange {
            background: var(--brand-primary-light);
            color: var(--brand-primary);
        }

        .feature-icon.green {
            background: var(--color-success-light);
            color: var(--color-success);
        }

        .feature-icon.blue {
            background: var(--color-info-light);
            color: var(--color-info);
        }

        .feature-icon.purple {
            background: var(--color-purple-light);
            color: var(--color-purple);
        }

        .feature-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-xs);
        }

        .feature-desc {
            font-size: 12px;
            color: var(--color-sub);
            line-height: 1.4;
        }

        /* ========== 模板推荐 ========== */
        .template-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .template-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            background: var(--color-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
            width: 100%;
            text-align: left;
        }

        .template-item:active {
            background: var(--brand-primary-light);
        }

        .template-thumb {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .template-info {
            flex: 1;
            min-width: 0;
        }

        .template-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-title);
            margin-bottom: 2px;
        }

        .template-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .template-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: var(--color-bg);
            border-radius: var(--radius-sm);
            color: var(--color-sub);
        }

        .template-arrow {
            color: var(--color-sub);
            font-size: 14px;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="nav-bar">
        <a href="javascript:history.back()" class="nav-back" aria-label="返回">
            <i class="fa fa-angle-left" style="font-size: 22px"></i>
        </a>
        <span class="nav-title">AI设计工具</span>
        <div class="nav-placeholder"></div>
    </div>

    <!-- 页面内容 -->
    <div class="page-content">
        <!-- 功能入口 -->
        <div class="section-title">设计工具</div>
        <div class="feature-grid">
            <button class="feature-card" onclick="openTool('海报设计')">
                <div class="feature-icon orange">
                    <i class="fa fa-image"></i>
                </div>
                <div class="feature-name">海报设计</div>
                <div class="feature-desc">AI智能生成房产推广海报</div>
            </button>
            
            <button class="feature-card" onclick="openTool('朋友圈配图')">
                <div class="feature-icon green">
                    <i class="fa fa-photo"></i>
                </div>
                <div class="feature-name">朋友圈配图</div>
                <div class="feature-desc">一键生成精美朋友圈素材</div>
            </button>
            
            <button class="feature-card" onclick="openTool('户型图美化')">
                <div class="feature-icon blue">
                    <i class="fa fa-th-large"></i>
                </div>
                <div class="feature-name">户型图美化</div>
                <div class="feature-desc">AI优化户型图展示效果</div>
            </button>
            
            <button class="feature-card" onclick="openTool('视频剪辑')">
                <div class="feature-icon purple">
                    <i class="fa fa-video-camera"></i>
                </div>
                <div class="feature-name">视频剪辑</div>
                <div class="feature-desc">智能剪辑探盘视频片段</div>
            </button>
        </div>

        <!-- 精选模板 -->
        <div class="section-title">精选模板</div>
        <div class="template-list">
            <button class="template-item" onclick="openTemplate('新盘首发')">
                <div class="template-thumb">🏠</div>
                <div class="template-info">
                    <div class="template-name">新盘首发海报</div>
                    <div class="template-tags">
                        <span class="template-tag">新盘</span>
                        <span class="template-tag">首发</span>
                        <span class="template-tag">热销</span>
                    </div>
                </div>
                <i class="fa fa-angle-right template-arrow"></i>
            </button>
            
            <button class="template-item" onclick="openTemplate('周末特惠')">
                <div class="template-thumb">🎉</div>
                <div class="template-info">
                    <div class="template-name">周末特惠活动</div>
                    <div class="template-tags">
                        <span class="template-tag">特惠</span>
                        <span class="template-tag">促销</span>
                        <span class="template-tag">限时</span>
                    </div>
                </div>
                <i class="fa fa-angle-right template-arrow"></i>
            </button>
            
            <button class="template-item" onclick="openTemplate('楼盘预告')">
                <div class="template-thumb">📢</div>
                <div class="template-info">
                    <div class="template-name">楼盘开盘预告</div>
                    <div class="template-tags">
                        <span class="template-tag">开盘</span>
                        <span class="template-tag">预告</span>
                        <span class="template-tag">预约</span>
                    </div>
                </div>
                <i class="fa fa-angle-right template-arrow"></i>
            </button>
            
            <button class="template-item" onclick="openTemplate('探盘日记')">
                <div class="template-thumb">📷</div>
                <div class="template-info">
                    <div class="template-name">探盘日记视频</div>
                    <div class="template-tags">
                        <span class="template-tag">探盘</span>
                        <span class="template-tag">Vlog</span>
                        <span class="template-tag">实拍</span>
                    </div>
                </div>
                <i class="fa fa-angle-right template-arrow"></i>
            </button>
        </div>
    </div>

    <script>
        function openTool(name) {
            showToast('正在打开：' + name);
        }

        function openTemplate(name) {
            showToast('正在加载：' + name);
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
