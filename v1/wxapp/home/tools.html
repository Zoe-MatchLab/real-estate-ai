<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>服务工具 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-dark: #E67A0E;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-warning: #FF7D00;
            --color-danger: #FA5151;
            --color-info: #007AFF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Focus 样式 - 可访问性 */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: #F5F5F5;
            -webkit-font-smoothing: antialiased;
        }
        
        .page {
            min-height: 100vh;
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }
        
        /* 状态栏 */
        .status-bar {
            height: 44px;
            background: white;
            padding-top: env(safe-area-inset-top);
        }
        
        /* 标题栏 */
        .title-bar {
            height: 44px;
            background: white;
            padding: 0 var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .title-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #FA8C16, #FF8C5A);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon span {
            color: white;
            font-weight: 700;
            font-size: 12px;
        }
        
        .title-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-title);
        }
        
        /* 搜索栏 */
        .search-section {
            padding: var(--spacing-md);
            background: white;
        }
        
        .search-bar {
            display: flex;
            align-items: center;
            background: #F5F5F5;
            border-radius: 22px;
            padding: 0 var(--spacing-md);
            height: 44px;
        }
        
        .search-bar i {
            color: #999;
            margin-right: var(--spacing-sm);
        }
        
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            color: #333;
        }
        
        .search-input::placeholder {
            color: #999;
        }
        
        .search-btn {
            background: linear-gradient(135deg, #FA8C16, #FF8C5A);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .search-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }
        
        /* 筛选区域 */
        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-md);
            background: white;
            margin-bottom: var(--spacing-sm);
        }
        
        .filter-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            color: #666;
            font-size: 14px;
        }
        
        .filter-right {
            display: flex;
            align-items: center;
            gap: 2px;
            color: var(--brand-primary);
            font-size: 14px;
        }
        
        /* 横幅图片 */
        .banner-section {
            padding: 0 var(--spacing-md) var(--spacing-md);
        }
        
        .banner-img {
            width: 100%;
            border-radius: var(--radius-xl);
            height: 140px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 工具网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
            padding: 0 var(--spacing-md) var(--spacing-md);
        }
        
        /* 工具卡片 */
        .tool-card {
            border-radius: var(--radius-xl);
            overflow: hidden;
            position: relative;
            background: #E8E8E8;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .tool-card:active {
            transform: scale(0.98);
        }
        
        .tool-card-img {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .tool-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            mix-blend-mode: multiply;
        }
        
        .tool-card-content {
            position: relative;
            z-index: 1;
            padding: var(--spacing-md);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 120px;
        }
        
        .tool-card-title {
            font-size: 15px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }
        
        .tool-card-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            line-height: 1.4;
        }
        
        .tool-card-collect {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            border: none;
            cursor: pointer;
            z-index: 2;
        }
        
        .tool-card-collect:active {
            transform: scale(0.9);
        }
        
        .tool-card-collect.collected {
            background: rgba(255,255,255,0.5);
        }
        
        /* 不同尺寸的工具卡片 */
        .tool-card-tall { min-height: 160px; }
        .tool-card-medium { min-height: 145px; }
        .tool-card-short { min-height: 95px; }
        
        /* 更多工具按钮 */
        .more-tools-section {
            padding: var(--spacing-md);
        }
        
        .more-tools-btn {
            width: 100%;
            padding: 14px;
            background: white;
            border: none;
            border-radius: var(--radius-xl);
            color: var(--brand-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-xs);
            box-shadow: var(--shadow-sm);
        }
        
        .more-tools-btn:active {
            transform: scale(0.98);
            background: var(--color-bg);
        }
        
        /* 底部TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 16px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.24);
            display: flex;
            gap: 4px;
        }
        
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .tab-item i {
            font-size: 20px;
        }
        
        .tab-item.active {
            background: rgba(250, 140, 22, 0.2);
            color: var(--brand-primary);
        }
        
        .tab-item:not(.active):active {
            opacity: 0.7;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        /* 通知面板 */
        .notification-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            max-height: 70vh;
            z-index: 10000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }
        
        .notification-panel.show {
            transform: translateY(0);
        }
        
        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .notification-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        .notification-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-md);
            border-bottom: 1px solid #F0F0F0;
        }
        
        .notification-header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
        }
        
        .notification-header-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        
        .notification-clear {
            font-size: 13px;
            color: var(--brand-primary);
            background: none;
            border: none;
            cursor: pointer;
        }
        
        .notification-close {
            color: #999;
            cursor: pointer;
            padding: 4px;
        }
        
        .notification-tabs {
            display: flex;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .notification-tab {
            flex: 1;
            padding: var(--spacing-sm) 0;
            font-size: 14px;
            color: #666;
            text-align: center;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
        }
        
        .notification-tab.active {
            color: var(--brand-primary);
            border-bottom-color: var(--brand-primary);
        }
        
        .notification-list {
            max-height: 50vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .notification-item {
            padding: var(--spacing-md);
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
        }
        
        .notification-item:active {
            background: var(--color-bg);
        }
        
        .notification-item.read {
            opacity: 0.6;
        }
        
        .notification-item-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: 4px;
        }
        
        .notification-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .notification-dot.unread {
            background: var(--color-danger);
        }
        
        .notification-dot.read {
            background: #CCC;
        }
        
        .notification-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-title);
        }
        
        .notification-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            margin-left: auto;
        }
        
        .notification-tag.exploration {
            background: #E8F3FF;
            color: #165DFF;
        }
        
        .notification-tag.speech {
            background: #F7F0FF;
            color: #722ED1;
        }
        
        .notification-tag.content {
            background: #FFF7E6;
            color: var(--brand-primary);
        }
        
        .notification-message {
            font-size: 13px;
            color: var(--color-text);
            margin-bottom: 4px;
        }
        
        .notification-time {
            font-size: 12px;
            color: var(--color-sub);
        }
        
        .notification-empty {
            padding: 48px 0;
            text-align: center;
            color: var(--color-sub);
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-in {
            animation: fadeInUp 0.4s ease forwards;
        }
        
        .delay-1 { animation-delay: 0.05s; opacity: 0; }
        .delay-2 { animation-delay: 0.1s; opacity: 0; }
        .delay-3 { animation-delay: 0.15s; opacity: 0; }
        .delay-4 { animation-delay: 0.2s; opacity: 0; }
    </style>
</head>
<body>
    <div class="page">
        <!-- 状态栏 -->
        <div class="status-bar"></div>
        
        <!-- 标题栏 -->
        <div class="title-bar">
            <div class="title-left">
                <div class="logo-icon">
                    <span>AI</span>
                </div>

        <!-- 搜索栏 -->

        <!-- 工具网格 -->
        <div class="tools-grid">

                    <button class="tool-card-collect" onclick="event.stopPropagation();toggleCollect(this)" aria-label="添加收藏">

                </div>
            </div>
            
            <!-- 房屋营销方案 -->

                </div>
            </div>
            
            <!-- 房源笔记生成器 -->

        <!-- 更多工具按钮 -->

            <button class="more-tools-btn" onclick="showToast('查看更多工具')">

            </button>
        </div>
    </div>

            <i class="fa fa-paint-brush" aria-hidden="true"></i>
        </a>
        <a href="claw.html" class="tab-item" role="tab" aria-label="智能助手" aria-selected="false">
            <i class="fa fa-commenting" aria-hidden="true"></i>
        </a>
        <a href="calendar.html" class="tab-item" role="tab" aria-label="任务日历" aria-selected="false">
            <i class="fa fa-calendar" aria-hidden="true"></i>
        </a>
        <a href="my.html" class="tab-item" role="tab" aria-label="个人中心" aria-selected="false">
            <i class="fa fa-user" aria-hidden="true"></i>
        </a>
    </nav>

    <!-- 通知遮罩层 -->
    <div class="notification-overlay" id="notifyOverlay" onclick="hideNotificationPanel()"></div>
    
    <!-- 通知面板 -->
    <div class="notification-panel" id="notifyPanel">
        <div class="notification-header">
            <span class="notification-header-title">通知</span>
            <div class="notification-header-actions">
                <button class="notification-clear" onclick="clearAllNotifications()">清空全部</button>
                <i class="fa fa-times notification-close" onclick="hideNotificationPanel()"></i>
            </div>
        </div>
        
        <div class="notification-tabs">
            <button class="notification-tab active" data-type="all" onclick="filterNotifications('all')">全部</button>
            <button class="notification-tab" data-type="exploration" onclick="filterNotifications('exploration')">探盘</button>
            <button class="notification-tab" data-type="speech" onclick="filterNotifications('speech')">话术</button>
            <button class="notification-tab" data-type="content" onclick="filterNotifications('content')">内容</button>
        </div>
        
        <div class="notification-list" id="notifyList">
            <!-- 动态渲染 -->
        </div>
    </div>
    
    <script>
        // Toast 提示
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -50%) scale(0.9)';
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }
        
        // 收藏切换
        function toggleCollect(btn) {
            const icon = btn.querySelector('i');
            const isAdding = icon.classList.contains('fa-plus');
            if (isAdding) {
                icon.classList.remove('fa-plus');
                icon.classList.add('fa-check');
                btn.classList.add('collected');
                btn.setAttribute('aria-label', '取消收藏');
                showToast('已添加');
            } else {
                icon.classList.remove('fa-check');
                icon.classList.add('fa-plus');
                btn.classList.remove('collected');
                btn.setAttribute('aria-label', '添加收藏');
                showToast('已移除');
            }
        }
        
        // 通知数据
        window.notificationData = [
            {
                id: 1,
                taskName: '中海汇德里探盘任务',
                taskType: 'exploration',
                message: '2/4阶段进行中，请注意完成',
                isRead: false,
                createTime: new Date()
            },
            {
                id: 2,
                taskName: '万科城市之光话术训练',
                taskType: 'speech',
                message: '新任务已下发，请及时完成',
                isRead: false,
                createTime: new Date(Date.now() - 10*60*1000)
            },
            {
                id: 3,
                taskName: '朋友圈文案生成',
                taskType: 'content',
                message: '等待探盘完成后执行',
                isRead: true,
                createTime: new Date(Date.now() - 24*60*60*1000)
            }
        ];
        
        // 更新Badge
        function updateBadge() {
            const badge = document.getElementById('notifyBadge');
            if (!badge) return;
            const unreadCount = (window.notificationData || []).filter(n => !n.isRead).length;
            badge.textContent = unreadCount;
            badge.style.display = unreadCount > 0 ? 'flex' : 'none';
        }
        
        // 显示通知面板
        function showNotificationPanel() {
            document.getElementById('notifyOverlay').classList.add('show');
            document.getElementById('notifyPanel').classList.add('show');
            renderNotificationList('all');
        }
        
        // 隐藏通知面板
        function hideNotificationPanel() {
            document.getElementById('notifyOverlay').classList.remove('show');
            document.getElementById('notifyPanel').classList.remove('show');
        }
        
        // 渲染通知列表
        function renderNotificationList(filterType) {
            const list = document.getElementById('notifyList');
            if (!list) return;
            const data = window.notificationData || [];
            
            const filtered = filterType === 'all' 
                ? data 
                : data.filter(item => item.taskType === filterType);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="notification-empty">暂无通知</div>';
                return;
            }
            
            const typeNames = {
                'exploration': '探盘',
                'speech': '话术',
                'content': '内容'
            };
            
            list.innerHTML = filtered.map(function(item) {
                return '<div class="notification-item ' + (item.isRead ? 'read' : '') + '" onclick="handleNotificationClick(' + item.id + ', \'' + item.taskType + '\')">' +
                    '<div class="notification-item-header">' +
                    '<span class="notification-dot ' + (item.isRead ? 'read' : 'unread') + '"></span>' +
                    '<span class="notification-name">' + item.taskName + '</span>' +
                    '<span class="notification-tag ' + item.taskType + '">' + typeNames[item.taskType] + '</span>' +
                    '</div>' +
                    '<div class="notification-message">' + item.message + '</div>' +
                    '<div class="notification-time">' + formatTime(item.createTime) + '</div>' +
                    '</div>';
            }).join('');
        }
        
        // 筛选通知
        function filterNotifications(type) {
            document.querySelectorAll('.notification-tab').forEach(function(tab) {
                tab.classList.remove('active');
                if (tab.dataset.type === type) tab.classList.add('active');
            });
            renderNotificationList(type);
        }
        
        // 处理通知点击
        function handleNotificationClick(id, type) {
            const item = window.notificationData.find(function(n) { return n.id === id; });
            if (item) item.isRead = true;
            updateBadge();
            hideNotificationPanel();
            
            if (type === 'exploration') {
                window.location.href = 'task-detail.html';
            } else if (type === 'speech') {
                window.location.href = 'speech-train.html';
            } else if (type === 'content') {
                window.location.href = 'calendar.html';
            }
        }
        
        // 清空全部通知
        function clearAllNotifications() {
            window.notificationData = [];
            updateBadge();
            renderNotificationList('all');
            showToast('已清空全部通知');
        }
        
        // 格式化时间
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return minutes + '分钟前';
            if (hours < 24) return hours + '小时前';
            if (days < 7) return days + '天前';
            return date.toLocaleDateString();
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            updateBadge();
        });
    </script>
</body>
</html>
