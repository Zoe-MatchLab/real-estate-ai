<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI工具 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-dark: #E67A0E;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-warning: #FF7D00;
            --color-danger: #FA5151;
            --color-info: #007AFF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Focus 样式 - 可访问性 */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }
        
        .page {
            min-height: 100vh;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, var(--brand-primary) 0%, #FF9500 100%);
            padding: calc(20px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-lg);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
            position: relative;
            z-index: 1;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 700;
        }
        
        .header-action {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .header-subtitle {
            font-size: 13px;
            opacity: 0.85;
            position: relative;
            z-index: 1;
        }
        
        /* 快捷入口 */
        .quick-section {
            margin: calc(-1 * var(--spacing-lg)) var(--spacing-md) var(--spacing-md);
        }
        
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-md);
            background: var(--color-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-md);
        }
        
        .quick-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-sm);
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .quick-item:active {
            transform: scale(0.95);
        }
        
        .quick-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 2px;
        }
        
        .quick-icon.blue { background: #E8F3FF; color: #165DFF; }
        .quick-icon.purple { background: #F7F0FF; color: #722ED1; }
        .quick-icon.orange { background: var(--brand-primary-light); color: var(--brand-primary); }
        .quick-icon.green { background: #F6FFED; color: var(--color-success); }
        .quick-icon.red { background: #FFF1F0; color: var(--color-danger); }
        
        .quick-label {
            font-size: 12px;
            color: var(--color-text);
        }
        
        /* 工具菜单 */
        .section {
            margin: 0 var(--spacing-md) var(--spacing-md);
        }
        
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .section-more {
            font-size: 12px;
            color: var(--color-sub);
            font-weight: normal;
        }
        
        .menu-card {
            background: var(--color-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: var(--spacing-md);
            cursor: pointer;
            transition: background 0.2s ease;
            position: relative;
        }
        
        .menu-item:active {
            background: var(--color-bg);
        }
        
        .menu-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: var(--spacing-md);
            right: var(--spacing-md);
            height: 1px;
            background: var(--color-border);
        }
        
        .menu-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: var(--spacing-md);
        }
        
        .menu-icon.blue { background: #E8F3FF; color: #165DFF; }
        .menu-icon.orange { background: var(--brand-primary-light); color: var(--brand-primary); }
        .menu-icon.indigo { background: #F0F5FF; color: #2F54EB; }
        .menu-icon.cyan { background: #E8FFFB; color: #00B5A4; }
        
        .menu-content {
            flex: 1;
        }
        
        .menu-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-title);
            margin-bottom: 2px;
        }
        
        .menu-desc {
            font-size: 12px;
            color: var(--color-sub);
        }
        
        .menu-badge {
            font-size: 11px;
            padding: 2px 8px;
            background: #FFF1F0;
            color: var(--color-danger);
            border-radius: var(--radius-full);
            margin-right: var(--spacing-sm);
        }
        
        .menu-arrow {
            color: var(--color-sub);
            font-size: 14px;
        }
        
        /* 能力提升卡片 */
        .ability-card {
            background: var(--color-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }
        
        .ability-header {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }
        
        .ability-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: var(--spacing-md);
        }
        
        .ability-info {
            flex: 1;
        }
        
        .ability-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
        }
        
        .ability-score {
            font-size: 12px;
            color: var(--color-sub);
        }
        
        .ability-btn {
            padding: 6px 12px;
            background: var(--brand-primary-light);
            color: var(--brand-primary);
            border: none;
            border-radius: var(--radius-full);
            font-size: 12px;
            cursor: pointer;
        }
        
        .ability-progress {
            margin-bottom: var(--spacing-sm);
        }
        
        .ability-progress:last-child {
            margin-bottom: 0;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .progress-label {
            font-size: 12px;
            color: var(--color-text);
        }
        
        .progress-status {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: var(--radius-sm);
        }
        
        .progress-status.done { background: #E8FFEA; color: var(--color-success); }
        .progress-status.processing { background: var(--brand-primary-light); color: var(--brand-primary); }
        .progress-status.pending { background: #F7F8FA; color: var(--color-sub); }
        
        .progress-bar {
            height: 4px;
            background: var(--color-bg);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 2px;
        }
        
        .progress-fill.done { background: var(--color-success); }
        .progress-fill.processing { background: linear-gradient(90deg, var(--brand-primary), #FF9500); }
        .progress-fill.pending { background: var(--color-sub); }
        
        /* 今日动态 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
        }
        
        .stat-card {
            background: var(--color-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        
        .stat-value.orange { color: var(--brand-primary); }
        .stat-value.green { color: var(--color-success); }
        .stat-value.gray { color: var(--color-title); }
        
        .stat-label {
            font-size: 11px;
            color: var(--color-sub);
        }
        
        /* 底部TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.24);
            display: flex;
            gap: 4px;
        }
        
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }
        
        .tab-item i {
            font-size: 20px;
        }
        
        .tab-item.active {
            background: rgba(250, 140, 22, 0.2);
            color: var(--brand-primary);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
        }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-in {
            animation: fadeInUp 0.4s ease forwards;
        }
        
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
        .delay-4 { animation-delay: 0.4s; opacity: 0; }
    </style>
</head>
<body>
    <div class="page">
        <!-- 头部 -->
        <div class="header">
            <div class="header-top">
                <span class="header-title">AI工具</span>
                <div class="header-action">
                    <i class="fa fa-bell"></i>
                </div>
            </div>
            <div class="header-subtitle">智能赋能，提升作业效率</div>
        </div>
        
        <!-- 快捷入口 -->
        <div class="quick-section">
            <div class="quick-grid animate-in delay-1">
                <div class="quick-item" onclick="showToast('跳转到探盘任务')">
                    <div class="quick-icon blue"><i class="fa fa-map-marker"></i></div>
                    <span class="quick-label">探盘任务</span>
                </div>
                <div class="quick-item" onclick="showToast('跳转到话术训练')">
                    <div class="quick-icon purple"><i class="fa fa-comments"></i></div>
                    <span class="quick-label">话术训练</span>
                </div>
                <div class="quick-item" onclick="showToast('跳转到内容生成')">
                    <div class="quick-icon green"><i class="fa fa-magic"></i></div>
                    <span class="quick-label">内容生成</span>
                </div>
                <div class="quick-item" onclick="showToast('视频生成开发中')">
                    <div class="quick-icon red"><i class="fa fa-video-camera"></i></div>
                    <span class="quick-label">视频生成</span>
                </div>
            </div>
        </div>
        
        <!-- 工具菜单 -->
        <div class="section animate-in delay-2">
            <div class="section-title">工具</div>
            <div class="menu-card">
                <div class="menu-item" onclick="showToast('跳转到任务列表')">
                    <div class="menu-icon blue"><i class="fa fa-tasks"></i></div>
                    <div class="menu-content">
                        <div class="menu-title">任务列表</div>
                        <div class="menu-desc">管理您的探盘任务</div>
                    </div>
                    <span class="menu-badge">3个待办</span>
                    <i class="fa fa-angle-right menu-arrow"></i>
                </div>
                <div class="menu-item" onclick="showToast('跳转到内容日历')">
                    <div class="menu-icon orange"><i class="fa fa-calendar"></i></div>
                    <div class="menu-content">
                        <div class="menu-title">内容日历</div>
                        <div class="menu-desc">规划内容发布时间</div>
                    </div>
                    <i class="fa fa-angle-right menu-arrow"></i>
                </div>
                <div class="menu-item" onclick="showToast('跳转到物料库')">
                    <div class="menu-icon indigo"><i class="fa fa-folder-open"></i></div>
                    <div class="menu-content">
                        <div class="menu-title">物料库</div>
                        <div class="menu-desc">管理宣传物料</div>
                    </div>
                    <i class="fa fa-angle-right menu-arrow"></i>
                </div>
                <div class="menu-item" onclick="showToast('跳转到数据统计')">
                    <div class="menu-icon cyan"><i class="fa fa-bar-chart"></i></div>
                    <div class="menu-content">
                        <div class="menu-title">数据统计</div>
                        <div class="menu-desc">查看运营数据</div>
                    </div>
                    <i class="fa fa-angle-right menu-arrow"></i>
                </div>
            </div>
        </div>
        
        <!-- 能力提升 -->
        <div class="section animate-in delay-3">
            <div class="section-title">能力提升</div>
            <div class="ability-card">
                <div class="ability-header">
                    <div class="ability-avatar">🥈</div>
                    <div class="ability-info">
                        <div class="ability-name">商圈专家</div>
                        <div class="ability-score">产品力 85分</div>
                    </div>
                    <button class="ability-btn" onclick="showToast('查看详情')">查看详情</button>
                </div>
                
                <div class="ability-progress">
                    <div class="progress-header">
                        <span class="progress-label">单盘专家</span>
                        <span class="progress-status done">已完成</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill done" style="width: 100%;"></div>
                    </div>
                </div>
                
                <div class="ability-progress">
                    <div class="progress-header">
                        <span class="progress-label">行政区专家</span>
                        <span class="progress-status processing">还差2盘</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill processing" style="width: 60%;"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 今日动态 -->
        <div class="section animate-in delay-4">
            <div class="section-title">今日动态</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value orange">1</div>
                    <div class="stat-label">进行中任务</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value green">2</div>
                    <div class="stat-label">已完成训练</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value gray">28</div>
                    <div class="stat-label">本月发布</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item active">
            <i class="fa fa-rocket"></i>
        </a>
        <a href="ai-design.html" class="tab-item">
            <i class="fa fa-paint-brush"></i>
        </a>
        <a href="claw.html" class="tab-item">
            <i class="fa fa-commenting"></i>
        </a>
        <a href="calendar.html" class="tab-item">
            <i class="fa fa-calendar"></i>
        </a>
        <a href="profile.html" class="tab-item">
            <i class="fa fa-user"></i>
        </a>
    </div>
    
    <script>
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -50%) scale(0.9)';
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }
    </script>
</body>
</html>
