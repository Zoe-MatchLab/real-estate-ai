<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的足迹 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root { --brand-primary: #FA8C16; --color-title: #1D2129; --color-sub: #86909C; --color-bg: #F7F8FA; --color-card: #FFFFFF; --spacing-md: 16px; --radius-xl: 16px; --shadow-sm: 0 1px 3px rgba(0,0,0,0.04); --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: var(--font-family); font-size: 14px; line-height: 1.5; color: #4E5969; background: var(--color-bg); -webkit-font-smoothing: antialiased; }
        body { padding-bottom: 80px; }
        .header { background: white; padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md); display: flex; align-items: center; border-bottom: 1px solid #E5E6EB; }
        .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: #4E5969; }
        .header-title { flex: 1; font-size: 17px; font-weight: 600; color: var(--color-title); text-align: center; }
        .content { padding: var(--spacing-md); }
        .date-group { margin-bottom: var(--spacing-md); }
        .date-title { font-size: 13px; color: var(--color-sub); margin-bottom: var(--spacing-sm); padding-left: 4px; }
        .record-card { background: white; border-radius: var(--radius-xl); padding: var(--spacing-md); margin-bottom: var(--spacing-sm); box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: var(--spacing-md); cursor: pointer; }
        .record-icon { width: 44px; height: 44px; background: #FFF7E6; border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .record-info { flex: 1; }
        .record-title { font-size: 14px; font-weight: 500; color: var(--color-title); margin-bottom: 2px; }
        .record-time { font-size: 12px; color: var(--color-sub); }
        .tab-bar { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: rgba(29,33,41,0.96); backdrop-filter: blur(20px); border-radius: 28px; padding: 8px 20px; z-index: 9999; display: flex; gap: 4px; }
        .tab-item { width: 44px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 18px; color: rgba(255,255,255,0.5); text-decoration: none; }
        .tab-item i { font-size: 20px; }
        .tab-item.active { background: rgba(250,140,22,0.2); color: var(--brand-primary); }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()"><i class="fa fa-angle-left" style="font-size:22px"></i></button>
        <span class="header-title">我的足迹</span>
    </div>
    <div class="content">
        <div class="date-group">
            <div class="date-title">今天</div>
            <div class="record-card">
                <div class="record-icon">📋</div>
                <div class="record-info"><div class="record-title">完成探盘任务 - 中海汇德里</div><div class="record-time">14:30</div></div>
            </div>
            <div class="record-card">
                <div class="record-icon" style="background:#F6FFED;">⚡</div>
                <div class="record-info"><div class="record-title">完成话术训练 - 万科城市之光</div><div class="record-time">11:00</div></div>
            </div>
        </div>
        <div class="date-group">
            <div class="date-title">昨天</div>
            <div class="record-card">
                <div class="record-icon" style="background:#F0F5FF;">📝</div>
                <div class="record-info"><div class="record-title">查看文案 - 开盘文案模板</div><div class="record-time">15:20</div></div>
            </div>
            <div class="record-card">
                <div class="record-icon" style="background:#FFF7E6;">🏠</div>
                <div class="record-info"><div class="record-title">浏览楼盘 - 公园壹号</div><div class="record-time">10:00</div></div>
            </div>
        </div>
    </div>
    <div class="tab-bar">
        <a href="tools.html" class="tab-item"><i class="fa fa-rocket"></i></a>
        <a href="ai-design.html" class="tab-item"><i class="fa fa-paint-brush"></i></a>
        <a href="claw.html" class="tab-item"><i class="fa fa-commenting"></i></a>
        <a href="calendar.html" class="tab-item"><i class="fa fa-calendar"></i></a>
        <a href="profile.html" class="tab-item active"><i class="fa fa-user"></i></a>
    </div>
</body>
</html>
