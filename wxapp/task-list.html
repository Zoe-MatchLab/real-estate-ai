<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>任务列表 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-warning: #FF7D00;
            --color-danger: #FA5151;
            --color-info: #165DFF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        /* Focus 样式 - 可访问性 */
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        .page {
            min-height: 100vh;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }
        
        .header {
            background: var(--color-card);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-title);
        }
        
        .header-add {
            width: 36px;
            height: 36px;
            background: var(--brand-primary);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
        }
        
        .tabs {
            display: flex;
            background: var(--color-bg);
            border-radius: var(--radius-lg);
            padding: 3px;
        }
        
        .tab {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--color-sub);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .tab.active {
            background: var(--color-card);
            color: var(--brand-primary);
            box-shadow: var(--shadow-sm);
        }
        
        .content {
            padding: var(--spacing-md);
        }
        
        .filter-bar {
            display: flex;
            gap: var(--spacing-sm);
            overflow-x: auto;
            padding-bottom: var(--spacing-md);
            -webkit-overflow-scrolling: touch;
        }
        
        .filter-bar::-webkit-scrollbar { display: none; }
        
        .filter-chip {
            flex-shrink: 0;
            padding: 6px 12px;
            background: var(--color-card);
            border-radius: var(--radius-full);
            font-size: 12px;
            color: var(--color-text);
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid var(--color-border);
            transition: all 0.2s ease;
        }
        
        .filter-chip.active {
            background: var(--brand-primary);
            color: white;
            border-color: var(--brand-primary);
        }
        
        .task-card {
            background: var(--color-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .task-card:active {
            transform: scale(0.99);
            box-shadow: var(--shadow-md);
        }
        
        .task-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }
        
        .task-card.status-progress::before { background: var(--color-info); }
        .task-card.status-pending::before { background: var(--brand-primary); }
        .task-card.status-submitted::before { background: var(--color-warning); }
        .task-card.status-completed::before { background: var(--color-success); }
        
        .task-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: var(--spacing-sm);
        }
        
        .task-title-area { flex: 1; }
        
        .task-status {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
        }
        
        .task-status.progress { background: #E8F3FF; color: var(--color-info); }
        .task-status.pending { background: var(--brand-primary-light); color: var(--brand-primary); }
        .task-status.submitted { background: #FFF7E6; color: var(--color-warning); }
        .task-status.completed { background: #E8FFEA; color: var(--color-success); }
        
        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: 2px;
        }
        
        .task-subtitle {
            font-size: 12px;
            color: var(--color-sub);
        }
        
        .task-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: var(--spacing-md);
        }
        
        .task-icon.blue { background: #E8F3FF; color: var(--color-info); }
        .task-icon.orange { background: var(--brand-primary-light); color: var(--brand-primary); }
        .task-icon i { font-size: 20px; }
        
        .task-meta {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            font-size: 12px;
            color: var(--color-sub);
            margin-bottom: var(--spacing-sm);
        }
        
        .task-meta i { margin-right: 4px; }
        
        .warning { color: var(--brand-primary); }
        
        .task-progress {
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-border);
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
        }
        
        .progress-text { font-size: 12px; color: var(--color-text); }
        .progress-percent { font-size: 13px; font-weight: 600; color: var(--brand-primary); }
        
        .progress-bar {
            height: 4px;
            background: var(--color-bg);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-primary), #FF9500);
            border-radius: 2px;
        }
        
        .task-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-border);
        }
        
        .task-time { font-size: 12px; color: var(--color-sub); }
        
        .task-step {
            font-size: 11px;
            padding: 2px 8px;
            background: var(--brand-primary-light);
            color: var(--brand-primary);
            border-radius: var(--radius-full);
        }
        
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.24);
            display: flex;
            gap: 4px;
        }
        
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
        }
        
        .tab-item i { font-size: 20px; }
        .tab-item.active { background: rgba(250, 140, 22, 0.2); color: var(--brand-primary); }

        /* 日历视图入口按钮 */
        .calendar-view-btn {
            position: fixed;
            right: var(--spacing-md);
            bottom: calc(90px + env(safe-area-inset-bottom));
            width: 48px;
            height: 48px;
            background: var(--brand-primary);
            color: white;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(250, 140, 22, 0.4);
            z-index: 1000;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-normal);
        }

        .calendar-view-btn:active {
            transform: scale(0.95);
        }

        .calendar-view-btn i {
            font-size: 20px;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
        }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="header-top">
                <span class="header-title">任务列表</span>
                <div class="header-add" onclick="showToast('新建任务')">
                    <i class="fa fa-plus"></i>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab(this, 'all')">全部</div>
                <div class="tab" onclick="switchTab(this, 'exploration')">探盘</div>
                <div class="tab" onclick="switchTab(this, 'speech')">话术</div>
                <div class="tab" onclick="switchTab(this, 'content')">内容</div>
            </div>
        </div>
        
        <div class="content">
            <div class="filter-bar">
                <div class="filter-chip active" onclick="filterByStatus('all', this)">全部</div>
                <div class="filter-chip" onclick="filterByStatus('in_progress', this)">进行中</div>
                <div class="filter-chip" onclick="filterByStatus('pending', this)">待执行</div>
                <div class="filter-chip" onclick="filterByStatus('submitted', this)">已提交</div>
                <div class="filter-chip" onclick="filterByStatus('completed', this)">已完成</div>
            </div>
            
            <div id="taskList">
                <div class="task-card status-progress" onclick="location.href='task-detail.html'">
                    <div class="task-header">
                        <div class="task-title-area">
                            <span class="task-status progress">进行中</span>
                            <div class="task-title">中海汇德里新盘探盘</div>
                            <div class="task-subtitle">共4个打卡点 · 已完成2个</div>
                        </div>
                        <div class="task-icon blue">
                            <i class="fa fa-map-marker"></i>
                        </div>
                    </div>
                    <div class="task-meta">
                        <span><i class="fa fa-map-marker"></i>上海市浦东新区</span>
                        <span class="warning"><i class="fa fa-clock-o"></i>今日18:00截止</span>
                    </div>
                    <div class="task-progress">
                        <div class="progress-header">
                            <span class="progress-text">完成进度</span>
                            <span class="progress-percent">50%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 50%;"></div>
                        </div>
                    </div>
                    <div class="task-footer">
                        <span class="task-time">截止：2026-04-01 18:00</span>
                        <span class="task-step">阶段2/4</span>
                    </div>
                </div>

                <div class="task-card status-pending" onclick="location.href='task-detail.html'">
                    <div class="task-header">
                        <div class="task-title-area">
                            <span class="task-status pending">待执行</span>
                            <div class="task-title">万科翡翠公园探盘任务</div>
                            <div class="task-subtitle">新盘待开盘</div>
                        </div>
                        <div class="task-icon orange">
                            <i class="fa fa-home"></i>
                        </div>
                    </div>
                    <div class="task-meta">
                        <span><i class="fa fa-map-marker"></i>浦东新区</span>
                        <span><i class="fa fa-clock-o"></i>明天 10:00</span>
                    </div>
                    <div class="task-footer">
                        <span class="task-time">截止：2026-04-05 18:00</span>
                    </div>
                </div>

                <div class="task-card status-submitted" onclick="location.href='task-detail.html'">
                    <div class="task-header">
                        <div class="task-title-area">
                            <span class="task-status submitted">已提交</span>
                            <div class="task-title">公园壹号探盘任务</div>
                            <div class="task-subtitle">待审核</div>
                        </div>
                        <div class="task-icon blue">
                            <i class="fa fa-check-circle"></i>
                        </div>
                    </div>
                    <div class="task-meta">
                        <span><i class="fa fa-map-marker"></i>徐汇区</span>
                        <span><i class="fa fa-clock-o"></i>已提交</span>
                    </div>
                    <div class="task-footer">
                        <span class="task-time">提交时间：2026-03-28 16:30</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="tab-bar">
        <a href="tools.html" class="tab-item">
            <i class="fa fa-rocket"></i>
        </a>
        <a href="ai-design.html" class="tab-item">
            <i class="fa fa-paint-brush"></i>
        </a>
        <a href="claw.html" class="tab-item">
            <i class="fa fa-commenting"></i>
        </a>
        <a href="calendar.html" class="tab-item">
            <i class="fa fa-calendar"></i>
        </a>
        <a href="profile.html" class="tab-item">
            <i class="fa fa-user"></i>
        </a>
    </div>

    <!-- 日历视图入口 -->
    <a href="calendar.html" class="calendar-view-btn" aria-label="切换到日历视图">
        <i class="fa fa-calendar"></i>
    </a>
    
    <script>
        function switchTab(el, type) {
            document.querySelectorAll('.tabs .tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active');
            showToast('切换到' + type);
        }
        
        function filterByStatus(status, el) {
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            el.classList.add('active');
            showToast('筛选：' + status);
        }
        
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }
    </script>
</body>
</html>
