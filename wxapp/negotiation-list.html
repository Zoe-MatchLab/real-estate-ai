<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>谈判任务 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-success-light: #E8FFEA;
            --color-warning: #FF7D00;
            --color-warning-light: #FFF7E6;
            --color-danger: #FA5151;
            --color-danger-light: #FFECE8;
            --color-info: #165DFF;
            --color-info-light: #E8F3FF;
            --color-purple: #722ED1;
            --color-purple-light: #F7F0FF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        /* Focus 样式 - 可访问性 */
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        .page {
            min-height: 100vh;
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        /* 头部 */
        .header {
            background: var(--color-card);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }

        .header-back {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-title);
            text-decoration: none;
            font-size: 18px;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-title);
            flex: 1;
            text-align: center;
        }

        .header-add {
            width: 36px;
            height: 36px;
            background: var(--brand-primary);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
            transition: all var(--transition-fast);
        }

        .header-add:active {
            transform: scale(0.95);
            background: var(--color-warning);
        }

        /* Tab 切换 */
        .tabs {
            display: flex;
            background: var(--color-bg);
            border-radius: var(--radius-lg);
            padding: 3px;
            gap: 2px;
        }

        .tab {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--color-sub);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
            background: transparent;
        }

        .tab.active {
            background: var(--color-card);
            color: var(--brand-primary);
            box-shadow: var(--shadow-sm);
        }

        /* 内容区域 */
        .content {
            padding: var(--spacing-md);
        }

        /* 关联探盘提示 */
        .link-tip {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            background: var(--brand-primary-light);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .link-tip:active {
            transform: scale(0.99);
            background: #FFE4C4;
        }

        .link-tip-icon {
            width: 40px;
            height: 40px;
            background: var(--brand-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .link-tip-info { flex: 1; }
        .link-tip-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-title);
        }
        .link-tip-desc {
            font-size: 12px;
            color: var(--color-sub);
        }

        /* 任务卡片 */
        .task-card {
            background: var(--color-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .task-card:active {
            transform: scale(0.99);
            box-shadow: var(--shadow-md);
        }

        .task-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .task-card.status-pending::before { background: var(--color-info); }
        .task-card.status-progress::before { background: var(--brand-primary); }
        .task-card.status-success::before { background: var(--color-success); }
        .task-card.status-failed::before { background: var(--color-danger); }

        .task-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: var(--spacing-sm);
        }

        .task-title-area { flex: 1; }

        .task-status {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
        }

        .task-status.pending { background: var(--color-info-light); color: var(--color-info); }
        .task-status.progress { background: var(--brand-primary-light); color: var(--brand-primary); }
        .task-status.success { background: var(--color-success-light); color: var(--color-success); }
        .task-status.failed { background: var(--color-danger-light); color: var(--color-danger); }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: 2px;
        }

        .task-subtitle {
            font-size: 12px;
            color: var(--color-sub);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .task-type-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: var(--spacing-md);
            font-size: 20px;
        }

        .task-type-icon.price { background: var(--color-info-light); color: var(--color-info); }
        .task-type-icon.discount { background: var(--color-purple-light); color: var(--color-purple); }
        .task-type-icon.combo { background: var(--brand-primary-light); color: var(--brand-primary); }

        .task-body {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-md) 0;
            border-top: 1px solid var(--color-border);
            margin-top: var(--spacing-sm);
        }

        .task-stat {
            flex: 1;
            text-align: center;
        }

        .task-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-title);
        }

        .task-stat-value.success { color: var(--color-success); }
        .task-stat-value.warning { color: var(--brand-primary); }

        .task-stat-label {
            font-size: 11px;
            color: var(--color-sub);
        }

        .task-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-border);
        }

        .task-time {
            font-size: 12px;
            color: var(--color-sub);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .task-progress {
            font-size: 12px;
            color: var(--brand-primary);
            font-weight: 500;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl) var(--spacing-md);
            text-align: center;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--color-bg);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--color-sub);
            margin-bottom: var(--spacing-md);
        }

        .empty-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-xs);
        }

        .empty-desc {
            font-size: 13px;
            color: var(--color-sub);
            max-width: 260px;
        }

        .empty-btn {
            margin-top: var(--spacing-md);
            padding: 10px 24px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .empty-btn:active {
            transform: scale(0.95);
            background: var(--color-warning);
        }

        /* TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.24);
            display: flex;
            gap: 4px;
        }

        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: all var(--transition-normal);
        }

        .tab-item i { font-size: 20px; }
        .tab-item.active { background: rgba(250, 140, 22, 0.2); color: var(--brand-primary); }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 头部 -->
        <div class="header">
            <div class="header-top">
                <a href="profile.html" class="header-back">
                    <i class="fa fa-chevron-left"></i>
                </a>
                <span class="header-title">谈判任务</span>
                <a href="negotiation-form.html" class="header-add">
                    <i class="fa fa-plus"></i>
                </a>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab(this)">全部</button>
                <button class="tab" onclick="switchTab(this)">进行中</button>
                <button class="tab" onclick="switchTab(this)">待谈判</button>
                <button class="tab" onclick="switchTab(this)">已成交</button>
            </div>
        </div>

        <!-- 内容 -->
        <div class="content">
            <!-- 关联探盘提示 -->
            <div class="link-tip" onclick="location.href='task-list.html'">
                <div class="link-tip-icon">
                    <i class="fa fa-link"></i>
                </div>
                <div class="link-tip-info">
                    <div class="link-tip-title">关联探盘任务</div>
                    <div class="link-tip-desc">查看已完成探盘，创建谈判任务</div>
                </div>
                <i class="fa fa-chevron-right" style="color: var(--color-sub);"></i>
            </div>

            <!-- 任务列表 -->
            <div id="taskList">
                <!-- 已成交 - 价格谈判 -->
                <div class="task-card status-success" onclick="location.href='negotiation-detail.html'">
                    <div class="task-header">
                        <div class="task-title-area">
                            <span class="task-status success">已成交</span>
                            <div class="task-title">中海汇德里</div>
                            <div class="task-subtitle">
                                <i class="fa fa-check-circle"></i>
                                关联探盘：已完成
                            </div>
                        </div>
                        <div class="task-type-icon price">
                            <i class="fa fa-tag"></i>
                        </div>
                    </div>
                    <div class="task-body">
                        <div class="task-stat">
                            <div class="task-stat-value success">500万</div>
                            <div class="task-stat-label">成交价</div>
                        </div>
                        <div class="task-stat">
                            <div class="task-stat-value">520万</div>
                            <div class="task-stat-label">目标价</div>
                        </div>
                        <div class="task-stat">
                            <div class="task-stat-value warning">9.5折</div>
                            <div class="task-stat-label">优惠</div>
                        </div>
                    </div>
                    <div class="task-footer">
                        <span class="task-time">
                            <i class="fa fa-clock-o"></i>
                            成交时间：2026-04-01
                        </span>
                    </div>
                </div>

                <!-- 进行中 - 综合谈判 -->
                <div class="task-card status-progress" onclick="location.href='negotiation-detail.html'">
                    <div class="task-header">
                        <div class="task-title-area">
                            <span class="task-status progress">进行中</span>
                            <div class="task-title">万科翡翠公园</div>
                            <div class="task-subtitle">
                                <i class="fa fa-check-circle"></i>
                                关联探盘：已完成
                            </div>
                        </div>
                        <div class="task-type-icon combo">
                            <i class="fa fa-briefcase"></i>
                        </div>
                    </div>
                    <div class="task-body">
                        <div class="task-stat">
                            <div class="task-stat-value">2</div>
                            <div class="task-stat-label">谈判轮次</div>
                        </div>
                        <div class="task-stat">
                            <div class="task-stat-value">待定</div>
                            <div class="task-stat-label">当前报价</div>
                        </div>
                        <div class="task-stat">
                            <div class="task-stat-value warning">3/5</div>
                            <div class="task-stat-label">完成度</div>
                        </div>
                    </div>
                    <div class="task-footer">
                        <span class="task-time">
                            <i class="fa fa-clock-o"></i>
                            下次谈判：明天 10:00
                        </span>
                        <span class="task-progress">
                            进度：60%
                        </span>
                    </div>
                </div>

                <!-- 待谈判 - 优惠谈判 -->
                <div class="task-card status-pending" onclick="location.href='negotiation-detail.html'">
                    <div class="task-header">
                        <div class="task-title-area">
                            <span class="task-status pending">待谈判</span>
                            <div class="task-title">保利天汇</div>
                            <div class="task-subtitle">
                                <i class="fa fa-check-circle"></i>
                                关联探盘：已完成
                            </div>
                        </div>
                        <div class="task-type-icon discount">
                            <i class="fa fa-percent"></i>
                        </div>
                    </div>
                    <div class="task-body">
                        <div class="task-stat">
                            <div class="task-stat-value">0</div>
                            <div class="task-stat-label">谈判轮次</div>
                        </div>
                        <div class="task-stat">
                            <div class="task-stat-value">待开始</div>
                            <div class="task-stat-label">状态</div>
                        </div>
                        <div class="task-stat">
                            <div class="task-stat-value">9.8折</div>
                            <div class="task-stat-label">目标优惠</div>
                        </div>
                    </div>
                    <div class="task-footer">
                        <span class="task-time">
                            <i class="fa fa-clock-o"></i>
                            计划开始：2026-04-03
                        </span>
                    </div>
                </div>

                <!-- 已失败 -->
                <div class="task-card status-failed" onclick="location.href='negotiation-detail.html'">
                    <div class="task-header">
                        <div class="task-title-area">
                            <span class="task-status failed">已终止</span>
                            <div class="task-title">远洋山水</div>
                            <div class="task-subtitle">
                                <i class="fa fa-check-circle"></i>
                                关联探盘：已完成
                            </div>
                        </div>
                        <div class="task-type-icon price">
                            <i class="fa fa-tag"></i>
                        </div>
                    </div>
                    <div class="task-footer">
                        <span class="task-time">
                            <i class="fa fa-clock-o"></i>
                            终止时间：2026-03-28
                        </span>
                        <span class="task-progress" style="color: var(--color-danger);">
                            原因：客户流失
                        </span>
                    </div>
                </div>
            </div>

            <!-- 空状态（默认隐藏，有数据时隐藏） -->
            <!-- <div class="empty-state">
                <div class="empty-icon">
                    <i class="fa fa-handshake-o"></i>
                </div>
                <div class="empty-title">暂无谈判任务</div>
                <div class="empty-desc">
                    完成探盘任务后，可以创建谈判任务，设置谈判目标和策略
                </div>
                <button class="empty-btn" onclick="location.href='task-list.html'">
                    去关联探盘任务
                </button>
            </div> -->
        </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item">
            <i class="fa fa-rocket"></i>
        </a>
        <a href="ai-design.html" class="tab-item">
            <i class="fa fa-paint-brush"></i>
        </a>
        <a href="claw.html" class="tab-item">
            <i class="fa fa-commenting"></i>
        </a>
        <a href="calendar.html" class="tab-item">
            <i class="fa fa-calendar"></i>
        </a>
        <a href="profile.html" class="tab-item active">
            <i class="fa fa-user"></i>
        </a>
    </div>

    <script>
        // Tab 切换
        function switchTab(el) {
            document.querySelectorAll('.tabs .tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active');
            showToast(el.textContent);
        }

        // Toast
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }
    </script>
</body>
</html>
