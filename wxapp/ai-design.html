<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI设计工具 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-success-light: #E8FFEA;
            --color-warning: #FF7D00;
            --color-warning-light: #FFF7E6;
            --color-info: #165DFF;
            --color-info-light: #E8F3FF;
            --color-purple: #722ED1;
            --color-purple-light: #F7F0FF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Focus 样式 - 可访问性 */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        /* 占位页面 */
        .placeholder {
            min-height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .placeholder-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--color-purple) 0%, #8B5CF6 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-lg);
            box-shadow: 0 8px 24px rgba(114, 46, 209, 0.3);
        }

        .placeholder-icon i {
            font-size: 48px;
            color: white;
        }

        .placeholder-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-md);
        }

        .placeholder-desc {
            font-size: 14px;
            color: var(--color-sub);
            max-width: 280px;
            line-height: 1.6;
        }

        .placeholder-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: 8px 16px;
            background: var(--color-purple);
            color: white;
            border-radius: var(--radius-full);
            font-size: 12px;
            margin-top: var(--spacing-lg);
        }

        .placeholder-badge i {
            font-size: 14px;
        }

        /* 功能预览 */
        .feature-preview {
            margin-top: var(--spacing-xl);
            padding: var(--spacing-lg);
            background: var(--color-card);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 320px;
            box-shadow: var(--shadow-md);
        }

        .feature-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-md);
            text-align: left;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background: var(--color-bg);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .feature-item:active {
            transform: scale(0.98);
            background: var(--color-purple-light);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .feature-info {
            flex: 1;
            text-align: left;
            min-width: 0;
        }

        .feature-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-title);
            margin-bottom: 2px;
        }

        .feature-desc {
            font-size: 11px;
            color: var(--color-sub);
        }

        /* TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-scrolling: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.24);
            display: flex;
            gap: 4px;
        }

        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: all var(--transition-normal);
        }

        .tab-item i {
            font-size: 20px;
        }

        .tab-item.active {
            background: rgba(250, 140, 22, 0.2);
            color: var(--brand-primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="placeholder">
        <div class="placeholder-icon">
            <i class="fa fa-paint-brush"></i>
        </div>
        <h1 class="placeholder-title">AI设计工具</h1>
        <p class="placeholder-desc">
            智能生成海报，文案配图、户型图渲染等专业设计素材，让您的房源展示更加吸睛
        </p>
        <div class="placeholder-badge">
            <i class="fa fa-clock-o"></i>
            即将上线，敬请期待
        </div>

        <div class="feature-preview">
            <div class="feature-title">即将推出的功能</div>
            <div class="feature-list">
                <div class="feature-item" onclick="showToast('功能开发中')">
                    <div class="feature-icon">🎨</div>
                    <div class="feature-info">
                        <div class="feature-name">智能海报生成</div>
                        <div class="feature-desc">输入楼盘信息，AI自动生成推广海报</div>
                    </div>
                </div>
                <div class="feature-item" onclick="showToast('功能开发中')">
                    <div class="feature-icon">📐</div>
                    <div class="feature-info">
                        <div class="feature-name">户型图渲染</div>
                        <div class="feature-desc">AI渲染逼真户型图，提升展示效果</div>
                    </div>
                </div>
                <div class="feature-item" onclick="showToast('功能开发中')">
                    <div class="feature-icon">✏️</div>
                    <div class="feature-info">
                        <div class="feature-name">文案配图</div>
                        <div class="feature-desc">根据文案内容智能匹配相关图片</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item">
            <i class="fa fa-rocket"></i>
        </a>
        <a href="ai-design.html" class="tab-item active">
            <i class="fa fa-paint-brush"></i>
        </a>
        <a href="claw.html" class="tab-item">
            <i class="fa fa-commenting"></i>
        </a>
        <a href="calendar.html" class="tab-item">
            <i class="fa fa-calendar"></i>
        </a>
        <a href="profile.html" class="tab-item">
            <i class="fa fa-user"></i>
        </a>
    </div>

    <script>
        // Toast
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }
    </script>
</body>
</html>
