<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>话术助手 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-purple: #722ED1;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-xl: 16px;
            --shadow-tabbar: 0 12px 40px rgba(0,0,0,0.25);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }
        body { padding-bottom: 100px; }
        /* 占位页面 */
        .placeholder {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            text-align: center;
        }
        .placeholder-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--color-purple) 0%, #8B5CF6 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-lg);
            box-shadow: 0 8px 24px rgba(114, 46, 209, 0.3);
        }
        .placeholder-icon i {
            font-size: 48px;
            color: white;
        }
        .placeholder-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-md);
        }
        .placeholder-desc {
            font-size: 14px;
            color: var(--color-sub);
            max-width: 280px;
            line-height: 1.6;
        }
        .placeholder-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: 8px 16px;
            background: var(--color-purple);
            color: white;
            border-radius: var(--radius-xl);
            font-size: 12px;
            margin-top: var(--spacing-lg);
        }
        .placeholder-badge i {
            font-size: 14px;
        }
        /* 功能预览 */
        .feature-preview {
            margin-top: var(--spacing-xl);
            padding: var(--spacing-lg);
            background: var(--color-card);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 320px;
        }
        .feature-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-md);
            text-align: left;
        }
        .feature-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background: var(--color-bg);
            border-radius: var(--radius-xl);
        }
        .feature-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .feature-info { flex: 1; text-align: left; }
        .feature-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-title);
        }
        .feature-desc {
            font-size: 11px;
            color: var(--color-sub);
        }
        /* TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: var(--shadow-tabbar);
            display: flex;
            gap: 4px;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .tab-item i { font-size: 20px; }
        .tab-item.active {
            background: rgba(250, 140, 22, 0.2);
            color: var(--brand-primary);
        }
    </style>
</head>
<body>
    <div class="placeholder">
        <div class="placeholder-icon">
            <i class="fa fa-commenting"></i>
        </div>
        <h1 class="placeholder-title">话术助手</h1>
        <p class="placeholder-desc">
            AI实时辅助您的客户沟通，智能推荐最佳话术响应，让每一次对话都成为成交的机会
        </p>
        <div class="placeholder-badge">
            <i class="fa fa-clock-o"></i>
            即将上线，尽请期待
        </div>
        
        <div class="feature-preview">
            <div class="feature-title">即将推出的功能</div>
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">💬</div>
                    <div class="feature-info">
                        <div class="feature-name">实时话术推荐</div>
                        <div class="feature-desc">AI根据客户问题实时推荐最佳话术</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <div class="feature-info">
                        <div class="feature-name">客户画像分析</div>
                        <div class="feature-desc">智能分析客户需求，精准匹配房源</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <div class="feature-info">
                        <div class="feature-name">沟通效果分析</div>
                        <div class="feature-desc">分析沟通数据，优化话术策略</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item"><i class="fa fa-rocket"></i></a>
        <a href="ai-design.html" class="tab-item"><i class="fa fa-paint-brush"></i></a>
        <a href="claw.html" class="tab-item active"><i class="fa fa-commenting"></i></a>
        <a href="calendar.html" class="tab-item"><i class="fa fa-calendar"></i></a>
        <a href="profile.html" class="tab-item"><i class="fa fa-user"></i></a>
    </div>
</body>
</html>
