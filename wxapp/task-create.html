<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新建任务 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-success-light: #E8FFEA;
            --color-warning: #FF7D00;
            --color-warning-light: #FFF7E6;
            --color-danger: #FA5151;
            --color-danger-light: #FFECE8;
            --color-info: #165DFF;
            --color-info-light: #E8F3FF;
            --color-purple: #722ED1;
            --color-purple-light: #F7F0FF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        /* Focus 样式 */
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        .page {
            min-height: 100vh;
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        /* 头部 */
        .header {
            background: var(--color-card);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--color-border);
        }

        .header-back {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-title);
            text-decoration: none;
            font-size: 18px;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-title);
        }

        .header-save {
            padding: 6px 16px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .header-save:active {
            transform: scale(0.95);
            background: var(--color-warning);
        }

        /* 内容 */
        .content {
            padding: var(--spacing-md);
        }

        /* 选择类型 */
        .type-section {
            background: var(--color-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
        }

        .type-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--spacing-lg) var(--spacing-md);
            background: var(--color-bg);
            border: 2px solid transparent;
            border-radius: var(--radius-xl);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .type-card:active {
            transform: scale(0.98);
        }

        .type-card.selected {
            border-color: var(--brand-primary);
            background: var(--brand-primary-light);
        }

        .type-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: var(--spacing-md);
        }

        .type-icon.house { background: var(--brand-primary-light); color: var(--brand-primary); }
        .type-icon.speech { background: var(--color-purple-light); color: var(--color-purple); }
        .type-icon.content { background: var(--color-success-light); color: var(--color-success); }
        .type-icon.new { background: var(--color-danger-light); color: var(--color-danger); }

        .type-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-xs);
        }

        .type-desc {
            font-size: 12px;
            color: var(--color-sub);
            text-align: center;
        }

        /* 快捷入口 */
        .quick-section {
            background: var(--color-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }

        .quick-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .quick-title i {
            color: var(--brand-primary);
        }

        .quick-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .quick-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background: var(--color-bg);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .quick-item:active {
            transform: scale(0.99);
            background: var(--brand-primary-light);
        }

        .quick-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--brand-primary);
        }

        .quick-info { flex: 1; }
        .quick-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-title);
        }
        .quick-desc {
            font-size: 12px;
            color: var(--color-sub);
        }

        .quick-arrow {
            color: var(--color-sub);
            font-size: 14px;
        }

        /* TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.24);
            display: flex;
            gap: 4px;
        }

        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: all var(--transition-normal);
        }

        .tab-item i { font-size: 20px; }
        .tab-item.active { background: rgba(250, 140, 22, 0.2); color: var(--brand-primary); }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn" aria-label="返回">
            <i class="fa fa-angle-left" style="font-size: 22px"></i>
        </a>
        <span class="header-title">新建任务</span>
    </div>
    <div class="page-content">

    <div class="page">
        <!-- 头部 -->
        <div class="header">
            <a href="calendar.html" class="header-back">
                <i class="fa fa-chevron-left"></i>
            </a>
            <span class="header-title">新建任务</span>
            <button class="header-save" onclick="showToast('保存成功')">保存</button>
        </div>

        <!-- 内容 -->
        <div class="content">
            <!-- 选择任务类型 -->
            <div class="type-section">
                <div class="section-title">选择任务类型</div>
                <div class="type-grid">
                    <div class="type-card" onclick="selectType(this, 'house')">
                        <div class="type-icon house">
                            <i class="fa fa-map-marker"></i>
                        </div>
                        <div class="type-name">探盘任务</div>
                        <div class="type-desc">线下楼盘实地考察</div>
                    </div>
                    <div class="type-card" onclick="selectType(this, 'speech')">
                        <div class="type-icon speech">
                            <i class="fa fa-microphone"></i>
                        </div>
                        <div class="type-name">话术训练</div>
                        <div class="type-desc">AI模拟客户对话</div>
                    </div>
                    <div class="type-card" onclick="selectType(this, 'content')">
                        <div class="type-icon content">
                            <i class="fa fa-file-text-o"></i>
                        </div>
                        <div class="type-name">内容创作</div>
                        <div class="type-desc">生成推广文案</div>
                    </div>
                    <div class="type-card" onclick="selectType(this, 'new')">
                        <div class="type-icon new">
                            <i class="fa fa-home"></i>
                        </div>
                        <div class="type-name">新盘上线</div>
                        <div class="type-desc">新盘项目上线准备</div>
                    </div>
                </div>
            </div>

            <!-- 快捷入口 -->
            <div class="quick-section">
                <div class="quick-title">
                    <i class="fa fa-bolt"></i>
                    快捷创建
                </div>
                <div class="quick-list">
                    <div class="quick-item" onclick="location.href='negotiation-form.html'">
                        <div class="quick-icon">
                            <i class="fa fa-handshake-o"></i>
                        </div>
                        <div class="quick-info">
                            <div class="quick-name">谈判任务</div>
                            <div class="quick-desc">设置谈判目标和策略</div>
                        </div>
                        <i class="fa fa-chevron-right quick-arrow"></i>
                    </div>
                    <div class="quick-item" onclick="location.href='checkin-location.html'">
                        <div class="quick-icon">
                            <i class="fa fa-map-marker"></i>
                        </div>
                        <div class="quick-info">
                            <div class="quick-name">立即探盘</div>
                            <div class="quick-desc">开始执行探盘任务</div>
                        </div>
                        <i class="fa fa-chevron-right quick-arrow"></i>
                    </div>
                    <div class="quick-item" onclick="location.href='speech-train.html'">
                        <div class="quick-icon">
                            <i class="fa fa-microphone"></i>
                        </div>
                        <div class="quick-info">
                            <div class="quick-name">开始训练</div>
                            <div class="quick-desc">进行话术练习</div>
                        </div>
                        <i class="fa fa-chevron-right quick-arrow"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item">
            <i class="fa fa-rocket"></i>
        </a>
        <a href="ai-design.html" class="tab-item">
            <i class="fa fa-paint-brush"></i>
        </a>
        <a href="claw.html" class="tab-item">
            <i class="fa fa-commenting"></i>
        </a>
        <a href="calendar.html" class="tab-item active">
            <i class="fa fa-calendar"></i>
        </a>
        <a href="profile.html" class="tab-item">
            <i class="fa fa-user"></i>
        </a>
    </div>

    <script>
        // 选择类型
        function selectType(el, type) {
            document.querySelectorAll('.type-card').forEach(card => card.classList.remove('selected'));
            el.classList.add('selected');
            showToast('选择：' + getTypeName(type));
        }

        // 获取类型名称
        function getTypeName(type) {
            const names = {
                'house': '探盘任务',
                'speech': '话术训练',
                'content': '内容创作',
                'new': '新盘上线'
            };
            return names[type] || type;
        }

        // Toast
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }
    </script>
</body>
</html>
