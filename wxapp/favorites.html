<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的收藏 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-success-light: #E8FFEA;
            --color-warning: #FF7D00;
            --color-warning-light: #FFF7E6;
            --color-danger: #FA5151;
            --color-danger-light: #FFECE8;
            --color-info: #165DFF;
            --color-info-light: #E8F3FF;
            --color-purple: #722ED1;
            --color-purple-light: #F7F0FF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Focus 样式 - 可访问性 */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        /* 头部 */
        .header {
            background: var(--color-card);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text);
            background: none;
            border: none;
            cursor: pointer;
        }

        .header-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            color: var(--color-title);
            text-align: center;
        }

        /* 筛选 Tab */
        .filter-tabs {
            display: flex;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--color-card);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .filter-tab {
            flex: 0 0 auto;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--color-text);
            background: var(--color-bg);
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: all var(--transition-fast);
        }

        .filter-tab:active {
            transform: scale(0.95);
        }

        .filter-tab.active {
            background: var(--brand-primary);
            color: white;
        }

        /* 内容区 */
        .content {
            padding: var(--spacing-md);
        }

        /* 收藏卡片 */
        .favorite-card {
            background: var(--color-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            gap: var(--spacing-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .favorite-card:active {
            transform: scale(0.99);
            box-shadow: var(--shadow-md);
        }

        .favorite-icon {
            width: 60px;
            height: 60px;
            background: var(--brand-primary-light);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .favorite-info {
            flex: 1;
            min-width: 0;
        }

        .favorite-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .favorite-desc {
            font-size: 12px;
            color: var(--color-sub);
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .favorite-time {
            font-size: 11px;
            color: var(--color-sub);
        }

        /* TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-scrolling: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.24);
            display: flex;
            gap: 4px;
        }

        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: all var(--transition-normal);
        }

        .tab-item i {
            font-size: 20px;
        }

        .tab-item.active {
            background: rgba(250, 140, 22, 0.2);
            color: var(--brand-primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()" aria-label="返回">
            <i class="fa fa-angle-left" style="font-size: 22px"></i>
        </button>
        <span class="header-title">我的收藏</span>
    </div>

    <div class="filter-tabs">
        <button class="filter-tab active" onclick="switchTab(this)">全部</button>
        <button class="filter-tab" onclick="switchTab(this)">楼盘</button>
        <button class="filter-tab" onclick="switchTab(this)">模板</button>
        <button class="filter-tab" onclick="switchTab(this)">学习</button>
    </div>

    <div class="content">
        <div class="favorite-card" onclick="showToast('查看详情')">
            <div class="favorite-icon">🏠</div>
            <div class="favorite-info">
                <div class="favorite-title">中海汇德里</div>
                <div class="favorite-desc">浦东新区张江高科技园区</div>
                <div class="favorite-time">昨天收藏</div>
            </div>
        </div>

        <div class="favorite-card" onclick="showToast('查看详情')">
            <div class="favorite-icon" style="background: var(--color-info-light);">📝</div>
            <div class="favorite-info">
                <div class="favorite-title">探盘文案模板-开盘来袭</div>
                <div class="favorite-desc">适用于新盘开盘类文案创作</div>
                <div class="favorite-time">3天前收藏</div>
            </div>
        </div>

        <div class="favorite-card" onclick="showToast('查看详情')">
            <div class="favorite-icon" style="background: var(--color-purple-light);">📚</div>
            <div class="favorite-info">
                <div class="favorite-title">逼定话术大全</div>
                <div class="favorite-desc">10大逼定技巧合集</div>
                <div class="favorite-time">1周前收藏</div>
            </div>
        </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item">
            <i class="fa fa-rocket"></i>
        </a>
        <a href="ai-design.html" class="tab-item">
            <i class="fa fa-paint-brush"></i>
        </a>
        <a href="claw.html" class="tab-item">
            <i class="fa fa-commenting"></i>
        </a>
        <a href="calendar.html" class="tab-item">
            <i class="fa fa-calendar"></i>
        </a>
        <a href="profile.html" class="tab-item active">
            <i class="fa fa-user"></i>
        </a>
    </div>

    <script>
        // Tab 切换
        function switchTab(el) {
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active');
        }

        // Toast
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }
    </script>
</body>
</html>
