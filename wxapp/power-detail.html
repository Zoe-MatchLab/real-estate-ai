<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>算力明细 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-success-light: #F6FFED;
            --color-warning: #FF7D00;
            --color-warning-light: #FFF7E6;
            --color-danger: #FA5151;
            --color-danger-light: #FFF1F0;
            --color-info: #165DFF;
            --color-info-light: #E8F3FF;
            --color-purple: #722ED1;
            --color-purple-light: #F7F0FF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Focus 样式 - 可访问性 */
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, var(--color-purple) 0%, #8B5CF6 100%);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            color: white;
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
        }

        .header-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
        }

        /* 内容区 */
        .content {
            padding: var(--spacing-md);
        }

        /* 算力卡片 */
        .balance-card {
            background: var(--color-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            text-align: center;
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--spacing-lg);
        }

        .balance-icon {
            font-size: 32px;
            margin-bottom: var(--spacing-md);
        }

        .balance-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--color-purple);
            margin-bottom: 4px;
        }

        .balance-label {
            font-size: 14px;
            color: var(--color-sub);
            margin-bottom: var(--spacing-md);
        }

        .balance-btn {
            display: inline-block;
            padding: 10px 24px;
            background: var(--color-purple);
            color: white;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .balance-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        /* 区块标题 */
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-sm);
            padding-left: var(--spacing-xs);
        }

        /* 记录卡片 */
        .record-card {
            background: var(--color-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .record-card:active {
            transform: scale(0.99);
            box-shadow: var(--shadow-md);
        }

        .record-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: var(--spacing-md);
            font-size: 18px;
            flex-shrink: 0;
        }

        .record-icon.earn {
            background: var(--color-success-light);
            color: var(--color-success);
        }

        .record-icon.use {
            background: var(--color-danger-light);
            color: var(--color-danger);
        }

        .record-info {
            flex: 1;
            min-width: 0;
        }

        .record-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-title);
            margin-bottom: 2px;
        }

        .record-time {
            font-size: 12px;
            color: var(--color-sub);
        }

        .record-amount {
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .record-amount.positive {
            color: var(--color-success);
        }

        .record-amount.negative {
            color: var(--color-danger);
        }

        /* TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-scrolling: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.24);
            display: flex;
            gap: 4px;
        }

        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: all var(--transition-normal);
        }

        .tab-item i {
            font-size: 20px;
        }

        .tab-item.active {
            background: rgba(250, 140, 22, 0.2);
            color: var(--brand-primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()" aria-label="返回">
            <i class="fa fa-angle-left" style="font-size: 22px;"></i>
        </button>
        <span class="header-title">算力明细</span>
    </div>

    <div class="content">
        <div class="balance-card">
            <div class="balance-icon">⚡</div>
            <div class="balance-value">580</div>
            <div class="balance-label">我的算力</div>
            <div class="balance-btn" onclick="showToast('跳转到充值页面')">获取更多算力</div>
        </div>

        <div class="section-title">今日获取</div>

        <div class="record-card" onclick="showToast('查看详情')">
            <div class="record-icon earn">
                <i class="fa fa-check-circle"></i>
            </div>
            <div class="record-info">
                <div class="record-title">完成探盘任务</div>
                <div class="record-time">10:30</div>
            </div>
            <div class="record-amount positive">+50</div>
        </div>

        <div class="record-card" onclick="showToast('查看详情')">
            <div class="record-icon earn">
                <i class="fa fa-check-circle"></i>
            </div>
            <div class="record-info">
                <div class="record-title">完成话术训练</div>
                <div class="record-time">09:15</div>
            </div>
            <div class="record-amount positive">+20</div>
        </div>

        <div class="record-card" onclick="showToast('查看详情')">
            <div class="record-icon earn">
                <i class="fa fa-calendar-check-o"></i>
            </div>
            <div class="record-info">
                <div class="record-title">每日签到</div>
                <div class="record-time">08:00</div>
            </div>
            <div class="record-amount positive">+10</div>
        </div>

        <div class="section-title">今日消费</div>

        <div class="record-card" onclick="showToast('查看详情')">
            <div class="record-icon use">
                <i class="fa fa-magic"></i>
            </div>
            <div class="record-info">
                <div class="record-title">AI内容生成</div>
                <div class="record-time">14:20</div>
            </div>
            <div class="record-amount negative">-30</div>
        </div>

        <div class="record-card" onclick="showToast('查看详情')">
            <div class="record-icon use">
                <i class="fa fa-comments"></i>
            </div>
            <div class="record-info">
                <div class="record-title">AI话术训练</div>
                <div class="record-time">11:00</div>
            </div>
            <div class="record-amount negative">-20</div>
        </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item">
            <i class="fa fa-rocket"></i>
        </a>
        <a href="ai-design.html" class="tab-item">
            <i class="fa fa-paint-brush"></i>
        </a>
        <a href="claw.html" class="tab-item">
            <i class="fa fa-commenting"></i>
        </a>
        <a href="calendar.html" class="tab-item">
            <i class="fa fa-calendar"></i>
        </a>
        <a href="profile.html" class="tab-item active">
            <i class="fa fa-user"></i>
        </a>
    </div>

    <script>
        // Toast
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }
    </script>
</body>
</html>
