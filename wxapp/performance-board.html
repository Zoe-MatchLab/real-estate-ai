<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据看板 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-success-light: #F6FFED;
            --color-info: #007AFF;
            --color-info-light: #E8F3FF;
            --color-purple: #722ED1;
            --color-danger: #FA5151;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Focus 样式 - 可访问性 */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }
        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }
        body { padding-bottom: 80px; }
        /* 头部 */
        .header {
            background: linear-gradient(135deg, var(--brand-primary) 0%, #FF9500 100%);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            color: white;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title {
            font-size: 17px;
            font-weight: 600;
        }
        .time-tabs {
            display: flex;
            gap: var(--spacing-xs);
            background: rgba(255,255,255,0.2);
            padding: 3px;
            border-radius: var(--radius-full);
        }
        .time-tab {
            padding: 4px 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            background: transparent;
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
        }
        .time-tab.active {
            background: white;
            color: var(--brand-primary);
        }
        /* 统计日期 */
        .current-date {
            font-size: 12px;
            opacity: 0.8;
            margin-top: var(--spacing-sm);
        }
        /* 内容 */
        .content { padding: var(--spacing-md); }
        /* 数据卡片 */
        .data-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .card-title i { color: var(--brand-primary); }
        .card-more {
            font-size: 12px;
            color: var(--color-sub);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        /* 数据网格 */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
        }
        .data-item {
            text-align: center;
        }
        .data-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-title);
            margin-bottom: 2px;
        }
        .data-value.primary { color: var(--brand-primary); }
        .data-value.success { color: var(--color-success); }
        .data-value.info { color: var(--color-info); }
        .data-label {
            font-size: 11px;
            color: var(--color-sub);
        }
        /* 平台明细 */
        .platform-list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-border);
        }
        .platform-tag {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 6px 12px;
            background: var(--color-bg);
            border-radius: var(--radius-full);
            font-size: 12px;
            color: var(--color-text);
        }
        .platform-tag .count {
            font-weight: 600;
            color: var(--color-title);
        }
        /* 漏斗图 */
        .funnel {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }
        .funnel-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .funnel-bar {
            flex: 1;
            height: 36px;
            background: var(--color-bg);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
        }
        .funnel-fill {
            height: 100%;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            padding-left: var(--spacing-md);
            color: white;
            font-size: 14px;
            font-weight: 500;
            min-width: 60px;
        }
        .funnel-fill.orange { background: var(--brand-primary); }
        .funnel-fill.green { background: var(--color-success); }
        .funnel-fill.purple { background: var(--color-purple); }
        .funnel-fill.info { background: var(--color-info); }
        .funnel-label {
            width: 50px;
            font-size: 13px;
            color: var(--color-sub);
        }
        .funnel-rate {
            width: 50px;
            font-size: 12px;
            color: var(--color-sub);
            text-align: right;
        }
        /* 转化率 */
        .conversion-section {
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-border);
        }
        .conversion-title {
            font-size: 12px;
            color: var(--color-sub);
            margin-bottom: var(--spacing-sm);
        }
        .conversion-arrows {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .conversion-item {
            text-align: center;
            flex: 1;
        }
        .conversion-arrow {
            font-size: 20px;
            color: var(--color-sub);
            margin-bottom: var(--spacing-xs);
        }
        .conversion-rate {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-success);
        }
        /* TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            display: flex;
            gap: 4px;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
        .tab-item i { font-size: 20px; }
        .tab-item.active {
            background: rgba(250, 140, 22, 0.2);
            color: var(--brand-primary);
        }
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }
        @keyframes toastIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="header-top">
            <span class="header-title">数据看板</span>
            <div class="time-tabs">
                <button class="time-tab" onclick="setTime('day', this)">日</button>
                <button class="time-tab" onclick="setTime('week', this)">周</button>
                <button class="time-tab active" onclick="setTime('month', this)">月</button>
            </div>
        </div>
        <div class="current-date">当前：2026年4月</div>
    </div>

    <div class="content">
        <!-- 内容发布 -->
        <div class="data-card">
            <div class="card-header">
                <span class="card-title">
                    <i class="fa fa-paper-plane"></i>
                    内容发布
                </span>
                <span class="card-more">详情 <i class="fa fa-angle-right"></i></span>
            </div>
            <div class="data-grid">
                <div class="data-item">
                    <div class="data-value primary">28</div>
                    <div class="data-label">发布量</div>
                </div>
                <div class="data-item">
                    <div class="data-value">1.2万</div>
                    <div class="data-label">浏览量</div>
                </div>
                <div class="data-item">
                    <div class="data-value success">¥3,200</div>
                    <div class="data-label">投流量</div>
                </div>
            </div>
            <div class="platform-list">
                <div class="platform-tag">
                    <span class="count">12</span> 小红书
                </div>
                <div class="platform-tag">
                    <span class="count">8</span> 公众号
                </div>
                <div class="platform-tag">
                    <span class="count">5</span> 视频号
                </div>
                <div class="platform-tag">
                    <span class="count">3</span> 朋友圈
                </div>
            </div>
        </div>

        <!-- 获客转化 -->
        <div class="data-card">
            <div class="card-header">
                <span class="card-title">
                    <i class="fa fa-users"></i>
                    获客转化
                </span>
                <span class="card-more">详情 <i class="fa fa-angle-right"></i></span>
            </div>
            <div class="data-grid">
                <div class="data-item">
                    <div class="data-value">156</div>
                    <div class="data-label">咨询</div>
                </div>
                <div class="data-item">
                    <div class="data-value info">45</div>
                    <div class="data-label">线索</div>
                </div>
                <div class="data-item">
                    <div class="data-value success">23</div>
                    <div class="data-label">报备</div>
                </div>
            </div>
            <!-- 漏斗 -->
            <div class="conversion-section">
                <div class="conversion-title">转化漏斗</div>
                <div class="funnel">
                    <div class="funnel-item">
                        <span class="funnel-label">咨询</span>
                        <div class="funnel-bar">
                            <div class="funnel-fill orange" style="width: 100%;">156</div>
                        </div>
                        <span class="funnel-rate">100%</span>
                    </div>
                    <div class="funnel-item">
                        <span class="funnel-label">线索</span>
                        <div class="funnel-bar">
                            <div class="funnel-fill green" style="width: 29%;">45</div>
                        </div>
                        <span class="funnel-rate">29%</span>
                    </div>
                    <div class="funnel-item">
                        <span class="funnel-label">报备</span>
                        <div class="funnel-bar">
                            <div class="funnel-fill purple" style="width: 15%;">23</div>
                        </div>
                        <span class="funnel-rate">15%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 老客激活 -->
        <div class="data-card">
            <div class="card-header">
                <span class="card-title">
                    <i class="fa fa-bullhorn"></i>
                    老客激活
                </span>
                <span class="card-more">详情 <i class="fa fa-angle-right"></i></span>
            </div>
            <div class="data-grid">
                <div class="data-item">
                    <div class="data-value">320</div>
                    <div class="data-label">触达量</div>
                </div>
                <div class="data-item">
                    <div class="data-value success">8.5%</div>
                    <div class="data-label">转化率</div>
                </div>
                <div class="data-item">
                    <div class="data-value primary">27</div>
                    <div class="data-label">新增报备</div>
                </div>
            </div>
            <div class="platform-list">
                <div class="platform-tag">
                    <i class="fa fa-phone"></i>
                    <span class="count">120</span> 电话
                </div>
                <div class="platform-tag">
                    <i class="fa fa-comment"></i>
                    <span class="count">150</span> 私信
                </div>
                <div class="platform-tag">
                    <i class="fa fa-envelope"></i>
                    <span class="count">50</span> 短信
                </div>
            </div>
        </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item"><i class="fa fa-rocket"></i></a>
        <a href="ai-design.html" class="tab-item"><i class="fa fa-paint-brush"></i></a>
        <a href="claw.html" class="tab-item"><i class="fa fa-commenting"></i></a>
        <a href="calendar.html" class="tab-item"><i class="fa fa-calendar"></i></a>
        <a href="profile.html" class="tab-item active"><i class="fa fa-user"></i></a>
    </div>

    <script>
        let currentTime = 'month';

        function setTime(type, el) {
            document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentTime = type;
            const dateText = type === 'day' ? '今日' : type === 'week' ? '本周' : '本月';
            document.querySelector('.current-date').textContent = '当前：' + dateText;
            showToast('切换到' + dateText + '数据');
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
