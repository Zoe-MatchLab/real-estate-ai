<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文案确认</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#fa8c16',
                        warning: '#FF9D2B',
                        danger: '#FA5151',
                        success: '#00B42A',
                        gray: {
                            50: '#F7F8FA',
                            100: '#EDEEF2',
                            200: '#D8D9DD',
                            300: '#B4B5B9',
                            400: '#86878B',
                            500: '#4E5969',
                            600: '#272E3B',
                            700: '#1D2129',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F7F8FA;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .card-shadow {
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .progress-bar {
            height: 6px;
            border-radius: 3px;
            background: #f0f0f0;
            overflow: hidden;
        }
        .progress-value {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #fa8c16, #ff7a45);
        }
        .tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
        }
        .tag-warning {
            background: #FFF7E8;
            color: #FF7D00;
        }
        .tag-info {
            background: #E8F3FF;
            color: #165DFF;
        }
        .btn {
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        .btn-primary {
            background: #fa8c16;
            color: white;
        }
        .btn-primary:active {
            background: #d46b08;
        }
        .btn-outline {
            background: white;
            color: #fa8c16;
            border: 1px solid #fa8c16;
        }
        .btn-outline:active {
            background: #fff7e6;
        }
        .card {
            border-radius: 12px;
            background: white;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        .content-box {
            background: #FAFAFA;
            border: 1px solid #F0F0F0;
            border-radius: 8px;
            padding: 12px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .edit-btn {
            color: #fa8c16;
            font-size: 14px;
            padding: 4px 12px;
            border: 1px solid #fa8c16;
            border-radius: 6px;
            background: transparent;
        }
        .edit-btn:hover {
            background: #fff7e6;
        }
        .icon-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1px solid #E5E6EB;
            background: transparent;
            color: #86909C;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:hover {
            color: #fa8c16;
            border-color: #fa8c16;
            background: #fff7e6;
        }
        .icon-btn:active {
            transform: scale(0.9);
        }
        .icon-btn.spinning {
            animation: spin 1s linear infinite;
            color: #fa8c16;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9998;
            display: none;
        }
        .modal-overlay.active {
            display: block;
        }
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 360px;
            z-index: 9999;
            display: none;
        }
        .modal.active {
            display: block;
        }
        .modal textarea {
            width: 100%;
            border: 1px solid #E5E6EB;
            border-radius: 8px;
            padding: 12px;
            resize: none;
            font-size: 14px;
            line-height: 1.6;
            min-height: 150px;
        }
        .modal textarea:focus {
            outline: none;
            border-color: #fa8c16;
        }
        .safe-area-bottom {
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="pb-20">
    <!-- 顶部导航 -->
    <div class="bg-white sticky top-0 z-40">
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
            <button class="text-gray-700 btn" onclick="goBack()">
                <i class="fa fa-angle-left text-xl"></i>
            </button>
            <h1 class="font-medium text-gray-700">文案确认</h1>
            <button class="text-primary btn font-medium" onclick="handleConfirm()">确认</button>
        </div>
    </div>

    <!-- 楼盘信息 -->
    <div class="p-4">
        <div class="flex items-center mb-3">
            <i class="fa fa-home text-primary text-lg mr-2"></i>
            <span id="houseName" class="font-bold text-lg text-gray-800">中海汇德里</span>
        </div>
        <div class="flex items-center mb-4">
            <i class="fa fa-map-marker text-gray-400 mr-2"></i>
            <span id="address" class="text-sm text-gray-500">浦东新区张江高科技园区</span>
        </div>

        <!-- 阶段进度 -->
        <div class="flex items-center justify-center mb-4">
            <div class="flex items-center">
                <span class="text-xs text-gray-400">阶段1</span>
                <div class="w-8 h-1 bg-gray-200 mx-1 rounded"></div>
                <span class="text-xs text-gray-400">阶段2</span>
                <div class="w-8 h-1 bg-gray-200 mx-1 rounded"></div>
                <span class="text-xs text-primary font-medium">阶段3</span>
                <div class="w-8 h-1 bg-gray-200 mx-1 rounded"></div>
                <span class="text-xs text-gray-400">阶段4</span>
            </div>
        </div>
    </div>

    <!-- 朋友圈文案 -->
    <div class="px-4 mb-4">
        <div class="card p-4">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center">
                    <i class="fa fa-file-text text-primary mr-2"></i>
                    <span class="font-medium text-gray-800">朋友圈文案</span>
                </div>
                <div class="flex items-center gap-2">
                    <button class="icon-btn" onclick="handleRegenerate('content')" title="重新生成">
                        <i class="fa fa-refresh" id="refreshContentIcon"></i>
                    </button>
                    <button class="edit-btn" onclick="openEditModal('content')">
                        <i class="fa fa-edit mr-1"></i> 编辑
                    </button>
                </div>
            </div>
            <div id="scriptTitle" class="font-bold text-gray-800 mb-2">【中海汇德里·开盘预告】</div>
            <div id="scriptContent" class="content-box text-sm text-gray-600 leading-relaxed">位于浦东张江核心地段，毗邻地铁站，周边商业配套完善。项目主推89㎡三房和109㎡四房，均价约6.5万/㎡。首付20%起，购房享3万抵8万优惠。金牌顾问一对一服务，看房专车接送。</div>
        </div>
    </div>

    <!-- 视频脚本 -->
    <div class="px-4 mb-4">
        <div class="card p-4">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center">
                    <i class="fa fa-video-camera text-primary mr-2"></i>
                    <span class="font-medium text-gray-800">视频脚本</span>
                </div>
                <div class="flex items-center gap-2">
                    <button class="icon-btn" onclick="handleRegenerate('videoScript')" title="重新生成">
                        <i class="fa fa-refresh" id="refreshVideoIcon"></i>
                    </button>
                    <button class="edit-btn" onclick="openEditModal('videoScript')">
                        <i class="fa fa-edit mr-1"></i> 编辑
                    </button>
                </div>
            </div>
            <div id="videoScript" class="content-box text-sm text-gray-600 leading-relaxed">镜头1: 楼盘大门全景
镜头2: 区位地图展示
镜头3: 沙盘讲解（整体规划）
镜头4: 样板间参观（客厅、卧室、厨房）
镜头5: 周边配套展示（地铁、商场、学校）
镜头6: 户型优势总结
镜头7: 优惠信息及联系方式</div>
        </div>
    </div>

    <!-- 底部操作区 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 safe-area-bottom">
        <button id="confirmBtn" class="w-full btn btn-primary py-3" onclick="handleConfirm()">
            <i class="fa fa-check mr-2"></i> 确认并提交
        </button>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModalOverlay" class="modal-overlay" onclick="closeEditModal()"></div>
    <div id="editModal" class="modal">
        <div class="p-4 border-b border-gray-100">
            <div class="flex items-center justify-between">
                <span id="modalTitle" class="font-medium text-gray-800">编辑内容</span>
                <button class="text-gray-400" onclick="closeEditModal()">
                    <i class="fa fa-times text-lg"></i>
                </button>
            </div>
        </div>
        <div class="p-4">
            <textarea id="editTextarea" rows="8" placeholder="请输入内容..."></textarea>
        </div>
        <div class="p-4 border-t border-gray-100 flex gap-3">
            <button class="flex-1 btn btn-outline py-2" onclick="closeEditModal()">取消</button>
            <button class="flex-1 btn btn-primary py-2" onclick="saveEdit()">保存</button>
        </div>
    </div>

    <!-- Loading遮罩 -->
    <div id="loadingOverlay" class="fixed top-0 left-0 right-0 bottom-0 bg-black/50 z-50 flex items-center justify-center" style="display: none;">
        <div class="bg-white rounded-xl p-6 text-center">
            <div class="loading-spinner mx-auto mb-3" style="border-top-color: #fa8c16;"></div>
            <p id="loadingText" class="text-gray-600 text-sm">正在重新生成...</p>
        </div>
    </div>

    <script>
        // ===== URL参数解析 =====
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 模拟数据
        const taskData = {
            houseName: '中海汇德里',
            address: '浦东新区张江高科技园区',
            currentStage: parseInt(getQueryParam('step')) || 3,
            taskId: getQueryParam('task') || 'TASK001',
            script: {
                title: '【中海汇德里·开盘预告】',
                content: '位于浦东张江核心地段，毗邻地铁站，周边商业配套完善。项目主推89㎡三房和109㎡四房，均价约6.5万/㎡。首付20%起，购房享3万抵8万优惠。金牌顾问一对一服务，看房专车接送。',
                videoScript: '镜头1: 楼盘大门全景\n镜头2: 区位地图展示\n镜头3: 沙盘讲解（整体规划）\n镜头4: 样板间参观（客厅、卧室、厨房）\n镜头5: 周边配套展示（地铁、商场、学校）\n镜头6: 户型优势总结\n镜头7: 优惠信息及联系方式'
            }
        };

        let currentEditType = 'content';

        // 初始化页面
        function initPage() {
            document.getElementById('houseName').textContent = taskData.houseName;
            document.getElementById('address').textContent = taskData.address;
            document.getElementById('scriptTitle').textContent = taskData.script.title;
            document.getElementById('scriptContent').textContent = taskData.script.content;
            document.getElementById('videoScript').textContent = taskData.script.videoScript;
        }

        // 返回上一页
        function goBack() {
            window.location.href = 'task-detail.html?step=2';
        }

        // 打开编辑弹窗
        function openEditModal(type) {
            currentEditType = type;
            const modal = document.getElementById('editModal');
            const textarea = document.getElementById('editTextarea');
            const titleEl = document.getElementById('modalTitle');

            if (type === 'content') {
                titleEl.textContent = '编辑朋友圈文案';
                textarea.value = taskData.script.content;
            } else if (type === 'videoScript') {
                titleEl.textContent = '编辑视频脚本';
                textarea.value = taskData.script.videoScript;
            }

            modal.classList.add('active');
            modal.style.display = 'block';
            setTimeout(() => {
                textarea.focus();
            }, 100);
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 200);
        }

        // 保存编辑
        function saveEdit() {
            const textarea = document.getElementById('editTextarea');
            const newContent = textarea.value.trim();

            if (!newContent) {
                showToast('内容不能为空');
                return;
            }

            if (currentEditType === 'content') {
                taskData.script.content = newContent;
                document.getElementById('scriptContent').textContent = newContent;
            } else if (currentEditType === 'videoScript') {
                taskData.script.videoScript = newContent;
                document.getElementById('videoScript').textContent = newContent;
            }

            closeEditModal();
            showToast('保存成功');
        }

        // 要求重新生成
        function handleRegenerate(type) {
            const iconId = type === 'content' ? 'refreshContentIcon' : 'refreshVideoIcon';
            const icon = document.getElementById(iconId);
            icon.classList.add('spinning');

            // 模拟重新生成过程
            setTimeout(() => {
                icon.classList.remove('spinning');
                showToast('已提交重新生成请求');

                // 模拟更新内容
                if (type === 'content') {
                    taskData.script.content = '位于浦东张江核心地段，毗邻地铁站，周边商业配套完善。项目主推89㎡三房和109㎡四房，均价约6.5万/㎡。首付20%起，购房享3万抵8万优惠。金牌顾问一对一服务，看房专车接送。\n\n（内容已重新优化）';
                    document.getElementById('scriptContent').textContent = taskData.script.content;
                } else {
                    taskData.script.videoScript = '镜头1: 楼盘大门全景（优化版）\n镜头2: 区位地图展示\n镜头3: 沙盘讲解（优化版）\n镜头4: 样板间参观（客厅、卧室、厨房）\n镜头5: 周边配套展示（地铁、商场、学校）\n镜头6: 户型优势总结\n镜头7: 优惠信息及联系方式（更新）';
                    document.getElementById('videoScript').textContent = taskData.script.videoScript;
                }
            }, 1500);
        }

        // 确认并提交
        function handleConfirm() {
            const content = document.getElementById('scriptContent').textContent;
            const videoScript = document.getElementById('videoScript').textContent;

            if (!content || content === '请编辑内容...') {
                showToast('请先编辑朋友圈文案');
                return;
            }

            if (!videoScript || videoScript === '请编辑内容...') {
                showToast('请先编辑视频脚本');
                return;
            }

            // 显示loading
            const overlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingText.textContent = '正在提交确认...';
            overlay.style.display = 'flex';

            // 模拟提交
            setTimeout(() => {
                overlay.style.display = 'none';
                showToast('确认成功');
                // 跳转到结果生成页面
                setTimeout(() => {
                    window.location.href = 'result-generate.html?step=3';
                }, 500);
            }, 1500);
        }

        // Toast提示
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        // 点击弹窗外部关闭
        document.getElementById('editModalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
