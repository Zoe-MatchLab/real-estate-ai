<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claw 智能助手 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --brand-primary-dark: #E67A0E;
            --color-success: #00B42A;
            --color-success-light: #F6FFED;
            --color-info: #007AFF;
            --color-info-light: #E8F3FF;
            --color-danger: #FA5151;
            --color-purple: #722ED1;
            --color-purple-light: #F7F0FF;
            --color-purple-dark: #5B21B6;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        button:focus-visible, a:focus-visible {
            outline: 2px solid var(--brand-primary);
            outline-offset: 2px;
        }

        html, body {
            height: 100%;
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: var(--color-bg);
        }

        /* ========== 顶部导航栏 ========== */
        .nav-bar {
            background: linear-gradient(135deg, var(--brand-primary) 0%, #FF9500 100%);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            color: white;
            flex-shrink: 0;
        }

        .nav-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .nav-back {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: var(--radius-lg);
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .nav-back:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }

        .nav-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .nav-info {
            display: flex;
            flex-direction: column;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: white;
        }

        .nav-status {
            font-size: 11px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: var(--radius-lg);
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .nav-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.25);
        }

        .nav-btn i {
            font-size: 16px;
        }

        /* ========== 快捷指令区 - 底部 ========== */
        .quick-commands {
            background: var(--color-card);
            border-top: 1px solid var(--color-border);
            padding: var(--spacing-sm) var(--spacing-md);
            flex-shrink: 0;
        }

        .quick-commands-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-sm);
        }

        .quick-cmd-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: var(--spacing-sm);
            background: var(--color-bg);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .quick-cmd-item:active {
            transform: scale(0.95);
            background: var(--brand-primary-light);
        }

        .quick-cmd-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .quick-cmd-icon.orange {
            background: var(--brand-primary-light);
            color: var(--brand-primary);
        }

        .quick-cmd-icon.blue {
            background: var(--color-info-light);
            color: var(--color-info);
        }

        .quick-cmd-icon.purple {
            background: var(--color-purple-light);
            color: var(--color-purple);
        }

        .quick-cmd-icon.green {
            background: var(--color-success-light);
            color: var(--color-success);
        }

        .quick-cmd-text {
            font-size: 11px;
            color: var(--color-text);
            white-space: nowrap;
        }

        .quick-cmd-item:active .quick-cmd-text {
            color: var(--brand-primary);
        }

        /* ========== 对话区域 ========== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-md);
            padding-bottom: max(var(--spacing-lg), calc(20px + env(safe-area-inset-bottom)));
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* 滚动条美化 */
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 2px;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl) var(--spacing-md);
            text-align: center;
            color: var(--color-sub);
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            background: var(--color-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: var(--spacing-md);
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* 欢迎卡片 */
        .welcome-card {
            background: var(--color-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--color-border);
            animation: welcomeSlideIn 0.5s ease-out;
        }

        @keyframes welcomeSlideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-card .message-avatar {
            animation: welcomeAvatarPulse 2s ease-in-out infinite;
        }

        @keyframes welcomeAvatarPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .welcome-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        .welcome-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--brand-primary) 0%, #FF9500 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 4px 12px rgba(250, 140, 22, 0.3);
        }

        .welcome-info {
            flex: 1;
        }

        .welcome-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: 2px;
        }

        .welcome-desc {
            font-size: 12px;
            color: var(--color-sub);
        }

        /* 推荐问题 */
        .suggest-questions {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .suggest-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            background: var(--color-bg);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .suggest-item:active {
            background: var(--brand-primary-light);
        }

        .suggest-icon {
            font-size: 18px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }

        .suggest-text {
            flex: 1;
            font-size: 14px;
            color: var(--color-text);
        }

        .suggest-arrow {
            color: var(--color-sub);
            font-size: 14px;
        }

        /* ========== 消息气泡 - 上下布局 ========== */
        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: var(--spacing-lg);
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* AI 消息 - 左对齐 */
        .message.ai {
            align-items: flex-start;
        }

        /* 用户消息 - 右对齐 */
        .message.user {
            align-items: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: var(--spacing-xs);
        }

        .message-avatar.ai {
            background: var(--brand-primary-light);
            color: var(--brand-primary);
        }

        .message-avatar.user {
            background: var(--brand-primary);
            color: white;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user .message-content {
            align-items: flex-end;
        }

        .message-bubble {
            padding: var(--spacing-md);
            border-radius: var(--radius-xl);
            font-size: 14px;
            line-height: 1.6;
        }

        .message.ai .message-bubble {
            background: var(--color-card);
            color: var(--color-text);
            border-bottom-left-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--brand-primary) 0%, #FF9500 100%);
            color: white;
            border-bottom-right-radius: var(--radius-sm);
            box-shadow: 0 4px 12px rgba(250, 140, 22, 0.25);
        }

        .message-time {
            font-size: 11px;
            color: var(--color-sub);
            margin-top: var(--spacing-xs);
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-status {
            font-size: 10px;
            color: var(--brand-primary);
        }

        /* AI 思考中指示器 */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: var(--spacing-md);
            background: var(--color-card);
            border-radius: var(--radius-xl);
            border-bottom-left-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--brand-primary);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* 数据卡片 */
        .data-card {
            background: linear-gradient(135deg, var(--color-bg) 0%, #fff 100%);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
            border: 1px solid var(--color-border);
        }

        .data-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .data-card-title i {
            color: var(--brand-primary);
        }

        .data-card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
        }

        .data-card-item {
            background: var(--color-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            text-align: center;
            border: 1px solid var(--color-border);
            transition: all var(--transition-fast);
        }

        .data-card-item:active {
            transform: scale(0.98);
            border-color: var(--brand-primary);
        }

        .data-card-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-title);
        }

        .data-card-value.primary { color: var(--brand-primary); }
        .data-card-value.success { color: var(--color-success); }
        .data-card-value.purple { color: var(--color-purple); }

        .data-card-label {
            font-size: 12px;
            color: var(--color-sub);
            margin-top: 4px;
        }

        /* 快捷回复气泡 - 卡片式 */
        .quick-replies {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }

        .quick-reply {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            font-size: 14px;
            color: var(--color-text);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: left;
        }

        .quick-reply:active {
            background: var(--brand-primary-light);
            border-color: var(--brand-primary);
            transform: scale(0.98);
        }

        .quick-reply-icon {
            width: 32px;
            height: 32px;
            background: var(--brand-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .quick-reply-text {
            flex: 1;
        }

        .quick-reply-arrow {
            color: var(--color-sub);
            font-size: 12px;
        }

        /* ========== 底部输入区 ========== */
        .input-area {
            background: var(--color-card);
            padding: var(--spacing-sm) var(--spacing-md);
            padding-bottom: max(var(--spacing-sm), calc(12px + env(safe-area-inset-bottom)));
            border-top: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: var(--spacing-sm);
        }

        .input-actions {
            display: flex;
            gap: var(--spacing-xs);
        }

        .input-action {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            border: none;
            border-radius: var(--radius-full);
            color: var(--color-sub);
            font-size: 16px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .input-action:active {
            background: var(--brand-primary-light);
            color: var(--brand-primary);
            transform: scale(0.95);
        }

        .input-action.voice {
            background: var(--brand-primary-light);
            color: var(--brand-primary);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-field {
            width: 100%;
            min-height: 40px;
            max-height: 100px;
            padding: 8px 14px;
            background: var(--color-bg);
            border: 2px solid transparent;
            border-radius: 20px;
            font-family: var(--font-family);
            font-size: 15px;
            color: var(--color-title);
            resize: none;
            outline: none;
            line-height: 1.4;
            transition: all var(--transition-fast);
        }

        .input-field:focus {
            border-color: var(--brand-primary);
            background: var(--color-card);
        }

        .input-field::placeholder {
            color: var(--color-sub);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--brand-primary) 0%, #FF9500 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: 0 2px 8px rgba(250, 140, 22, 0.35);
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .send-btn:disabled {
            background: var(--color-border);
            box-shadow: none;
            cursor: not-allowed;
        }

        .send-btn.loading {
            pointer-events: none;
        }

        .send-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 输入提示 */
        .input-hint {
            font-size: 11px;
            color: var(--color-sub);
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-hint-item {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .input-hint kbd {
            background: var(--color-bg);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 10px;
            border: 1px solid var(--color-border);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 顶部导航栏 -->
        <div class="nav-bar">
            <div class="nav-bar-inner">
                <div class="nav-left">
                    <button class="nav-back" onclick="goBack()" aria-label="返回">
                        <i class="fa fa-chevron-left" aria-hidden="true"></i>
                    </button>
                    <div class="nav-avatar">🦷</div>
                    <div class="nav-info">
                        <span class="nav-title">Claw</span>
                        <span class="nav-status">
                            <span class="status-dot"></span>
                            在线 · 随时为您服务
                        </span>
                    </div>
                </div>
                <div class="nav-right">
                    <button class="nav-btn" onclick="showToast('历史记录')" aria-label="历史记录">
                        <i class="fa fa-history" aria-hidden="true"></i>
                    </button>
                    <button class="nav-btn" onclick="showToast('更多设置')" aria-label="更多设置">
                        <i class="fa fa-ellipsis-h" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>



        <!-- 对话区域 -->
        <div class="chat-area" id="chatArea">
            <!-- 欢迎卡片 -->
            <div class="welcome-card">
                <div class="welcome-header">
                    <div class="welcome-avatar">🦷</div>
                    <div class="welcome-info">
                        <div class="welcome-title">您好，我是 Claw</div>
                        <div class="welcome-desc">您的智能房产助手，随时为您服务</div>
                    </div>
                </div>
                
                <div class="suggest-questions">
                    <div class="suggest-item" onclick="sendQuickAction('帮我下达一个探盘任务')">
                        <span class="suggest-icon">📋</span>
                        <span class="suggest-text">帮我下达一个探盘任务</span>
                        <i class="fa fa-angle-right suggest-arrow"></i>
                    </div>
                    <div class="suggest-item" onclick="sendQuickAction('看看我本周的业绩数据')">
                        <span class="suggest-icon">📊</span>
                        <span class="suggest-text">看看我本周的业绩数据</span>
                        <i class="fa fa-angle-right suggest-arrow"></i>
                    </div>
                    <div class="suggest-item" onclick="sendQuickAction('生成一条朋友圈推广文案')">
                        <span class="suggest-icon">✨</span>
                        <span class="suggest-text">生成一条朋友圈推广文案</span>
                        <i class="fa fa-angle-right suggest-arrow"></i>
                    </div>
                </div>
            </div>

            <!-- AI 欢迎消息 -->
            <div class="message ai">
                <div class="message-avatar ai">🦷</div>
                <div class="message-content">
                    <div class="message-bubble">
                        你好！我是 Claw，您的智能房产助手 👋
                        <br><br>
                        我可以帮您：
                        <br>
                        • 📋 下达探盘任务
                        <br>
                        • 📊 查看数据报表
                        <br>
                        • ✍️ 生成推广文案
                        <br>
                        • 🏠 推荐优质房源
                        <br><br>
                        有什么可以帮您的吗？
                    </div>
                    <div class="quick-replies">
                        <button class="quick-reply" onclick="sendQuickReply('下达探盘任务')">
                            <span class="quick-reply-icon"><i class="fa fa-map-marker"></i></span>
                            <span class="quick-reply-text">下达探盘任务</span>
                            <span class="quick-reply-arrow"><i class="fa fa-angle-right"></i></span>
                        </button>
                        <button class="quick-reply" onclick="sendQuickReply('查看业绩数据')">
                            <span class="quick-reply-icon"><i class="fa fa-bar-chart"></i></span>
                            <span class="quick-reply-text">查看业绩数据</span>
                            <span class="quick-reply-arrow"><i class="fa fa-angle-right"></i></span>
                        </button>
                        <button class="quick-reply" onclick="sendQuickReply('生成文案')">
                            <span class="quick-reply-icon"><i class="fa fa-magic"></i></span>
                            <span class="quick-reply-text">生成推广文案</span>
                            <span class="quick-reply-arrow"><i class="fa fa-angle-right"></i></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快捷指令区 -->
        <div class="quick-commands">
            <div class="quick-commands-grid">
                <button class="quick-cmd-item" onclick="sendQuickAction('下达探盘任务')">
                    <div class="quick-cmd-icon orange">
                        <i class="fa fa-map-marker"></i>
                    </div>
                    <span class="quick-cmd-text">下达任务</span>
                </button>
                <button class="quick-cmd-item" onclick="sendQuickAction('查看数据看板')">
                    <div class="quick-cmd-icon blue">
                        <i class="fa fa-bar-chart"></i>
                    </div>
                    <span class="quick-cmd-text">数据看板</span>
                </button>
                <button class="quick-cmd-item" onclick="sendQuickAction('生成朋友圈文案')">
                    <div class="quick-cmd-icon purple">
                        <i class="fa fa-magic"></i>
                    </div>
                    <span class="quick-cmd-text">生成文案</span>
                </button>
                <button class="quick-cmd-item" onclick="sendQuickAction('生成探盘报告')">
                    <div class="quick-cmd-icon green">
                        <i class="fa fa-file-text-o"></i>
                    </div>
                    <span class="quick-cmd-text">探盘报告</span>
                </button>
            </div>
        </div>

        <!-- 底部输入区 -->
        <div class="input-area">
            <div class="input-row">
                <div class="input-actions">
                    <button class="input-action voice" onclick="toggleVoiceInput()" aria-label="语音输入">
                        <i class="fa fa-microphone"></i>
                    </button>
                </div>
                <div class="input-wrapper">
                    <textarea 
                        class="input-field" 
                        id="inputField" 
                        placeholder="输入您的问题..." 
                        rows="1" 
                        oninput="autoResize(this); toggleSendBtn()"
                        aria-label="输入消息"
                    ></textarea>
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="发送消息" disabled>
                    <i class="fa fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-hint">
                <span class="input-hint-item"><kbd>Enter</kbd> 发送</span>
                <span class="input-hint-item"><kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</span>
            </div>
        </div>
    </div>

    <script>
        // 快捷动作响应数据
        const quickResponses = {
            '下达探盘任务': {
                text: '好的，我来帮您下达探盘任务。请告诉我楼盘名称和探盘要求。',
                data: null
            },
            '查看数据看板': {
                text: '这是您本周的数据概览：',
                data: {
                    title: '本周数据统计',
                    items: [
                        { label: '探盘任务', value: '5', class: 'primary' },
                        { label: '内容发布', value: '28', class: '' },
                        { label: '咨询量', value: '156', class: 'success' },
                        { label: '报备', value: '23', class: 'purple' }
                    ]
                }
            },
            '生成朋友圈文案': {
                text: '好的，请选择楼盘，我可以为您生成专属的推广文案。',
                data: null
            },
            '生成探盘报告': {
                text: '正在为您生成探盘报告，请稍候...',
                data: null
            },
            '给我推荐房源': {
                text: '根据您的客户画像，我为您推荐以下房源：',
                data: null
            },
            '帮我下达一个探盘任务': {
                text: '好的，我来帮您下达探盘任务。请告诉我楼盘名称和探盘要求。',
                data: null
            },
            '看看我本周的业绩数据': {
                text: '这是您本周的数据概览：',
                data: {
                    title: '本周业绩数据',
                    items: [
                        { label: '探盘任务', value: '5', class: 'primary' },
                        { label: '内容发布', value: '28', class: '' },
                        { label: '咨询量', value: '156', class: 'success' },
                        { label: '报备', value: '23', class: 'purple' }
                    ]
                }
            },
            '生成一条朋友圈推广文案': {
                text: '好的，请选择楼盘，我可以为您生成专属的推广文案。',
                data: null
            }
        };

        // 返回上一页
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'calendar.html';
            }
        }

        // 自动调整输入框高度
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }

        // 切换发送按钮状态
        function toggleSendBtn() {
            const input = document.getElementById('inputField');
            const sendBtn = document.getElementById('sendBtn');
            if (input.value.trim()) {
                sendBtn.disabled = false;
                sendBtn.style.opacity = '1';
            } else {
                sendBtn.disabled = true;
                sendBtn.style.opacity = '0.5';
            }
        }

        // 语音输入切换
        function toggleVoiceInput() {
            showToast('语音输入功能即将上线');
        }

        // 发送快捷动作
        function sendQuickAction(action) {
            addMessage('user', action);
            
            // 显示 AI 思考中
            showTypingIndicator();
            
            setTimeout(() => {
                hideTypingIndicator();
                const response = quickResponses[action];
                if (response) {
                    addAIMessage(response.text, response.data);
                } else {
                    addAIMessage(`好的，我将帮您：${action}`);
                }
            }, 1000);
        }

        // 发送快捷回复
        function sendQuickReply(text) {
            document.getElementById('inputField').value = text;
            autoResize(document.getElementById('inputField'));
            sendMessage();
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('inputField');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            autoResize(input);
            
            // 显示发送按钮 loading
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.classList.add('loading');
            sendBtn.innerHTML = '<i class="fa fa-spinner"></i>';
            
            // 显示 AI 思考中
            showTypingIndicator();

            setTimeout(() => {
                hideTypingIndicator();
                sendBtn.classList.remove('loading');
                sendBtn.innerHTML = '<i class="fa fa-paper-plane"></i>';
                addAIMessage('收到！我正在处理您的请求...');
            }, 1200);
        }

        // 显示思考中指示器
        function showTypingIndicator() {
            const chat = document.getElementById('chatArea');
            const html = `
                <div class="message ai" id="typingIndicator">
                    <div class="message-avatar ai">🦷</div>
                    <div class="typing-indicator">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            `;
            chat.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // 隐藏思考中指示器
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // 添加用户消息
        function addMessage(role, text) {
            const chat = document.getElementById('chatArea');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            let statusHtml = '';
            if (role === 'user') {
                statusHtml = '<i class="fa fa-check message-status"></i>';
            }
            
            const html = `
                <div class="message ${role}">
                    <div class="message-avatar ${role}" aria-hidden="true">
                        ${role === 'ai' ? '🦷' : '👤'}
                    </div>
                    <div class="message-content">
                        <div class="message-bubble">${escapeHtml(text)}</div>
                        <div class="message-time">${statusHtml}${time}</div>
                    </div>
                </div>
            `;
            chat.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // 添加 AI 消息
        function addAIMessage(text, data) {
            const chat = document.getElementById('chatArea');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            let dataHtml = '';
            if (data) {
                dataHtml = `
                    <div class="data-card">
                        <div class="data-card-title">
                            <i class="fa fa-chart-bar"></i>
                            ${data.title}
                        </div>
                        <div class="data-card-grid">
                            ${data.items.map(item => `
                                <div class="data-card-item">
                                    <div class="data-card-value ${item.class}">${item.value}</div>
                                    <div class="data-card-label">${item.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            const html = `
                <div class="message ai">
                    <div class="message-avatar ai" aria-hidden="true">🦷</div>
                    <div class="message-content">
                        <div class="message-bubble">
                            ${text}
                            ${dataHtml}
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
            chat.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 滚动到底部
        function scrollToBottom() {
            const chat = document.getElementById('chatArea');
            chat.scrollTop = chat.scrollHeight;
        }

        // Toast
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 回车发送
        document.getElementById('inputField').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
