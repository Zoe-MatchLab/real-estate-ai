<!DOCTYPE html>

<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <title>我的</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue";
      background: #f5f5f5;
    }


.container {
  padding-bottom: 70px;
}

/* 顶部 */
.header {
  background: linear-gradient(#f7d9a7, #f5f5f5);
  padding: 15px;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-title {
  font-weight: bold;
  font-size: 16px;
}

/* 用户信息 */
.user {
  display: flex;
  align-items: center;
  margin-top: 15px;
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #ddd;
}

.user-info {
  margin-left: 10px;
  flex: 1;
}

.username {
  font-size: 16px;
  font-weight: bold;
}

.vip-btn {
  background: orange;
  color: #fff;
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* 会员卡 */
.vip-card {
  background: #222;
  color: #fff;
  margin: 15px;
  border-radius: 10px;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.vip-card .btn {
  background: orange;
  padding: 6px 12px;
  border-radius: 20px;
}

/* 列表 */
.list {
  background: #fff;
  margin: 10px 15px;
  border-radius: 10px;
  overflow: hidden;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  border-bottom: 1px solid #eee;
}

.item:last-child {
  border-bottom: none;
}

.left {
  display: flex;
  align-items: center;
}

.icon {
  width: 20px;
  height: 20px;
  background: orange;
  border-radius: 5px;
  margin-right: 10px;
}

/* 底部导航 */
.tabbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: #222;
  display: flex;
  justify-content: space-around;
  align-items: center;
  color: #999;
}

.tabbar .active {
  background: orange;
  padding: 8px 15px;
  border-radius: 20px;
  color: #fff;
}

  </style>
</head>
