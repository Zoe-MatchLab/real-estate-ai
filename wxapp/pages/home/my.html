<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>我的 - 房产AI助手</title>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
  <style>
    :root {
      --transition-normal: 0.25s ease;
      --brand-primary: #FA8C16;
      --brand-primary-dark: #E67A0E;
      --color-success: #00B42A;
      --color-warning: #FF7D00;
      --color-danger: #FA5151;
      --color-info: #007AFF;
      --color-title: #1D2129;
      --color-text: #4E5969;
      --color-sub: #86909C;
      --color-border: #E5E6EB;
      --color-bg: #F7F8FA;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      color: var(--color-title);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    
    .container {
      padding-bottom: 70px;
    }
    
    /* 顶部 */
    .header {
      background: linear-gradient(180deg, #f7d9a7 0%, #f5f5f5 100%);
      padding: 12px 15px 15px;
    }
    
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .nav-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-title);
      text-decoration: none;
    }
    
    .nav-title {
      font-weight: 600;
      font-size: 17px;
      color: var(--color-title);
    }
    
    /* 用户信息 */
    .user {
      display: flex;
      align-items: center;
      margin-top: 12px;
      padding: 0 5px;
    }
    
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #E5E6EB;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .user-info {
      margin-left: 12px;
      flex: 1;
    }
    
    .username {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-title);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .user-tag {
      font-size: 11px;
      background: linear-gradient(135deg, var(--brand-primary), #FF9500);
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: normal;
    }
    
    .vip-btn {
      background: linear-gradient(135deg, var(--brand-primary), #FF9500);
      color: #fff;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    
    /* 今日作业概览卡片 */
    .overview-card {
      background: #fff;
      margin: 0 15px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    
    .overview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .overview-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-title);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .overview-title i {
      color: var(--brand-primary);
    }
    
    .overview-more {
      font-size: 12px;
      color: var(--color-sub);
      display: flex;
      align-items: center;
      gap: 2px;
    }
    
    .time-filter {
      display: flex;
      gap: 4px;
    }
    
    .time-filter-btn {
      padding: 4px 10px;
      font-size: 12px;
      color: var(--color-sub);
      background: var(--color-bg);
      border-radius: 12px;
      cursor: pointer;
      transition: all var(--transition-normal);
    }
    
    .time-filter-btn.active {
      color: #fff;
      background: var(--brand-primary);
    }
    
    .time-filter-btn:active {
      opacity: 0.8;
    }
    
    /* 任务指标 */
    .task-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-item {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      background: var(--color-bg);
      border-radius: 8px;
    }
    
    .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-title);
      line-height: 1.2;
    }
    
    .stat-num.highlight {
      color: var(--brand-primary);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--color-sub);
      margin-top: 4px;
    }
    
    /* 话术评分 */
    .score-section {
      padding: 12px;
      background: linear-gradient(135deg, #FFF7E6, #FFF2E6);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .score-label {
      font-size: 13px;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .score-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--brand-primary);
    }
    
    .score-trend {
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }
    
    .score-trend.up {
      color: var(--color-success);
      background: rgba(0, 180, 42, 0.1);
    }
    
    .score-trend.down {
      color: var(--color-danger);
      background: rgba(250, 81, 81, 0.1);
    }
    
    .score-bar {
      height: 6px;
      background: #E5E6EB;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .score-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand-primary), #FF9500);
      border-radius: 3px;
      transition: width var(--transition-normal);
    }
    
    .score-desc {
      font-size: 11px;
      color: var(--color-sub);
      margin-top: 6px;
    }
    
    /* 数据异常 */
    .alert-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      background: rgba(250, 81, 81, 0.08);
      border-radius: 6px;
      color: var(--color-danger);
      font-size: 13px;
    }
    
    .alert-row i {
      font-size: 14px;
    }
    
    .alert-row:active {
      background: rgba(250, 81, 81, 0.12);
    }
    
    /* 会员卡 */
    .vip-card {
      background: linear-gradient(135deg, #1D2129, #2D3748);
      color: #fff;
      margin: 15px;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .vip-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .vip-level {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .vip-level i {
      color: #FFD700;
    }
    
    .vip-expire {
      font-size: 12px;
      color: #86909C;
    }
    
    .vip-renew {
      background: linear-gradient(135deg, var(--brand-primary), #FF9500);
      color: #fff;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    /* 列表卡片 */
    .list-card {
      background: #fff;
      margin: 0 15px 10px;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .list-item {
      display: flex;
      align-items: center;
      padding: 14px 15px;
      border-bottom: 1px solid #F2F3F5;
      color: var(--color-title);
    }
    
    .list-item:last-child {
      border-bottom: none;
    }
    
    .item-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #FFF7E6, #FFF2E6);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
    }
    
    .item-icon i {
      font-size: 16px;
      color: var(--brand-primary);
    }
    
    .item-content {
      flex: 1;
    }
    
    .item-title {
      font-size: 15px;
      color: var(--color-title);
      font-weight: 500;
    }
    
    .item-sub {
      font-size: 12px;
      color: var(--color-sub);
      margin-right: 8px;
    }
    
    .item-arrow {
      color: #C9CDD4;
      font-size: 14px;
    }
    
    /* Toast提示 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(29, 33, 41, 0.9);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    
    .toast.show {
      opacity: 1;
    }
    
    /* TabBar胶囊样式 */
    .tab-bar-bottom {
      position: fixed;
      bottom: calc(16px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(29, 33, 41, 0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 8px 20px;
      z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.24);
      display: flex;
      gap: 4px;
    }
    
    .tab-item-bottom {
      width: 44px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: all var(--transition-normal);
    }
    
    .tab-item-bottom i {
      font-size: 20px;
    }
    
    .tab-item-bottom.active {
      background: rgba(250, 140, 22, 0.2);
      color: var(--brand-primary);
    }
  </style>
</head>

<body>
<div class="container">

  <!-- 顶部导航 -->
  <div class="header">
    <div class="nav">
      <a href="calendar.html" class="nav-btn">
        <i class="fa fa-angle-left" style="font-size:24px;"></i>
      </a>
      <span class="nav-title">我的</span>
      <a href="settings.html" class="nav-btn">
        <i class="fa fa-ellipsis-h" style="font-size:20px;"></i>
      </a>
    </div>

    <!-- 用户信息 -->
    <div class="user">
      <img class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'%3E%3Ccircle cx='30' cy='30' r='30' fill='%23E5E6EB'/%3E%3Ccircle cx='30' cy='22' r='10' fill='%23C9CDD4'/%3E%3Cellipse cx='30' cy='50' rx='18' ry='14' fill='%23C9CDD4'/%3E%3C/svg%3E" alt="头像"/>
      <div class="user-info">
        <div class="username">
          陈佳佳
          <span class="user-tag">经纪人</span>
        </div>
      </div>
      <div class="vip-btn" onclick="showToast()">会员兑换</div>
    </div>
  </div>

  <!-- 会员卡 -->
  <div class="vip-card">
    <div class="vip-info">
      <div class="vip-level">
        <i class="fa fa-diamond"></i>
        <span>白银会员</span>
      </div>
      <div class="vip-expire">15天后到期</div>
    </div>
    <div class="vip-renew" onclick="showToast()">
      立即续费
      <i class="fa fa-angle-right"></i>
    </div>
  </div>

  <!-- 作业概览 -->
  <div class="overview-card">
    <div class="overview-header">
      <div class="overview-title">
        <i class="fa fa-clipboard"></i>
        作业概览
      </div>
      <div class="time-filter">
        <span class="time-filter-btn active" onclick="setTimeFilter('today', this)">今日</span>
        <span class="time-filter-btn" onclick="setTimeFilter('week', this)">本周</span>
        <span class="time-filter-btn" onclick="setTimeFilter('month', this)">本月</span>
      </div>
    </div>
    
    <!-- 任务指标 -->
    <div class="task-stats">
      <div class="stat-item">
        <div class="stat-num">5</div>
        <div class="stat-label">总任务</div>
      </div>
      <div class="stat-item">
        <div class="stat-num highlight">3/5</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">60%</div>
        <div class="stat-label">完成率</div>
      </div>
    </div>
    
    <!-- 话术评分 -->
    <div class="score-section" onclick="showToast()">
      <div class="score-header">
        <div class="score-label">
          <i class="fa fa-star" style="color:#FFD700;"></i>
          话术评分
        </div>
        <div>
          <span class="score-value">85</span>
          <span class="score-trend up">↑+5</span>
        </div>
      </div>
      <div class="score-bar">
        <div class="score-bar-fill" style="width: 85%;"></div>
      </div>
      <div class="score-desc">较上周提升</div>
    </div>
    
    <!-- 数据异常 -->
    <div class="alert-row" onclick="showToast()">
      <i class="fa fa-exclamation-triangle"></i>
      2 条数据异常待处理
    </div>
  </div>

  <!-- 第一组：作业相关 -->
  <div class="list-card">
    <div class="list-item" onclick="showToast()">
      <div class="item-icon">
        <i class="fa fa-calendar-check-o"></i>
      </div>
      <div class="item-content">
        <div class="item-title">活动中心</div>
      </div>
      <span class="item-sub">签到有礼</span>
      <i class="fa fa-angle-right item-arrow"></i>
    </div>
    <div class="list-item" onclick="showToast()">
      <div class="item-icon">
        <i class="fa fa-bolt"></i>
      </div>
      <div class="item-content">
        <div class="item-title">算力</div>
      </div>
      <i class="fa fa-angle-right item-arrow"></i>
    </div>
    <div class="list-item" onclick="showToast()">
      <div class="item-icon">
        <i class="fa fa-user-plus"></i>
      </div>
      <div class="item-content">
        <div class="item-title">邀请</div>
      </div>
      <i class="fa fa-angle-right item-arrow"></i>
    </div>
    <div class="list-item" onclick="showToast()">
      <div class="item-icon">
        <i class="fa fa-file-text-o"></i>
      </div>
      <div class="item-content">
        <div class="item-title">训练记录</div>
      </div>
      <i class="fa fa-angle-right item-arrow"></i>
    </div>
  </div>

  <!-- 第二组：内容与设置 -->
  <div class="list-card">
    <div class="list-item" onclick="showToast()">
      <div class="item-icon">
        <i class="fa fa-star"></i>
      </div>
      <div class="item-content">
        <div class="item-title">收藏</div>
      </div>
      <i class="fa fa-angle-right item-arrow"></i>
    </div>
    <div class="list-item" onclick="showToast()">
      <div class="item-icon">
        <i class="fa fa-map-marker"></i>
      </div>
      <div class="item-content">
        <div class="item-title">足迹</div>
      </div>
      <i class="fa fa-angle-right item-arrow"></i>
    </div>
    <div class="list-item" onclick="showToast()">
      <div class="item-icon">
        <i class="fa fa-credit-card"></i>
      </div>
      <div class="item-content">
        <div class="item-title">付费记录</div>
      </div>
      <i class="fa fa-angle-right item-arrow"></i>
    </div>
    <div class="list-item" onclick="showToast()">
      <div class="item-icon">
        <i class="fa fa-gear"></i>
      </div>
      <div class="item-content">
        <div class="item-title">设置</div>
      </div>
      <i class="fa fa-angle-right item-arrow"></i>
    </div>
  </div>

</div>

<!-- Toast提示 -->
<div class="toast" id="toast">未开放，敬请期待</div>

<!-- TabBar胶囊 -->
<nav class="tab-bar-bottom">
  <a href="tools.html" class="tab-item-bottom">
    <i class="fa fa-rocket"></i>
  </a>
  <a href="../other/ai-design.html" class="tab-item-bottom">
    <i class="fa fa-paint-brush"></i>
  </a>
  <a href="claw.html" class="tab-item-bottom">
    <i class="fa fa-commenting"></i>
  </a>
  <a href="calendar.html" class="tab-item-bottom">
    <i class="fa fa-calendar"></i>
  </a>
  <a href="my.html" class="tab-item-bottom active">
    <i class="fa fa-user"></i>
  </a>
</nav>

<script>
var currentTimeFilter = 'today';

function showToast() {
  var toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(function() {
    toast.classList.remove('show');
  }, 2000);
}

function setTimeFilter(period, el) {
  // 更新按钮状态
  document.querySelectorAll('.time-filter-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  el.classList.add('active');
  
  currentTimeFilter = period;
  
  // TODO: 根据period请求不同时间范围的数据
  // today: 今日数据
  // week: 本周数据
  // month: 本月数据
  console.log('切换到：' + period);
  
  // 示例：显示提示
  var periodNames = {
    'today': '今日',
    'week': '本周',
    'month': '本月'
  };
  // 可以在这里触发数据更新
}
</script>

</body>
</html>
