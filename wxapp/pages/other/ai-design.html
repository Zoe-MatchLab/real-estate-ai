<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI设计工具 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-success-light: #E8FFEA;
            --color-warning: #FF7D00;
            --color-warning-light: #FFF7E6;
            --color-info: #165DFF;
            --color-info-light: #E8F3FF;
            --color-purple: #722ED1;
            --color-purple-light: #F7F0FF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        button:focus-visible, a:focus-visible { outline: 2px solid var(--brand-primary); outline-offset: 2px; }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        body { min-height: 100vh; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        .header {
            background: linear-gradient(135deg, #722ED1 0%, #8B5CF6 100%);
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            display: flex;
            align-items: center;
            color: white;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .header-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            margin: 0 36px;
        }

        .page-content {
            min-height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .placeholder-icon {
            width: 120px;
            height: 120px;
            background: var(--color-purple-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-lg);
        }

        .placeholder-icon i {
            font-size: 56px;
            color: var(--color-purple);
        }

        .placeholder-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-sm);
        }

        .placeholder-desc {
            font-size: 14px;
            color: var(--color-sub);
            max-width: 280px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:history.back()" class="back-btn" aria-label="返回">
            <i class="fa fa-angle-left" style="font-size: 22px"></i>
        </a>
        <span class="header-title">AI设计工具</span>
    </div>

    <div class="page-content">
        <div class="placeholder-icon">
            <i class="fa fa-paint-brush"></i>
        </div>
        <div class="placeholder-title">AI设计工具</div>
        <div class="placeholder-desc">智能设计功能即将上线，敬请期待...</div>
    </div>
</body>
</html>
