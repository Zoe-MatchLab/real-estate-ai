<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的物料库 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-success-light: #F6FFED;
            --color-info: #007AFF;
            --color-info-light: #E8F3FF;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --transition-fast: 0.15s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }
        body { padding-bottom: 80px; }
        /* 头部 */
        .header {
            background: white;
            padding: calc(12px + env(safe-area-inset-top)) var(--spacing-md) var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text);
        }
        .header-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            color: var(--color-title);
            text-align: center;
        }
        .header-action {
            font-size: 14px;
            color: var(--brand-primary);
            cursor: pointer;
        }
        /* Tab */
        .filter-tabs {
            display: flex;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            background: white;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .filter-tab {
            flex: 0 0 auto;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--color-text);
            background: var(--color-bg);
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: all var(--transition-fast);
        }
        .filter-tab.active {
            background: var(--brand-primary);
            color: white;
        }
        /* 内容 */
        .content { padding: var(--spacing-md); }
        /* 物料卡片 */
        .material-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }
        .material-header {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }
        .material-avatar {
            width: 48px;
            height: 48px;
            background: var(--brand-primary-light);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: var(--spacing-md);
        }
        .material-info { flex: 1; }
        .material-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: 4px;
        }
        .material-meta {
            font-size: 12px;
            color: var(--color-sub);
        }
        .material-status {
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 12px;
        }
        .material-status.done {
            background: var(--color-success-light);
            color: var(--color-success);
        }
        /* 物料预览 */
        .material-preview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-xs);
        }
        .preview-item {
            aspect-ratio: 1;
            background: var(--color-bg);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--color-sub);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }
        .preview-item:hover { transform: scale(0.95); }
        .preview-item:active { transform: scale(0.9); }
        .preview-tag {
            position: absolute;
            bottom: 4px;
            left: 4px;
            font-size: 9px;
            padding: 2px 6px;
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: var(--radius-sm);
        }
        .preview-more {
            background: var(--color-bg);
            color: var(--color-sub);
        }
        .preview-more span {
            font-size: 12px;
        }
        /* 统计 */
        .material-stats {
            display: flex;
            gap: var(--spacing-lg);
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--color-border);
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: 12px;
            color: var(--color-sub);
        }
        .stat-item i { font-size: 14px; }
        .stat-value { color: var(--color-title); font-weight: 500; }
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl) * 2;
            color: var(--color-sub);
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: var(--spacing-md);
            opacity: 0.5;
        }
        .empty-text { font-size: 14px; }
        /* TabBar */
        .tab-bar {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 33, 41, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 8px 20px;
            z-index: 9999;
            display: flex;
            gap: 4px;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
        .tab-item i { font-size: 20px; }
        .tab-item.active {
            background: rgba(250, 140, 22, 0.2);
            color: var(--brand-primary);
        }
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }
        @keyframes toastIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <button class="back-btn" onclick="history.back()">
            <i class="fa fa-angle-left" style="font-size:22px"></i>
        </button>
        <span class="header-title">我的物料库</span>
        <span class="header-action" onclick="showToast('筛选')">
            <i class="fa fa-sliders"></i>
        </span>
    </div>

    <!-- 分类Tab -->
    <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterTab('all', this)">全部</button>
        <button class="filter-tab" onclick="filterTab('photo', this)">照片</button>
        <button class="filter-tab" onclick="filterTab('video', this)">视频</button>
        <button class="filter-tab" onclick="filterTab('audio', this)">录音</button>
        <button class="filter-tab" onclick="filterTab('copy', this)">文案</button>
    </div>

    <!-- 物料列表 -->
    <div class="content">
        <!-- 物料卡片1 -->
        <div class="material-card" onclick="openDetail('中海汇德里')">
            <div class="material-header">
                <div class="material-avatar">🏠</div>
                <div class="material-info">
                    <div class="material-name">中海汇德里</div>
                    <div class="material-meta">浦东新区张江高科技园区 · 2026-03-28</div>
                </div>
                <span class="material-status done">已完成</span>
            </div>
            <div class="material-preview">
                <div class="preview-item">📷<span class="preview-tag">大门</span></div>
                <div class="preview-item">📷<span class="preview-tag">沙盘</span></div>
                <div class="preview-item">🎬<span class="preview-tag">视频</span></div>
                <div class="preview-item">📝<span class="preview-tag">文案</span></div>
            </div>
            <div class="material-stats">
                <div class="stat-item"><i class="fa fa-image"></i><span class="stat-value">6</span>张照片</div>
                <div class="stat-item"><i class="fa fa-video-camera"></i><span class="stat-value">2</span>个视频</div>
                <div class="stat-item"><i class="fa fa-file-text-o"></i><span class="stat-value">3</span>篇文案</div>
            </div>
        </div>

        <!-- 物料卡片2 -->
        <div class="material-card" onclick="openDetail('公园壹号')">
            <div class="material-header">
                <div class="material-avatar" style="background:#F0F5FF;">🏠</div>
                <div class="material-info">
                    <div class="material-name">公园壹号</div>
                    <div class="material-meta">朝阳区望京 · 2026-03-25</div>
                </div>
                <span class="material-status done">已完成</span>
            </div>
            <div class="material-preview">
                <div class="preview-item">📷</div>
                <div class="preview-item">📷</div>
                <div class="preview-item">🎬</div>
                <div class="preview-item preview-more"><span>+8</span></div>
            </div>
            <div class="material-stats">
                <div class="stat-item"><i class="fa fa-image"></i><span class="stat-value">10</span>张照片</div>
                <div class="stat-item"><i class="fa fa-video-camera"></i><span class="stat-value">3</span>个视频</div>
                <div class="stat-item"><i class="fa fa-file-text-o"></i><span class="stat-value">2</span>篇文案</div>
            </div>
        </div>

        <!-- 物料卡片3 -->
        <div class="material-card" onclick="openDetail('万科城市之光')">
            <div class="material-header">
                <div class="material-avatar" style="background:#FFF7E6;">🏠</div>
                <div class="material-info">
                    <div class="material-name">万科城市之光</div>
                    <div class="material-meta">朝阳区望京 · 2026-03-20</div>
                </div>
                <span class="material-status done">已完成</span>
            </div>
            <div class="material-preview">
                <div class="preview-item">📷</div>
                <div class="preview-item">📷</div>
                <div class="preview-item">📷</div>
                <div class="preview-item preview-more"><span>+12</span></div>
            </div>
            <div class="material-stats">
                <div class="stat-item"><i class="fa fa-image"></i><span class="stat-value">15</span>张照片</div>
                <div class="stat-item"><i class="fa fa-video-camera"></i><span class="stat-value">5</span>个视频</div>
                <div class="stat-item"><i class="fa fa-file-text-o"></i><span class="stat-value">4</span>篇文案</div>
            </div>
        </div>
    </div>

    <!-- TabBar -->
    <div class="tab-bar">
        <a href="tools.html" class="tab-item"><i class="fa fa-rocket"></i></a>
        <a href="ai-design.html" class="tab-item"><i class="fa fa-paint-brush"></i></a>
        <a href="claw.html" class="tab-item"><i class="fa fa-commenting"></i></a>
        <a href="calendar.html" class="tab-item"><i class="fa fa-calendar"></i></a>
        <a href="profile.html" class="tab-item active"><i class="fa fa-user"></i></a>
    </div>

    <script>
        let currentFilter = 'all';

        function filterTab(type, el) {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentFilter = type;
            showToast('筛选：' + (type === 'all' ? '全部' : type === 'photo' ? '照片' : type === 'video' ? '视频' : type === 'audio' ? '录音' : '文案'));
        }

        function openDetail(name) {
            showToast('打开：' + name + ' 物料详情');
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
