<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>话术训练助手 - 麦田小程序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FA8C16', /* 麦田橙 - 统一品牌色 */
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #F5F5F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        
        /* 状态栏 */
        .status-bar {
            height: 44px;
            background: white;
            padding-top: 12px;
        }
        
        /* 标题栏 */
        .title-bar {
            height: 44px;
            background: white;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* AI形象 */
        .ai-avatar {
            width: 240px;
            height: 240px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        /* 模式按钮 */
        .mode-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F5F5F5;
        }
        
        /* 主按钮 */
        .btn-main {
            background: linear-gradient(135deg, #FA8C16, #FF8C5A);
            color: white;
            border-radius: 40px;
            padding: 14px 48px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 4px 16px rgba(255, 107, 53, 0.4);
        }
        
        /* 底部Tab栏 */
        .tab-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 29, 29, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 26px;
            padding: 8px 16px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
        }
        .tab-item i { font-size: 18px; }
        .tab-item.active {
            background: rgba(255, 107, 53, 0.15);
            color: #FA8C16;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 99999;
        }
        
        /* 项目选择弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            max-height: 70vh;
            overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #E8E8E8;
            border-radius: 2px;
            margin: 12px auto;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar bg-white px-4"></div>
    
    <!-- 标题栏 -->
    <div class="title-bar bg-white px-4">
        <div class="absolute left-4">
            <div class="w-6 h-6 bg-gray-200 rounded flex items-center justify-center">
                <i class="fa fa-chevron-left text-gray-500 text-xs"></i>
            </div>
        </div>
        <span class="text-base font-semibold text-gray-800">话术训练助手</span>
        <div class="absolute right-4">
            <div class="w-6 h-6 bg-gray-200 rounded flex items-center justify-center">
                <i class="fa fa-ellipsis-h text-gray-400 text-xs"></i>
            </div>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="px-4 py-6 pb-32">
        
        <!-- 顶部功能栏 -->
        <div class="flex justify-between items-center mb-6">
            <!-- 左侧模式按钮 -->
            <div class="flex gap-2">
                <!-- 语音按钮 -->
                <div class="mode-btn" onclick="selectMode(this, '电话')">
                    <i class="fa fa-phone text-gray-500 text-sm"></i>
                </div>
                <!-- 添加按钮 -->
                <div class="mode-btn" onclick="showProjectModal()">
                    <i class="fa fa-plus text-gray-500 text-sm"></i>
                </div>
            </div>
            
            <!-- 右侧选择项目按钮 -->
            <button class="flex items-center gap-2 px-3 py-2 bg-gray-100 rounded-full" onclick="showProjectModal()">
                <i class="fa fa-th-large text-primary text-sm"></i>
                <span id="selectedProjectTop" class="text-xs text-gray-700">选择项目</span>
                <i class="fa fa-chevron-down text-gray-400 text-xs"></i>
            </button>
        </div>
        
        <!-- AI形象 -->
        <div class="ai-avatar mb-6">
            <i class="fa fa-comments text-white text-5xl"></i>
        </div>
        
        <!-- 欢迎语 -->
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-gray-800 mb-1">Hi，欢迎来到话术训练智能体</h1>
            <p class="text-sm text-gray-500">你可以在这里训练不同类型的项目</p>
        </div>
        
        <!-- 选择项目 + 开始训练 -->
        <div class="flex flex-col items-center gap-4">
            
            <!-- 开始训练按钮 -->
            <button class="btn-main" onclick="startTraining()">
                开始训练
            </button>
        </div>
    </div>
    
    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <div class="tab-bar-inner">
            <a href="tools.html" class="tab-item">
                <i class="fa fa-rocket"></i>
            </a>
            <a href="ai-design.html" class="tab-item">
                <i class="fa fa-paint-brush"></i>
            </a>
            <a href="claw.html" class="tab-item">
                <i class="fa fa-commenting"></i>
            </a>
            <a href="calendar.html" class="tab-item">
                <i class="fa fa-calendar"></i>
            </a>
            <a href="profile.html" class="tab-item">
                <i class="fa fa-user"></i>
            </a>
        </div>
    </div>
    
    <!-- 项目选择弹窗 -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            
            <!-- 弹窗标题 -->
            <div class="px-4 pb-3 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <span class="text-base font-semibold text-gray-800">选择项目</span>
                    <div class="flex items-center gap-3">
                        <button class="text-primary text-sm" onclick="createProject()">
                            <i class="fa fa-plus mr-1"></i>新建
                        </button>
                        <i class="fa fa-times text-gray-400" onclick="hideProjectModal()"></i>
                    </div>
                </div>
            </div>
            
            <!-- Tab切换 -->
            <div class="flex px-4 py-3 gap-4 border-b border-gray-100">
                <button class="px-4 py-2 text-sm font-medium text-primary border-b-2 border-primary" id="tabOfficial" onclick="switchTab('official')">官方推荐</button>
                <button class="px-4 py-2 text-sm font-medium text-gray-400" id="tabMine" onclick="switchTab('mine')">我创建的</button>
            </div>
            
            <!-- 项目列表 -->
            <div class="overflow-y-auto" style="max-height: 50vh;">
                <div class="p-4 space-y-3" id="projectList">
                    <!-- 项目1 -->
                    <div class="bg-gray-50 rounded-xl p-4" onclick="selectProject('中海汇德里', '邀约/接待/沙盘讲解', 12, 85)">
                        <div class="flex items-center mb-2">
                            <div class="w-8 h-8 bg-primary/10 rounded-lg flex items-center justify-center mr-2">
                                <i class="fa fa-home text-primary text-sm"></i>
                            </div>
                            <span class="font-medium text-gray-800">中海汇德里</span>
                        </div>
                        <div class="text-xs text-gray-500 mb-2">场景：邀约/接待/沙盘讲解</div>
                        <div class="flex text-xs text-gray-400">
                            <span>已完成：12次</span>
                            <span class="mx-2">|</span>
                            <span class="text-green-500">评分：85分</span>
                        </div>
                    </div>
                    
                    <!-- 项目2 -->
                    <div class="bg-gray-50 rounded-xl p-4" onclick="selectProject('万科城市之光', '邀约/接待', 8, 78)">
                        <div class="flex items-center mb-2">
                            <div class="w-8 h-8 bg-blue-500/10 rounded-lg flex items-center justify-center mr-2">
                                <i class="fa fa-building text-blue-500 text-sm"></i>
                            </div>
                            <span class="font-medium text-gray-800">万科城市之光</span>
                        </div>
                        <div class="text-xs text-gray-500 mb-2">场景：邀约/接待</div>
                        <div class="flex text-xs text-gray-400">
                            <span>已完成：8次</span>
                            <span class="mx-2">|</span>
                            <span class="text-orange-500">评分：78分</span>
                        </div>
                    </div>
                    
                    <!-- 项目3 -->
                    <div class="bg-gray-50 rounded-xl p-4" onclick="selectProject('保利天汇', '沙盘讲解/样板间', 5, 92)">
                        <div class="flex items-center mb-2">
                            <div class="w-8 h-8 bg-purple-500/10 rounded-lg flex items-center justify-center mr-2">
                                <i class="fa fa-star text-purple-500 text-sm"></i>
                            </div>
                            <span class="font-medium text-gray-800">保利天汇</span>
                        </div>
                        <div class="text-xs text-gray-500 mb-2">场景：沙盘讲解/样板间</div>
                        <div class="flex text-xs text-gray-400">
                            <span>已完成：5次</span>
                            <span class="mx-2">|</span>
                            <span class="text-green-500">评分：92分</span>
                        </div>
                    </div>
                    
                    <!-- 项目4 -->
                    <div class="bg-gray-50 rounded-xl p-4" onclick="selectProject('龙湖天街', '成交逼定', 3, 65)">
                        <div class="flex items-center mb-2">
                            <div class="w-8 h-8 bg-red-500/10 rounded-lg flex items-center justify-center mr-2">
                                <i class="fa fa-handshake-o text-red-500 text-sm"></i>
                            </div>
                            <span class="font-medium text-gray-800">龙湖天街</span>
                        </div>
                        <div class="text-xs text-gray-500 mb-2">场景：成交逼定</div>
                        <div class="flex text-xs text-gray-400">
                            <span>已完成：3次</span>
                            <span class="mx-2">|</span>
                            <span class="text-orange-500">评分：65分</span>
                        </div>
                    </div>
                </div>
                
                <!-- 我的创建Tab内容 -->
                <div class="p-4 hidden" id="myProjectList">
                    <div class="text-center text-gray-400 py-8">
                        <i class="fa fa-folder-open text-4xl mb-2"></i>
                        <p class="text-sm">暂无创建的训练项目</p>
                        <button class="mt-3 text-primary text-sm">去创建</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedProjectName = '';
        
        function selectMode(btn, mode) {
            showToast('已选择：' + mode + '模式');
        }
        
        function showProjectModal() {
            document.getElementById('projectModal').classList.add('show');
        }
        
        function createProject() {
            showToast('新建项目功能开发中');
        }
        
        function hideProjectModal() {
            document.getElementById('projectModal').classList.remove('show');
        }
        
        function switchTab(tab) {
            const officialTab = document.getElementById('tabOfficial');
            const mineTab = document.getElementById('tabMine');
            const projectList = document.getElementById('projectList');
            const myProjectList = document.getElementById('myProjectList');
            
            if (tab === 'mine') {
                mineTab.classList.add('text-primary', 'border-b-2', 'border-primary');
                mineTab.classList.remove('text-gray-400');
                officialTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
                officialTab.classList.add('text-gray-400');
                projectList.classList.add('hidden');
                myProjectList.classList.remove('hidden');
            } else {
                officialTab.classList.add('text-primary', 'border-b-2', 'border-primary');
                officialTab.classList.remove('text-gray-400');
                mineTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
                mineTab.classList.add('text-gray-400');
                projectList.classList.remove('hidden');
                myProjectList.classList.add('hidden');
            }
        }
        
        function selectProject(name, scenes, times, score) {
            document.getElementById('selectedProject').textContent = name;
            selectedProjectName = name;
            // 同时更新顶部的选择项目按钮
            const topBtn = document.getElementById('selectedProjectTop');
            if (topBtn) topBtn.textContent = name;
            hideProjectModal();
            showToast('已选择：' + name);
        }
        
        function startTraining() {
            if (!selectedProjectName) {
                showToast('请先选择训练项目');
                return;
            }
            showToast('即将开始训练...');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // 点击遮罩关闭
        document.getElementById('projectModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideProjectModal();
            }
        });
    </script>
</body>
</html>
