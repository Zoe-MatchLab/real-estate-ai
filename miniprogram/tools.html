<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>服务工具 - 麦田小程序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #F5F5F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .page-container {
            padding-bottom: calc(110px + env(safe-area-inset-bottom));
        }
        
        /* 顶部状态栏 */
        .status-bar {
            height: 44px;
            background: white;
            padding-top: 12px;
        }
        
        /* 标题栏 */
        .title-bar {
            height: 44px;
            padding-left: 16px;
            background: white;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            align-items: center;
            justify-content: start;
        }
        
        /* 麦田Logo */
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #FF6B35, #FF8C5A);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 搜索栏 */
        .search-bar {
            background: white;
            padding: 12px 16px;
        }
        .search-input-wrap {
            display: flex;
            align-items: center;
            background: #F5F5F5;
            border-radius: 22px;
            padding: 0 16px;
            height: 44px;
        }
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            color: #333;
        }
        .search-input::placeholder {
            color: #999;
        }
        .search-btn {
            background: linear-gradient(135deg, #FF6B35, #FF8C5A);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* 筛选区域 */
        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: white;
            margin-bottom: 12px;
        }
        .filter-left {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }
        .filter-right {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #FA8C16;
            font-size: 14px;
        }
        
        /* 横幅图片 */
        .banner-img {
            width: calc(100% - 32px);
            margin: 0 16px 16px;
            border-radius: 16px;
            height: 144px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 工具网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
        }
        
        /* 工具卡片 */
        .tool-card {
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #E8E8E8;
        }
        .tool-card-img {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .tool-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,183,77,0.7) 0%, rgba(255,107,53,0.8) 100%);
            mix-blend-mode: multiply;
        }
        .tool-card-content {
            position: relative;
            z-index: 1;
            padding: 14px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .tool-card-title {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }
        .tool-card-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            line-height: 1.4;
        }
        .tool-card-collect {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        
        /* 不同尺寸的工具卡片 */
        .tool-card-tall { height: 163px; }
        .tool-card-medium { height: 150px; }
        .tool-card-short { height: 95px; }
        
        /* 底部Tab栏 - 胶囊悬浮 */
        .tab-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 29, 29, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 26px;
            padding: 8px 16px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: 100%;
            width: 100%;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            transition: all 0.2s;
            color: rgba(255,255,255,0.5);
        }
        .tab-item i {
            font-size: 18px;
        }
        .tab-item.active {
            color: #FF6B35;
        }
        .tab-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #FA8C16;
            border-radius: 0 0 2px 2px;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 99999;
            font-size: 14px;
        }
    </style>
    
    <style>
        /* 通知面板 */
        .notification-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 16px 16px 0 0;
            max-height: 70vh;
            z-index: 10000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }
        .notification-panel.show {
            transform: translateY(0);
        }
        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .notification-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .notification-item {
            padding: 12px 16px;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
        }
        .notification-item:active {
            background: #F7F8FA;
        }
        .notification-item.read {
            opacity: 0.6;
        }
        .filter-tab {
            padding: 8px 16px;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid transparent;
            flex: 1;
            text-align: center;
        }
        .filter-tab.active {
            color: #FF6B35;
            border-bottom-color: #FF6B35;
        }
    </style>
</head>
<body class="page-container">

    <script>
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function toggleCollect(btn) {
            const icon = btn.querySelector('i');
            if (icon.classList.contains('fa-plus')) {
                icon.classList.remove('fa-plus');
                icon.classList.add('fa-check');
                btn.style.background = 'rgba(255,255,255,0.5)';
                showToast('已添加');
            } else {
                icon.classList.remove('fa-check');
                icon.classList.add('fa-plus');
                btn.style.background = '';
                showToast('已移除');
            }
        }
    </script>
    
    <!-- 通知数据 -->
    <script>
        // 模拟通知数据
        window.notificationData = [
            {
                id: 1,
                taskName: '中海汇德里探盘任务',
                taskType: 'exploration',
                message: '2/4阶段进行中，请注意完成',
                isRead: false,
                createTime: new Date()
            },
            {
                id: 2,
                taskName: '万科城市之光话术训练',
                taskType: 'speech',
                message: '新任务已下发，请及时完成',
                isRead: false,
                createTime: new Date(Date.now() - 10*60*1000)
            },
            {
                id: 3,
                taskName: '朋友圈文案生成',
                taskType: 'content',
                message: '等待探盘完成后执行',
                isRead: true,
                createTime: new Date(Date.now() - 24*60*60*1000)
            }
        ];
        
        // 页面加载时更新badge
        document.addEventListener('DOMContentLoaded', function() {
            updateBadge();
            // 自动弹出通知提示（演示用）
            setTimeout(function() {
                showAutoToast('您有新的任务通知');
            }, 1500);
        });
        
        function updateBadge() {
            const badge = document.getElementById('notifyBadge');
            if (!badge) return;
            const unreadCount = (window.notificationData || []).filter(n => !n.isRead).length;
            badge.textContent = unreadCount;
            badge.style.display = unreadCount > 0 ? 'flex' : 'none';
        }
        
        function showNotificationPanel() {
            document.getElementById('notifyOverlay').classList.add('show');
            document.getElementById('notifyPanel').classList.add('show');
            renderNotificationList('all');
        }
        
        function hideNotificationPanel() {
            document.getElementById('notifyOverlay').classList.remove('show');
            document.getElementById('notifyPanel').classList.remove('show');
        }
        
        function renderNotificationList(filterType) {
            const list = document.getElementById('notifyList');
            if (!list) return;
            const data = window.notificationData || [];
            
            const filtered = filterType === 'all' 
                ? data 
                : data.filter(item => item.taskType === filterType);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="p-8 text-center text-gray-400">暂无通知</div>';
                return;
            }
            
            const typeNames = {
                'exploration': '探盘',
                'speech': '话术',
                'content': '内容'
            };
            
            list.innerHTML = filtered.map(function(item) {
                return '<div class="notification-item ' + (item.isRead ? 'read' : '') + '" onclick="handleNotificationClick(' + item.id + ', \'' + item.taskType + '\')">' +
                    '<div class="flex items-center gap-2 mb-1">' +
                    '<span class="' + (item.isRead ? 'bg-gray-300' : 'bg-red-500') + ' w-2 h-2 rounded-full"></span>' +
                    '<span class="font-medium text-gray-800">' + item.taskName + '</span>' +
                    '<span class="text-xs text-gray-400 ml-auto">' + typeNames[item.taskType] + '</span>' +
                    '</div>' +
                    '<div class="text-sm text-gray-500 mb-1">' + item.message + '</div>' +
                    '<div class="text-xs text-gray-400">' + formatTime(item.createTime) + '</div>' +
                    '</div>';
            }).join('');
        }
        
        function filterNotifications(type) {
            // 更新Tab状态
            document.querySelectorAll('.filter-tab').forEach(function(tab) {
                tab.classList.remove('active');
                if (tab.dataset.type === type) tab.classList.add('active');
            });
            renderNotificationList(type);
        }
        
        function handleNotificationClick(id, type) {
            // 标记已读
            const item = window.notificationData.find(function(n) { return n.id === id; });
            if (item) item.isRead = true;
            updateBadge();
            hideNotificationPanel();
            
            // 跳转对应页面
            if (type === 'exploration') {
                window.location.href = 'task-detail.html';
            } else if (type === 'speech') {
                window.location.href = 'speech-train.html';
            } else if (type === 'content') {
                window.location.href = 'calendar.html';
            }
        }
        
        function clearAllNotifications() {
            window.notificationData = [];
            updateBadge();
            renderNotificationList('all');
            showAutoToast('已清空全部通知');
        }
        
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return minutes + '分钟前';
            if (hours < 24) return hours + '小时前';
            if (days < 7) return days + '天前';
            return date.toLocaleDateString();
        }
        
        function showAutoToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-16 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg text-sm z-99999';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(function() {
                toast.remove();
            }, 2000);
        }
    </script>
</body>

<!-- 通知面板 -->
<div class="notification-overlay" id="notifyOverlay" onclick="hideNotificationPanel()"></div>
<div class="notification-panel" id="notifyPanel">
    <!-- 面板头部 -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
        <span class="text-base font-semibold text-gray-800">通知</span>
        <div class="flex items-center gap-3">
            <button class="text-sm text-primary" onclick="clearAllNotifications()">清空全部</button>
            <i class="fa fa-times text-gray-400" onclick="hideNotificationPanel()"></i>
        </div>
    </div>
    
    <!-- 分类Tab -->
    <div class="flex border-b border-gray-100">
        <button class="filter-tab active" data-type="all" onclick="filterNotifications('all')">全部</button>
        <button class="filter-tab" data-type="exploration" onclick="filterNotifications('exploration')">探盘</button>
        <button class="filter-tab" data-type="speech" onclick="filterNotifications('speech')">话术</button>
        <button class="filter-tab" data-type="content" onclick="filterNotifications('content')">内容</button>
    </div>
    
    <!-- 消息列表 -->
    <div class="overflow-y-auto" style="max-height: 50vh;" id="notifyList">
        <!-- 动态渲染 -->
    </div>
</div>
