<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI工具 - 麦田小程序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #1A1A1A 0%, #2D2D2D 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .page-container {
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }
        
        /* 顶部区域 */
        .header-section {
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%);
            padding: 60px 20px 80px 20px;
            position: relative;
            overflow: hidden;
        }
        .header-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        
        /* 工具卡片 */
        .tool-card {
            background: #2D2D2D;
            border-radius: 16px;
            padding: 24px 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #FF6B35, #FF8C5A);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tool-card:hover::before,
        .tool-card:active::before {
            opacity: 1;
        }
        .tool-card:active {
            transform: scale(0.98);
        }
        
        /* 工具图标 */
        .tool-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        
        /* 工具标题 */
        .tool-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
        }
        
        /* 工具描述 */
        .tool-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }
        
        /* 收藏按钮 */
        .collect-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: all 0.2s;
        }
        .collect-btn:active {
            background: rgba(255,107,53,0.2);
            color: #FF6B35;
        }
        
        /* 分类标题 */
        .section-title {
            font-size: 17px;
            font-weight: 600;
            color: #999;
            margin-bottom: 12px;
            padding-left: 4px;
        }
        
        /* 底部Tab栏 */
        .tab-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 29, 29, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 26px;
            padding: 8px 16px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
            transition: all 0.2s;
        }
        .tab-item i {
            font-size: 18px;
        }
        .tab-item.active {
            background: rgba(255, 107, 53, 0.15);
            color: #FF6B35;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 99999;
            font-size: 14px;
        }
        
        /* 暗色主题适配 */
        .text-muted {
            color: #666;
        }
    </style>
</head>
<body class="page-container">
    <!-- 顶部区域 -->
    <div class="header-section">
        <!-- Logo区域 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center">
                <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center mr-3 shadow-lg">
                    <span class="text-orange-500 font-bold text-xl">麦</span>
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg">麦田咨询师</h1>
                    <p class="text-orange-200 text-xs">智能作业平台</p>
                </div>
            </div>
            <!-- 通知按钮 -->
            <div class="relative">
                <div class="w-11 h-11 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fa fa-bell text-white text-lg"></i>
                </div>
                <span class="absolute top-1 right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>
            </div>
        </div>
        
        <!-- 主标题卡片 - 好房榜AI助手 -->
        <div class="bg-black/30 rounded-2xl p-5 relative" style="background: rgba(0,0,0,0.3);">
            <div class="flex items-start justify-between">
                <div class="flex-1">
                    <h2 class="text-white font-bold text-2xl mb-2">好房榜AI助手</h2>
                    <p class="text-orange-100 text-base">好房榜单，一键精准推荐</p>
                </div>
                <button class="collect-btn" onclick="toggleCollect(this)">
                    <i class="fa fa-plus"></i>
                </button>
            </div>
            <!-- 装饰元素 -->
            <div class="absolute top-3 right-16 w-16 h-16 bg-orange-500/20 rounded-full blur-xl"></div>
        </div>
    </div>

    <!-- 工具列表区域 -->
    <div class="px-4 py-6">
        <!-- 获客工具 -->
        <h3 class="section-title">🔥 获客工具</h3>
        <div class="space-y-4">
            <!-- 房屋营销方案 -->
            <div class="tool-card" onclick="showToast('房屋营销方案')">
                <div class="flex items-start">
                    <div class="tool-icon bg-gradient-to-br from-orange-500 to-orange-600">
                        <i class="fa fa-building text-white text-xl"></i>
                    </div>
                    <div class="flex-1 ml-4">
                        <h4 class="tool-title">房屋营销方案</h4>
                        <p class="tool-desc">为您的房源一键生成营销方案</p>
                    </div>
                    <button class="collect-btn" onclick="event.stopPropagation();toggleCollect(this)">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
            </div>
            
            <!-- 房源笔记生成 -->
            <div class="tool-card" onclick="showToast('房源笔记生成')">
                <div class="flex items-start">
                    <div class="tool-icon bg-gradient-to-br from-blue-500 to-blue-600">
                        <i class="fa fa-file-text text-white text-xl"></i>
                    </div>
                    <div class="flex-1 ml-4">
                        <h4 class="tool-title">房源笔记生成</h4>
                        <p class="tool-desc">快速生成专业的房源笔记</p>
                    </div>
                    <button class="collect-btn" onclick="event.stopPropagation();toggleCollect(this)">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
            </div>
            
            <!-- 朋友圈文案 -->
            <div class="tool-card" onclick="showToast('朋友圈文案')">
                <div class="flex items-start">
                    <div class="tool-icon bg-gradient-to-br from-pink-500 to-pink-600">
                        <i class="fa fa-image text-white text-xl"></i>
                    </div>
                    <div class="flex-1 ml-4">
                        <h4 class="tool-title">朋友圈文案</h4>
                        <p class="tool-desc">一键生成吸睛朋友圈文案</p>
                    </div>
                    <button class="collect-btn" onclick="event.stopPropagation();toggleCollect(this)">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 销售工具 -->
        <h3 class="section-title mt-8">💼 销售工具</h3>
        <div class="space-y-4">
            <!-- 客户画像分析 -->
            <div class="tool-card" onclick="showToast('客户画像分析')">
                <div class="flex items-start">
                    <div class="tool-icon bg-gradient-to-br from-purple-500 to-purple-600">
                        <i class="fa fa-user-circle text-white text-xl"></i>
                    </div>
                    <div class="flex-1 ml-4">
                        <h4 class="tool-title">客户画像分析</h4>
                        <p class="tool-desc">精准定位客户需求与偏好</p>
                    </div>
                    <button class="collect-btn" onclick="event.stopPropagation();toggleCollect(this)">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
            </div>
            
            <!-- 竞品对比分析 -->
            <div class="tool-card" onclick="showToast('竞品对比分析')">
                <div class="flex items-start">
                    <div class="tool-icon bg-gradient-to-br from-green-500 to-green-600">
                        <i class="fa fa-balance-scale text-white text-xl"></i>
                    </div>
                    <div class="flex-1 ml-4">
                        <h4 class="tool-title">竞品对比分析</h4>
                        <p class="tool-desc">客观对比房源优劣</p>
                    </div>
                    <button class="collect-btn" onclick="event.stopPropagation();toggleCollect(this)">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
            </div>
            
            <!-- 购房价格估算 -->
            <div class="tool-card" onclick="showToast('购房价格估算')">
                <div class="flex items-start">
                    <div class="tool-icon bg-gradient-to-br from-cyan-500 to-cyan-600">
                        <i class="fa fa-calculator text-white text-xl"></i>
                    </div>
                    <div class="flex-1 ml-4">
                        <h4 class="tool-title">购房价格估算</h4>
                        <p class="tool-desc">精准计算购房成本</p>
                    </div>
                    <button class="collect-btn" onclick="event.stopPropagation();toggleCollect(this)">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 学习培训 -->
        <h3 class="section-title mt-8">📚 学习培训</h3>
        <div class="grid grid-cols-2 gap-4">
            <!-- 产品知识 -->
            <div class="tool-card" onclick="window.location.href='train.html'">
                <div class="flex flex-col items-center text-center">
                    <div class="tool-icon bg-gradient-to-br from-red-500 to-red-600 mb-3">
                        <i class="fa fa-book text-white text-xl"></i>
                    </div>
                    <h4 class="tool-title text-base">产品知识</h4>
                    <p class="tool-desc text-xs mt-1">楼盘知识学习</p>
                </div>
            </div>
            
            <!-- 答题练习 -->
            <div class="tool-card" onclick="window.location.href='exam.html'">
                <div class="flex flex-col items-center text-center">
                    <div class="tool-icon bg-gradient-to-br from-yellow-500 to-yellow-600 mb-3">
                        <i class="fa fa-tasks text-white text-xl"></i>
                    </div>
                    <h4 class="tool-title text-base">答题练习</h4>
                    <p class="tool-desc text-xs mt-1">巩固知识体系</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <div class="tab-bar-inner">
            <a href="tools.html" class="tab-item active">
                <i class="fa fa-rocket"></i>
            </a>
            <a href="ai-design.html" class="tab-item">
                <i class="fa fa-paint-brush"></i>
            </a>
            <a href="claw.html" class="tab-item">
                <i class="fa fa-commenting"></i>
            </a>
            <a href="calendar.html" class="tab-item">
                <i class="fa fa-calendar"></i>
            </a>
            <a href="profile.html" class="tab-item">
                <i class="fa fa-user"></i>
            </a>
        </div>
    </div>

    <script>
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function toggleCollect(btn) {
            const icon = btn.querySelector('i');
            if (icon.classList.contains('fa-plus')) {
                icon.classList.remove('fa-plus');
                icon.classList.add('fa-check');
                btn.style.background = 'rgba(255,107,53,0.2)';
                btn.style.color = '#FF6B35';
                showToast('已添加');
            } else {
                icon.classList.remove('fa-check');
                icon.classList.add('fa-plus');
                btn.style.background = '';
                btn.style.color = '';
                showToast('已移除');
            }
        }
    </script>
</body>
</html>
