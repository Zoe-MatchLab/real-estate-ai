<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>服务工具 - 麦田小程序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #F5F5F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .page-container {
            padding-bottom: calc(110px + env(safe-area-inset-bottom));
        }
        
        /* 顶部状态栏 */
        .status-bar {
            height: 44px;
            background: white;
            padding-top: 12px;
        }
        
        /* 标题栏 */
        .title-bar {
            height: 44px;
            padding-left: 16px;
            background: white;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            align-items: center;
            justify-content: start;
        }
        
        /* 麦田Logo */
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #FF6B35, #FF8C5A);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 搜索栏 */
        .search-bar {
            background: white;
            padding: 12px 16px;
        }
        .search-input-wrap {
            display: flex;
            align-items: center;
            background: #F5F5F5;
            border-radius: 22px;
            padding: 0 16px;
            height: 44px;
        }
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            color: #333;
        }
        .search-input::placeholder {
            color: #999;
        }
        .search-btn {
            background: linear-gradient(135deg, #FF6B35, #FF8C5A);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* 筛选区域 */
        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: white;
            margin-bottom: 12px;
        }
        .filter-left {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }
        .filter-right {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #FA8C16;
            font-size: 14px;
        }
        
        /* 横幅图片 */
        .banner-img {
            width: calc(100% - 32px);
            margin: 0 16px 16px;
            border-radius: 16px;
            height: 144px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 工具网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
        }
        
        /* 工具卡片 */
        .tool-card {
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #E8E8E8;
        }
        .tool-card-img {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .tool-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,183,77,0.7) 0%, rgba(255,107,53,0.8) 100%);
            mix-blend-mode: multiply;
        }
        .tool-card-content {
            position: relative;
            z-index: 1;
            padding: 14px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .tool-card-title {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }
        .tool-card-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            line-height: 1.4;
        }
        .tool-card-collect {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        
        /* 不同尺寸的工具卡片 */
        .tool-card-tall { height: 163px; }
        .tool-card-medium { height: 150px; }
        .tool-card-short { height: 95px; }
        
        /* 底部Tab栏 - 胶囊悬浮 */
        .tab-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 29, 29, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 26px;
            padding: 8px 16px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: 100%;
            width: 100%;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            transition: all 0.2s;
            color: rgba(255,255,255,0.5);
        }
        .tab-item i {
            font-size: 18px;
        }
        .tab-item.active {
            color: #FF6B35;
        }
        .tab-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #FA8C16;
            border-radius: 0 0 2px 2px;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 99999;
            font-size: 14px;
        }
    </style>
</head>
<body class="page-container">
    <!-- 状态栏 -->
    <div class="status-bar bg-white"></div>
    
    <!-- 标题栏 -->
    <div class="title-bar bg-white">
        <div class="logo-icon mr-2">
            <span class="text-white font-bold text-sm">AI</span>
        </div>
        <span class="text-base font-semibold text-gray-800">服务工具</span>
    </div>
    
    <!-- 搜索栏 -->
    <div class="search-bar">
        <div class="search-input-wrap">
            <i class="fa fa-search text-gray-400 mr-2"></i>
            <input type="text" class="search-input" placeholder="输入工具名称">
            <button class="search-btn">搜索</button>
        </div>
    </div>
    
    <!-- 筛选区域 -->
    <div class="filter-bar">
        <div class="filter-left">
            <i class="fa fa-sliders"></i>
            <span>管理排序</span>
        </div>
        <div class="filter-right">
            <!-- <span>Collapse All</span>
            <i class="fa fa-chevron-up"></i> -->
        </div>
    </div>
    
    <!-- 横幅 -->
    <img class="banner-img" src="https://images.unsplash.com/photo-1557821552-17105176677c?w=690&h=288&fit=crop" alt="Banner">
    
    <!-- 工具网格 -->
    <div class="tools-grid">
        <!-- 好房榜AI助手 -->
        <div class="tool-card tool-card-medium" onclick="showToast('好房榜AI助手')">
            <img class="tool-card-img" src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=336&h=326&fit=crop" alt="">
            <div class="tool-card-overlay" style="background: linear-gradient(135deg, rgba(255,183,77,0.6) 0%, rgba(255,107,53,0.85) 100%);"></div>
            <div class="tool-card-content">
                <button class="tool-card-collect" onclick="event.stopPropagation();toggleCollect(this)">
                    <i class="fa fa-plus"></i>
                </button>
                <h4 class="tool-card-title">好房榜AI助手</h4>
                <p class="tool-card-desc">好房榜单，一键精准推荐</p>
            </div>
        </div>
        
        <!-- 房屋营销方案 -->
        <div class="tool-card tool-card-tall" onclick="showToast('房屋营销方案')">
            <img class="tool-card-img" src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=336&h=448&fit=crop" alt="">
            <div class="tool-card-overlay" style="background: linear-gradient(135deg, rgba(102,126,234,0.6) 0%, rgba(118,75,162,0.85) 100%);"></div>
            <div class="tool-card-content">
                <button class="tool-card-collect" onclick="event.stopPropagation();toggleCollect(this)">
                    <i class="fa fa-plus"></i>
                </button>
                <h4 class="tool-card-title">房屋营销方案</h4>
                <p class="tool-card-desc">为您的房一键生成营销方案</p>
            </div>
        </div>
        
        <!-- 房源笔记生成器 -->
        <div class="tool-card tool-card-medium" onclick="showToast('房源笔记生成器')">
            <img class="tool-card-img" src="https://images.unsplash.com/photo-1456324504439-367cee3b3c32?w=336&h=326&fit=crop" alt="">
            <div class="tool-card-overlay" style="background: linear-gradient(135deg, rgba(236,72,153,0.6) 0%, rgba(190,24,93,0.85) 100%);"></div>
            <div class="tool-card-content">
                <button class="tool-card-collect" onclick="event.stopPropagation();toggleCollect(this)">
                    <i class="fa fa-plus"></i>
                </button>
                <h4 class="tool-card-title">房源笔记生成器</h4>
                <p class="tool-card-desc">好房榜单，一键精准推荐</p>
            </div>
        </div>
        
        <!-- 麦田推荐 -->
        <div class="tool-card tool-card-short" onclick="showToast('麦田推荐')">
            <img class="tool-card-img" src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=336&h=204&fit=crop" alt="">
            <div class="tool-card-overlay" style="background: linear-gradient(135deg, rgba(239,68,68,0.6) 0%, rgba(185,28,28,0.85) 100%);"></div>
            <div class="tool-card-content">
                <button class="tool-card-collect" onclick="event.stopPropagation();toggleCollect(this)">
                    <i class="fa fa-plus"></i>
                </button>
                <h4 class="tool-card-title">麦田推荐</h4>
                <p class="tool-card-desc">为您的房一键生成营销方案</p>
            </div>
        </div>
        
        <!-- AI话术训练 -->
        <div class="tool-card tool-card-medium" onclick="window.location.href='speech-train.html'">
            <img class="tool-card-img" src="https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?w=336&h=326&fit=crop" alt="">
            <div class="tool-card-overlay" style="background: linear-gradient(135deg, rgba(0,200,200,0.6) 0%, rgba(0,150,150,0.85) 100%);"></div>
            <div class="tool-card-content">
                <button class="tool-card-collect" onclick="event.stopPropagation();toggleCollect(this)">
                    <i class="fa fa-plus"></i>
                </button>
                <h4 class="tool-card-title">AI话术训练</h4>
                <p class="tool-card-desc">智能对话，仿真场景练习</p>
            </div>
        </div>
                <p class="tool-card-desc">为您的房一键生成营销方案</p>
            </div>
        </div>
    </div>
    
    <!-- 更多工具按钮 -->
    <div class="px-4 mt-4">
        <button class="w-full py-3 bg-white rounded-xl text-primary font-medium text-sm" onclick="showToast('查看更多工具')">
            查看更多工具 <i class="fa fa-chevron-down ml-1"></i>
        </button>
    </div>
    
    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <div class="tab-bar-inner">
            <a href="tools.html" class="tab-item active">
                <i class="fa fa-rocket"></i>
            </a>
            <a href="ai-design.html" class="tab-item">
                <i class="fa fa-paint-brush"></i>
            </a>
            <a href="claw.html" class="tab-item">
                <i class="fa fa-commenting"></i>
            </a>
            <a href="calendar.html" class="tab-item">
                <i class="fa fa-calendar"></i>
            </a>
            <a href="profile.html" class="tab-item">
                <i class="fa fa-user"></i>
            </a>
        </div>
    </div>
        </div>
    </div>

    <script>
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function toggleCollect(btn) {
            const icon = btn.querySelector('i');
            if (icon.classList.contains('fa-plus')) {
                icon.classList.remove('fa-plus');
                icon.classList.add('fa-check');
                btn.style.background = 'rgba(255,255,255,0.5)';
                showToast('已添加');
            } else {
                icon.classList.remove('fa-check');
                icon.classList.add('fa-plus');
                btn.style.background = '';
                showToast('已移除');
            }
        }
    </script>
</body>
</html>
