<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI内容管理 - 房产AI小程序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #F7F8FA;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* 底部Tab栏 */
        .tab-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 29, 29, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 26px;
            padding: 8px 16px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
        }
        .tab-item i { font-size: 18px; }
        .tab-item.active {
            background: rgba(255, 107, 53, 0.15);
            color: #FF6B35;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 99999;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="h-11 bg-white"></div>
    
    <!-- 标题栏 -->
    <div class="h-11 bg-white flex items-center justify-center border-b border-gray-100 relative">
        <span class="text-base font-semibold text-gray-800">AI内容管理</span>
        <div class="absolute right-4">
            <i class="fa fa-ellipsis-h text-gray-400"></i>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="flex" style="height: calc(100vh - 200px);">
        <!-- 左侧日期列表 -->
        <div class="w-20 bg-white overflow-y-auto border-r border-gray-100 flex-shrink-0">
            <!-- 日期项 -->
            <div class="date-item py-4 px-2 border-b border-gray-50 active">
                <div class="text-xs text-gray-800 font-medium">2025-09-16</div>
                <div class="text-xs text-gray-400 mt-1">7天前</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">2025-09-17</div>
                <div class="text-xs text-gray-400 mt-1">6天前</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">2025-09-18</div>
                <div class="text-xs text-gray-400 mt-1">5天前</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">2025-09-19</div>
                <div class="text-xs text-gray-400 mt-1">4天前</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">2025-09-20</div>
                <div class="text-xs text-gray-400 mt-1">3天前</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">2025-09-21</div>
                <div class="text-xs text-gray-400 mt-1">2天前</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">2025-09-22</div>
                <div class="text-xs text-gray-400 mt-1">昨天</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50 bg-orange-50">
                <div class="text-xs text-primary font-medium">2025-09-23</div>
                <div class="text-xs text-primary mt-1">今天</div>
            </div>
        </div>
        
        <!-- 右侧内容列表 -->
        <div class="flex-1 overflow-y-auto bg-gray-50 p-3">
            <!-- 内容卡片 -->
            <div class="bg-white rounded-xl p-4 mb-3" onclick="showToast('查看详情')">
                <div class="flex gap-3">
                    <img class="w-24 h-20 rounded-lg object-cover" src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=200&h=160&fit=crop" alt="">
                    <div class="flex-1">
                        <h4 class="text-sm font-medium text-gray-800 line-clamp-2">重磅！上海取消限购政策解读新房市场迎来重大利好</h4>
                        <div class="flex items-center gap-2 mt-2 text-xs text-gray-400">
                            <span>政策解读</span>
                            <span>·</span>
                            <span>2025-09-23</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl p-4 mb-3" onclick="showToast('查看详情')">
                <div class="flex gap-3">
                    <img class="w-24 h-20 rounded-lg object-cover" src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=200&h=160&fit=crop" alt="">
                    <div class="flex-1">
                        <h4 class="text-sm font-medium text-gray-800 line-clamp-2">二手房交易税费计算方式详解避免踩坑必看</h4>
                        <div class="flex items-center gap-2 mt-2 text-xs text-gray-400">
                            <span>二手房</span>
                            <span>·</span>
                            <span>2025-09-22</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl p-4 mb-3" onclick="showToast('查看详情')">
                <div class="flex gap-3">
                    <img class="w-24 h-20 rounded-lg object-cover" src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=200&h=160&fit=crop" alt="">
                    <div class="flex-1">
                        <h4 class="text-sm font-medium text-gray-800 line-clamp-2">租房市场行情分析租金走势预测报告</h4>
                        <div class="flex items-center gap-2 mt-2 text-xs text-gray-400">
                            <span>租赁市场</span>
                            <span>·</span>
                            <span>2025-09-21</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl p-4 mb-3" onclick="showToast('查看详情')">
                <div class="flex gap-3">
                    <img class="w-24 h-20 rounded-lg object-cover" src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=200&h=160&fit=crop" alt="">
                    <div class="flex-1">
                        <h4 class="text-sm font-medium text-gray-800 line-clamp-2">新房开盘预告多个热门项目即将入市</h4>
                        <div class="flex items-center gap-2 mt-2 text-xs text-gray-400">
                            <span>新房资讯</span>
                            <span>·</span>
                            <span>2025-09-20</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <div class="tab-bar-inner">
            <a href="tools.html" class="tab-item">
                <i class="fa fa-rocket"></i>
            </a>
            <a href="ai-design.html" class="tab-item">
                <i class="fa fa-paint-brush"></i>
            </a>
            <a href="claw.html" class="tab-item">
                <i class="fa fa-commenting"></i>
            </a>
            <a href="calendar.html" class="tab-item active">
                <i class="fa fa-calendar"></i>
            </a>
            <a href="profile.html" class="tab-item">
                <i class="fa fa-user"></i>
            </a>
        </div>
    </div>

    <script>
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // 日期选择
        document.querySelectorAll('.date-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.date-item').forEach(i => {
                    i.classList.remove('bg-orange-50', 'active');
                    i.querySelector('div').classList.remove('text-primary', 'font-medium');
                    i.querySelector('div').classList.add('text-gray-500');
                });
                this.classList.add('bg-orange-50', 'active');
                this.querySelector('div').classList.remove('text-gray-500');
                this.querySelector('div').classList.add('text-primary', 'font-medium');
            });
        });
    </script>
</body>
</html>
