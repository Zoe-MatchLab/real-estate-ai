<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>内容日历 - 房产AI小程序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #F7F8FA;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* 底部Tab栏 */
        .tab-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 29, 29, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 26px;
            padding: 8px 16px;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-item {
            width: 44px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: rgba(255,255,255,0.5);
        }
        .tab-item i { font-size: 18px; }
        .tab-item.active {
            background: rgba(255, 107, 53, 0.15);
            color: #FF6B35;
        }
        
        /* 任务卡片样式 */
        .task-card {
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .task-card:active {
            transform: scale(0.98);
        }
        .task-card.type-house { border-left-color: #FF6B35; }
        .task-card.type-speech { border-left-color: #9B59FF; }
        .task-card.type-content { border-left-color: #00B42A; }
        .task-card.type-self { border-left-color: #FFD000; }
        .task-card.type-info { border-left-color: #86909C; }
        
        /* 状态标签 */
        .status-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-pending { background: #FFF7E6; color: #FF7D00; }
        .status-progress { background: #E8F3FF; color: #165DFF; }
        .status-done { background: #E8FFEA; color: #00B42A; }
        .status-overdue { background: #FFECE8; color: #F53F3F; }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 99999;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="h-11 bg-white"></div>
    
    <!-- 标题栏 -->
    <div class="h-11 bg-white flex items-center justify-center border-b border-gray-100 relative">
        <span class="text-base font-semibold text-gray-800">内容日历</span>
        <div class="absolute right-4 flex items-center gap-2">
            <i class="fa fa-search text-gray-400"></i>
            <i class="fa fa-ellipsis-h text-gray-400"></i>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="flex" style="height: calc(100vh - 200px);">
        <!-- 左侧日期列表 -->
        <div class="w-20 bg-white overflow-y-auto border-r border-gray-100 flex-shrink-0">
            <!-- 日期项 -->
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">3月28日</div>
                <div class="text-xs text-gray-400 mt-1">周五</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">3月29日</div>
                <div class="text-xs text-gray-400 mt-1">周六</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">3月30日</div>
                <div class="text-xs text-gray-400 mt-1">周日</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50 bg-orange-50 active">
                <div class="text-xs text-primary font-medium">今天</div>
                <div class="text-xs text-primary mt-1">3月31日</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">4月1日</div>
                <div class="text-xs text-gray-400 mt-1">周二</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">4月2日</div>
                <div class="text-xs text-gray-400 mt-1">周三</div>
            </div>
            <div class="date-item py-4 px-2 border-b border-gray-50">
                <div class="text-xs text-gray-500">4月3日</div>
                <div class="text-xs text-gray-400 mt-1">周四</div>
            </div>
        </div>
        
        <!-- 右侧任务列表 -->
        <div class="flex-1 overflow-y-auto bg-gray-50 p-3">
            <!-- 类型筛选 -->
            <div class="flex gap-2 overflow-x-auto pb-3 mb-3 -mx-3 px-3">
                <div class="filter-chip active" onclick="filterTasks('all', this)">全部(4)</div>
                <div class="filter-chip" onclick="filterTasks('house', this)">🏠新房</div>
                <div class="filter-chip" onclick="filterTasks('speech', this)">💬话术</div>
                <div class="filter-chip" onclick="filterTasks('content', this)">📝内容</div>
                <div class="filter-chip" onclick="filterTasks('self', this)">✨自创</div>
            </div>
            
            <!-- 任务卡片1 - 新房 -->
            <div class="bg-white rounded-xl task-card type-house shadow-sm" onclick="showToast('查看任务详情')">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center">
                        <span class="text-lg mr-2">🏠</span>
                        <span class="text-xs font-medium text-orange-500">新房探盘</span>
                    </div>
                    <span class="status-tag status-progress">进行中</span>
                </div>
                <h4 class="font-medium text-gray-700 mb-1">中海汇德里3月探盘任务</h4>
                <div class="flex items-center text-xs text-gray-400 gap-3">
                    <span>📍 浦东新区</span>
                    <span>🕐 10:00</span>
                </div>
            </div>
            
            <!-- 任务卡片2 - 话术 -->
            <div class="bg-white rounded-xl task-card type-speech shadow-sm" onclick="showToast('查看任务详情')">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center">
                        <span class="text-lg mr-2">💬</span>
                        <span class="text-xs font-medium text-purple-500">话术训练</span>
                    </div>
                    <span class="status-tag status-pending">待执行</span>
                </div>
                <h4 class="font-medium text-gray-700 mb-1">万科城市之光接待话术练习</h4>
                <div class="flex items-center text-xs text-gray-400 gap-3">
                    <span>📍 线上练习</span>
                    <span>🕐 14:00</span>
                </div>
            </div>
            
            <!-- 任务卡片3 - 内容 -->
            <div class="bg-white rounded-xl task-card type-content shadow-sm" onclick="showToast('查看任务详情')">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center">
                        <span class="text-lg mr-2">📝</span>
                        <span class="text-xs font-medium text-green-500">内容发布</span>
                    </div>
                    <span class="status-tag status-done">已完成</span>
                </div>
                <h4 class="font-medium text-gray-700 mb-1">二手房交易税费科普文案</h4>
                <div class="flex items-center text-xs text-gray-400 gap-3">
                    <span>📍 已发布</span>
                    <span>🕐 09:00</span>
                </div>
            </div>
            
            <!-- 任务卡片4 - 自创 -->
            <div class="bg-white rounded-xl task-card type-self shadow-sm" onclick="showToast('查看任务详情')">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center">
                        <span class="text-lg mr-2">✨</span>
                        <span class="text-xs font-medium text-yellow-500">自创任务</span>
                    </div>
                    <span class="status-tag status-overdue">已逾期</span>
                </div>
                <h4 class="font-medium text-gray-700 mb-1">个人客户跟进记录</h4>
                <div class="flex items-center text-xs text-gray-400 gap-3">
                    <span>📍 私客维护</span>
                    <span>🕐 18:00</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <div class="tab-bar-inner">
            <a href="tools.html" class="tab-item">
                <i class="fa fa-rocket"></i>
            </a>
            <a href="ai-design.html" class="tab-item">
                <i class="fa fa-paint-brush"></i>
            </a>
            <a href="claw.html" class="tab-item">
                <i class="fa fa-commenting"></i>
            </a>
            <a href="calendar.html" class="tab-item active">
                <i class="fa fa-calendar"></i>
            </a>
            <a href="profile.html" class="tab-item">
                <i class="fa fa-user"></i>
            </a>
        </div>
    </div>

    <script>
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function filterTasks(type, el) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            showToast('筛选：' + type);
        }
        
        // 日期选择
        document.querySelectorAll('.date-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.date-item').forEach(i => {
                    i.classList.remove('bg-orange-50', 'active');
                });
                this.classList.add('bg-orange-50', 'active');
            });
        });
    </script>
</body>
</html>
