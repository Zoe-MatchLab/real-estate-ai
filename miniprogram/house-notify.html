<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>楼盘详情 - 房产AI小程序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        body {
            background: #F7F8FA;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* 底部按钮 */
        .bottom-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
            background: white;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航 -->
    <header class="sticky top-0 bg-white z-50 border-b border-gray-100">
        <div class="flex items-center h-14 px-4">
            <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center -ml-2">
                <i class="fa fa-chevron-left text-gray-600 text-lg"></i>
            </button>
            <div class="flex-1 text-center font-medium text-gray-800">楼盘详情</div>
            <button class="w-10 h-10 flex items-center justify-center -mr-2">
                <i class="fa fa-ellipsis-h text-gray-400"></i>
            </button>
        </div>
    </header>

    <!-- 内容区域 -->
    <main class="pb-24">
        <!-- 封面图 -->
        <div class="relative">
            <div class="h-56 bg-gradient-to-br from-orange-400 to-red-500 flex items-center justify-center">
                <div class="text-center text-white">
                    <i class="fa fa-image text-4xl opacity-50"></i>
                </div>
            </div>
            <div class="absolute bottom-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded">
                1/5
            </div>
        </div>

        <!-- 楼盘基本信息 -->
        <div class="bg-white p-4">
            <div class="flex items-start justify-between mb-3">
                <div>
                    <h1 class="text-xl font-bold text-gray-800 mb-1">中海汇德里</h1>
                    <p class="text-sm text-gray-500">中海地产</p>
                </div>
                <div class="flex gap-2">
                    <span class="px-2 py-1 bg-green-100 text-green-600 text-xs rounded">在售</span>
                </div>
            </div>

            <!-- 价格信息 -->
            <div class="flex items-baseline gap-3 mb-3">
                <span class="text-2xl font-bold text-primary">8.5万/㎡</span>
                <span class="text-sm text-gray-400">均价</span>
                <span class="text-sm text-gray-500">600-1200万/套</span>
            </div>

            <!-- 基本信息 -->
            <div class="grid grid-cols-2 gap-3 text-sm mb-3">
                <div class="flex items-center text-gray-600">
                    <i class="fa fa-map-marker text-primary mr-2"></i>
                    <span>浦东新区张江路</span>
                </div>
                <div class="flex items-center text-gray-600">
                    <i class="fa fa-calendar text-primary mr-2"></i>
                    <span>4月开盘</span>
                </div>
            </div>

            <!-- 标签 -->
            <div class="flex gap-2 flex-wrap">
                <span class="px-2 py-1 bg-orange-50 text-orange-600 text-xs rounded">户型：80-140㎡</span>
                <span class="px-2 py-1 bg-orange-50 text-orange-600 text-xs rounded">精装</span>
                <span class="px-2 py-1 bg-orange-50 text-orange-600 text-xs rounded">容积率：2.5</span>
                <span class="px-2 py-1 bg-orange-50 text-orange-600 text-xs rounded">绿化率：35%</span>
            </div>
        </div>

        <!-- 详细信息 -->
        <div class="mt-3 bg-white">
            <!-- 配套信息 -->
            <div class="p-4 border-b border-gray-100">
                <h3 class="text-sm font-medium text-gray-800 mb-3">区位配套</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex">
                        <span class="w-12 text-gray-500 shrink-0">交通</span>
                        <span class="text-gray-700">2号线张江站800m，公交站200m</span>
                    </div>
                    <div class="flex">
                        <span class="w-12 text-gray-500 shrink-0">教育</span>
                        <span class="text-gray-700">张江中学、张江幼儿园</span>
                    </div>
                    <div class="flex">
                        <span class="w-12 text-gray-500 shrink-0">医疗</span>
                        <span class="text-gray-700">曙光医院（三甲）</span>
                    </div>
                    <div class="flex">
                        <span class="w-12 text-gray-500 shrink-0">商业</span>
                        <span class="text-gray-700">长泰广场、家乐福</span>
                    </div>
                </div>
            </div>

            <!-- 优惠政策 -->
            <div class="p-4">
                <h3 class="text-sm font-medium text-gray-800 mb-3">优惠政策</h3>
                <ul class="space-y-2 text-sm text-gray-700">
                    <li class="flex items-center">
                        <i class="fa fa-check-circle text-green-500 mr-2"></i>
                        <span>3万抵8万优惠</span>
                    </li>
                    <li class="flex items-center">
                        <i class="fa fa-check-circle text-green-500 mr-2"></i>
                        <span>首付最低20%</span>
                    </li>
                    <li class="flex items-center">
                        <i class="fa fa-check-circle text-green-500 mr-2"></i>
                        <span>合作银行利率4.1%</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- 探盘任务状态（如果已配置过） -->
        <div id="taskStatus" class="mt-3 bg-white p-4 hidden">
            <h3 class="text-sm font-medium text-gray-800 mb-3">探盘任务</h3>
            <div class="bg-orange-50 rounded-lg p-3">
                <div class="flex items-center justify-between mb-2">
                    <span class="font-medium text-gray-800">中海汇德里新盘探盘</span>
                    <span class="text-xs text-orange-500 font-medium">待执行</span>
                </div>
                <div class="text-xs text-gray-500">执行人：张三、李四</div>
            </div>
        </div>
    </main>

    <!-- 底部按钮 -->
    <div class="bottom-action">
        <button onclick="goToDistribute()" class="w-full bg-primary text-white py-4 rounded-xl font-medium text-lg flex items-center justify-center">
            <i class="fa fa-send mr-2"></i>
            配置探盘任务并下发
        </button>
    </div>

    <script>
        function goToDistribute() {
            window.location.href = 'task-distribute.html?houseId=HOUSE001&houseName=中海汇德里';
        }

        // 模拟数据：检查是否已配置过探盘任务
        function checkTaskStatus() {
            const hasTask = false; // 模拟：true=已有任务，false=未配置
            if (hasTask) {
                document.getElementById('taskStatus').classList.remove('hidden');
            }
        }
        checkTaskStatus();
    </script>
</body>
</html>
