<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>定位打卡 - 房产AI作业平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        dark: '#1D2129',
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #F2F3F5; min-height: 100vh; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="bg-white px-4 pt-12 pb-3 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center justify-between">
            <button onclick="history.back()" class="text-primary"><i class="fa fa-chevron-left text-lg"></i></button>
            <h1 class="text-base font-bold text-dark">阶段1：定位打卡</h1>
            <div class="w-8"></div>
        </div>
        <!-- 进度 -->
        <div class="flex items-center mt-3 space-x-1">
            <div class="flex-1 h-1.5 bg-primary rounded-full"></div>
            <div class="flex-1 h-1.5 bg-gray-200 rounded-full"></div>
            <div class="flex-1 h-1.5 bg-gray-200 rounded-full"></div>
            <div class="flex-1 h-1.5 bg-gray-200 rounded-full"></div>
        </div>
        <p class="text-xs text-gray-400 mt-1">步骤 1/4 · 打卡</p>
    </div>

    <!-- 地图区域 -->
    <div class="relative" style="height: 45vh; background: #E8F3FF;">
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="text-center">
                <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fa fa-map-marker text-primary text-3xl"></i>
                </div>
                <p class="text-sm text-gray-500">楼盘定位中...</p>
            </div>
        </div>
        <!-- 模拟地图元素 -->
        <div class="absolute bottom-4 left-4 right-4 bg-white rounded-xl p-3 shadow-lg">
            <div class="flex items-start space-x-3">
                <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                    <i class="fa fa-building text-primary"></i>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-dark">万科·城市之光</p>
                    <p class="text-xs text-gray-400 mt-0.5">北京市朝阳区CBD核心区·光华路8号</p>
                    <p class="text-xs text-primary mt-1"><i class="fa fa-map-pin mr-1"></i>距您约 320 米</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 打卡信息 -->
    <div class="mx-3 -mt-4 relative z-10">
        <div class="bg-white rounded-xl p-4 shadow-sm mb-3">
            <h3 class="text-sm font-semibold text-dark mb-3">打卡说明</h3>
            <div class="space-y-2 text-sm text-gray-600">
                <div class="flex items-start">
                    <i class="fa fa-check-circle text-success mr-2 mt-0.5"></i>
                    <span>请到达楼盘现场后进行打卡</span>
                </div>
                <div class="flex items-start">
                    <i class="fa fa-check-circle text-success mr-2 mt-0.5"></i>
                    <span>打卡范围：距离楼盘 1000 米内</span>
                </div>
                <div class="flex items-start">
                    <i class="fa fa-check-circle text-success mr-2 mt-0.5"></i>
                    <span>打卡将记录您到达现场的时间</span>
                </div>
                <div class="flex items-start">
                    <i class="fa fa-info-circle text-primary mr-2 mt-0.5"></i>
                    <span>当前位置：<span class="text-primary font-medium">距楼盘320米</span>，在打卡范围内</span>
                </div>
            </div>
        </div>

        <!-- 打卡结果 -->
        <div class="bg-success/5 border border-success/20 rounded-xl p-4 mb-3" id="checkinResult" style="display:none">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 bg-success rounded-full flex items-center justify-center text-white text-xl">
                    <i class="fa fa-check"></i>
                </div>
                <div>
                    <p class="text-base font-bold text-success">打卡成功！</p>
                    <p class="text-sm text-gray-500 mt-0.5">打卡时间：2026-04-12 14:22:35</p>
                    <p class="text-xs text-gray-400">距楼盘：320米</p>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div id="checkinBtnArea">
            <button class="w-full py-3 bg-primary text-white rounded-xl text-sm font-semibold mb-2" id="checkinBtn" onclick="doCheckin()">
                <i class="fa fa-map-marker mr-2"></i>立即打卡
            </button>
            <button class="w-full py-3 bg-gray-100 text-gray-400 rounded-xl text-sm" onclick="location.href='checkin-point.html'">
                跳过此步骤（可选打卡点可跳过）
            </button>
        </div>

        <div id="continueBtnArea" style="display:none">
            <button class="w-full py-3 bg-primary text-white rounded-xl text-sm font-semibold" onclick="location.href='checkin-point.html'">
                继续点位采集
            </button>
        </div>
    </div>

    <script>
        function doCheckin() {
            const btn = document.getElementById('checkinBtn');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>打卡中...';
            btn.disabled = true;
            setTimeout(() => {
                btn.style.display = 'none';
                document.getElementById('checkinResult').style.display = 'block';
                document.getElementById('continueBtnArea').style.display = 'block';
            }, 1500);
        }
    </script>
</body>
</html>
