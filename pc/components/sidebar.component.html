<style>
/* 侧边栏菜单激活样式 */
aside a.active {
    color: #165DFF;
    background-color: #E8F3FF;
    border-right: 4px solid #165DFF;
}
</style>

<!-- 侧边栏公共JS -->
<script>
// 修正侧边栏链接路径
function fixSidebarLinks() {
    const pathname = window.location.pathname;
    const links = document.querySelectorAll('aside a[data-path]');
    
    links.forEach(link => {
        const dataPath = link.getAttribute('data-path');
        // 从当前路径计算深度
        const depth = (pathname.match(/\/pages\//g) || []).length;
        
        if (depth > 0) {
            // 在子目录中，需要往回走
            const prefix = '../'.repeat(depth);
            link.setAttribute('href', prefix + dataPath);
        } else {
            // 在根目录，直接使用
            link.setAttribute('href', dataPath);
        }
    });
}

// 高亮当前页面
function initSidebar() {
    const pathname = window.location.pathname;
    const links = document.querySelectorAll('aside a[data-path]');
    
    links.forEach(link => {
        const dataPath = link.getAttribute('data-path');
        if (pathname.includes(dataPath)) {
            link.classList.add('active');
        }
        // 首页特殊处理
        if ((pathname.endsWith('/pc/') || pathname.endsWith('/pc/index.html')) && link.getAttribute('href').includes('index.html')) {
            link.classList.add('active');
        }
    });
}

// 全局暴露函数
window.initSidebar = initSidebar;
window.fixSidebarLinks = fixSidebarLinks;
</script>
